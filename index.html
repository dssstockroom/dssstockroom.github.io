                                        value={customBody}
                                        onChange={e => setCustomBody(e.target.value)}
                                        style={{fontFamily:'var(--sans)', fontSize:'14px', lineHeight:'1.6', resize:'vertical'}}
                                    />
                                    <div style={{fontSize:'11px', color:'var(--muted)', marginTop:'5px'}}>
                                        Blank lines between paragraphs will be preserved in the HTML layout.
                                    </div>
                                </div>
                                <div style={{display:'flex', gap:'12px', flexWrap:'wrap'}}>
                                    <button
                                        onClick={handleCustomMailto}
                                        disabled={!hasContent}
                                        className="btn btn-primary"
                                        style={{flex:1, minWidth:'160px', fontSize:'12px'}}
                                    >
                                        <span>📧</span> Open in Mail
                                    </button>
                                    <button
                                        onClick={handleCustomCopyHtml}
                                        disabled={!hasContent}
                                        className={`btn ${customCopied === 'html' ? 'btn-gold' : 'btn-outline'}`}
                                        style={{flex:1, minWidth:'160px', fontSize:'12px'}}
                                    >
                                        {customCopied === 'html'
                                            ? <><span>✓</span> HTML Copied!</>
                                            : customCopied === 'plain'
                                                ? <><span>✓</span> Text Copied</>
                                                : <><span>📋</span> Copy HTML</>
                                        }
                                    </button>
                                    <button
                                        onClick={() => { setCustomSubject(''); setCustomBody(''); setCustomCopied(null); }}
                                        disabled={!hasContent}
                                        className="btn btn-ghost"
                                        style={{fontSize:'12px'}}
                                    >
                                        Clear
                                    </button>
                                </div>
                            </div>
                        );
                    })()}
                    <div className="card" style={{marginTop:'32px'}}>
                        <h2>Email Preview</h2>
                        <p style={{fontSize:'13px', color:'var(--muted)', marginBottom:'20px'}}>This is what the styled HTML email looks like when pasted into Outlook.</p>
                        <div style={{border:'1px solid var(--border)', borderRadius:'8px', overflow:'hidden', background:'#f4f5f7', padding:'24px', display:'flex', justifyContent:'center'}}>
                            <div style={{width:'100%', maxWidth:'600px', background:'#fff', borderRadius:'10px', overflow:'hidden', boxShadow:'0 2px 12px rgba(0,0,0,0.08)'}}>
                                {/* Header */}
                                <div style={{background:'var(--royal)', padding:'0'}}>
                                    <div style={{padding:'14px 28px', display:'flex', alignItems:'center', gap:'14px'}}>
                                        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/f/fb/University_of_Pittsburgh_seal.svg/960px-University_of_Pittsburgh_seal.svg.png" style={{width:'44px', height:'44px', borderRadius:'50%', background:'#fff', padding:'3px', display:'block'}} alt="Pitt" />
                                        <div>
                                            <div style={{fontFamily:'var(--gothic)', fontSize:'13px', fontWeight:700, color:'#fff', letterSpacing:'0.08em', textTransform:'uppercase'}}>Dietrich School Scientific Stockroom</div>
                                            <div style={{fontSize:'10px', color:'rgba(219,238,255,0.75)', letterSpacing:'0.06em', textTransform:'uppercase', marginTop:'2px', fontFamily:'var(--gothic)'}}>Shared Research Support Services · University of Pittsburgh</div>
                                        </div>
                                    </div>
                                    <div style={{background:'var(--gold)', height:'3px', fontSize:0, lineHeight:0}}></div>
                                </div>
                                {/* Subject strip */}
                                <div style={{background:'var(--navy)', padding:'12px 28px'}}>
                                    <div style={{fontFamily:'var(--gothic)', fontSize:'11px', fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:'var(--gold)'}}>DSSS Order Ready for Pick-Up</div>
                                </div>
                                {/* Body */}
                                <div style={{padding:'28px 28px 20px'}}>
                                    <p style={{margin:'0 0 12px 0', fontSize:'14px', color:'var(--text)', lineHeight:'1.7'}}>This message is to inform you that your order is available for pick-up at the DSS Stockroom at your earliest convenience.</p>
                                    <p style={{margin:'0 0 12px 0', fontSize:'14px', color:'var(--text)', lineHeight:'1.7'}}>If you are unable to retrieve your order personally, another member of your group may pick it up on your behalf.</p>
                                </div>
                                {/* Signature */}
                                <div style={{padding:'0 28px 24px'}}>
                                    <div style={{borderTop:'2px solid var(--gold)', paddingTop:'14px'}}>
                                        <div style={{fontFamily:'var(--gothic)', fontSize:'13px', fontWeight:700, color:'var(--royal)', letterSpacing:'0.04em'}}>Dietrich School Scientific Stockroom</div>
                                        <div style={{fontSize:'11px', color:'var(--muted)', marginTop:'2px'}}>Shared Research Support Services · University of Pittsburgh</div>
                                        <div style={{fontSize:'11px', color:'var(--muted)', marginTop:'6px'}}>📍 326 Chevron Science Center &nbsp;&nbsp;🕐 Mon–Fri 8:00 AM – 5:00 PM</div>
                                        <div style={{fontSize:'11px', color:'var(--muted)', marginTop:'4px'}}>📞 <a href="tel:4126248551" style={{color:'var(--royal)', textDecoration:'none'}}>412-624-8551</a> &nbsp;&nbsp;✉️ <a href="mailto:stockroom@pitt.edu" style={{color:'var(--royal)', textDecoration:'none'}}>stockroom@pitt.edu</a></div>
                                        <div style={{fontSize:'11px', color:'var(--muted)', marginTop:'4px'}}>
                                            🌐 <a href="https://www.researchservices.pitt.edu/facilities/dietrich-school-scientific-stockroom" style={{color:'var(--royal)', textDecoration:'none'}}>Website</a>
                                            {' · '}
                                            <a href="https://www.instagram.com/dssstockroom" style={{color:'var(--royal)', textDecoration:'none'}}>Instagram</a>
                                            {' · '}
                                            <a href="https://www.facebook.com/dssstockroom" style={{color:'var(--royal)', textDecoration:'none'}}>Facebook</a>
                                            {' · '}
                                            <a href="https://www.twitter.com/dssstockroom" style={{color:'var(--royal)', textDecoration:'none'}}>Twitter / X</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
