            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        };

        const endSession = () => {
            if (confirm('End session? Export your data first!')) {
                setSession(null); setCountedItems([]); setCurrentItem(null);
                setStartSection(''); setStartRack('');
                setCurrentSection(''); setCurrentRack(''); setShelf('');
            }
        };

        // ── Render ────────────────────────────────────────────────────────────
        const { countedRows: resolvedCounted, missingRows: resolvedMissing } = session
            ? resolveParentChild()
            : { countedRows: [], missingRows: [] };

        // Range label for session header
        const rangeLabel = session
            ? (session.startRack === currentRack
                ? `Section ${currentSection} — Rack ${currentRack} — Shelf ${shelf}`
                : `Section ${currentSection} — Racks ${session.startRack}–${currentRack} — Shelf ${shelf}`)
            : '';

        return (
            <div>
                <div className="page-banner">
                    <div className="container">
                        <div><h1>Cycle Count</h1><p>Scan-based physical inventory verification by section and rack</p></div>
                        <div className="page-banner-icon">📦</div>
                    </div>
                </div>
                <div className="container page-content">
                    {!session ? (
                        <div className="card" style={{maxWidth:'480px'}}>
                            <h2>Start New Session</h2>
                            <p style={{fontSize:'13px', color:'var(--muted)', marginBottom:'18px'}}>
                                Select your starting rack. You can continue across racks during the session.
                            </p>
                            <div className="grid-2">
                                <div className="form-group">
                                    <label className="form-label">Section</label>
                                    <select className="form-select" value={startSection} onChange={e => { setStartSection(e.target.value); setStartRack(''); }}>
                                        <option value="">Select…</option>
                                        {getUniqueSections().map(s => <option key={s} value={s}>Section {s}</option>)}
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Starting Rack</label>
                                    <select className="form-select" value={startRack} onChange={e => setStartRack(e.target.value)} disabled={!startSection}>
                                        <option value="">Select…</option>
                                        {startSection && getUniqueRacks(startSection).map(r => <option key={r} value={r}>Rack {r}</option>)}
                                    </select>
                                </div>
                            </div>
                            <button onClick={startSession} disabled={!startSection || !startRack} className="btn btn-primary btn-block">Start Session</button>
                        </div>
                    ) : (
                        <div>
                            {/* Session header */}
                            <div className="session-header no-print">
                                <div>
                                    <h3>{rangeLabel}</h3>
                                    <p>Counted: {countedItems.length} items &nbsp;·&nbsp; Missing: {resolvedMissing.length}</p>
                                </div>
                                <div style={{display:'flex', gap:'10px'}}>
                                    <button onClick={() => printDocument(buildCycleCountHTML(resolvedCounted, resolvedMissing, session, currentRack, currentSection))} disabled={!countedItems.length} className="btn btn-outline btn-sm" style={{color:'#fff', borderColor:'rgba(255,255,255,0.4)'}}>🖨 Print</button>
                                    <button onClick={exportCSV} disabled={!countedItems.length} className="btn btn-gold btn-sm">⬇ CSV</button>
                                    <button onClick={endSession} className="btn btn-red btn-sm">End Session</button>
                                </div>
                            </div>

                            {/* Shelf navigation */}
                            <div className="btn-group no-print" style={{marginBottom:'20px'}}>
                                <button onClick={prevShelf} className="btn btn-ghost" style={{fontSize:'15px'}}>← Prev Shelf</button>
                                {isLastShelf() && !isLastRack()
                                    ? <button onClick={nextRack} className="btn btn-primary" style={{fontSize:'15px'}}>Next Rack →</button>
                                    : <button onClick={nextShelf} disabled={isLastShelf() && isLastRack()} className="btn btn-primary" style={{fontSize:'15px'}}>
                                        {isLastShelf() && isLastRack() ? 'Last Shelf' : 'Next Shelf →'}
                                      </button>
                                }
                            </div>

                            {/* Misplaced / scan / count UI */}
                            {misplacedItem ? (
                                <div className="alert alert-error" style={{fontSize:'15px', padding:'20px'}}>
                                    <div style={{fontWeight:700, fontSize:'17px', marginBottom:'10px'}}>⚠ MISPLACED ITEM</div>
                                    <div style={{fontSize:'16px', marginBottom:'4px'}}>{misplacedItem.item.itemName}</div>
                                    <div style={{fontSize:'13px', color:'var(--dark-red)', marginBottom:'4px'}}>SKU: {misplacedItem.item.internalSKU}</div>
                                    <div>Expected: <strong>{misplacedItem.expectedLoc}</strong> · Found at: <strong>{currentSection}-{currentRack}-{shelf}</strong></div>
                                    <div className="btn-group" style={{marginTop:'14px'}}>
                                        <button onClick={() => { setCurrentItem(misplacedItem.item); setMisplacedItem(null); setCountQty(''); setRecountQty(''); setNeedsRecount(false); }} className="btn btn-gold">Count Anyway</button>
                                        <button onClick={() => { setMisplacedItem(null); setScannedSKU(''); }} className="btn btn-ghost">Skip</button>
                                    </div>
                                </div>
                            ) : !currentItem ? (
                                <div className="card">
                                    <div className="form-group">
                                        <label className="form-label" style={{fontSize:'14px'}}>Scan or Enter Barcode</label>
                                        <input
                                            type="text"
                                            className="form-input"
                                            value={scannedSKU}
                                            onChange={e => setScannedSKU(e.target.value)}
                                            onKeyPress={e => e.key === 'Enter' && handleScan()}
                                            autoFocus
                                            style={{fontSize:'20px', padding:'16px', textAlign:'center', border:'2px solid var(--royal)', letterSpacing:'0.05em'}}
                                        />
                                    </div>
                                    <button onClick={handleScan} className="btn btn-primary btn-block" style={{fontSize:'16px', padding:'14px'}}>Lookup Item</button>
                                </div>
                            ) : (
                                <div>
                                    <div className="scan-display">
                                        <div className="item-name">{currentItem.itemName}</div>
                                        <div className="item-detail">SKU: <strong style={{fontFamily:'var(--mono)'}}>{currentItem.internalSKU}</strong></div>
                                        <div className="item-detail">Location: {currentItem.location}</div>
                                        <div className="item-detail" style={{fontSize:'18px', marginTop:'8px'}}>Unit: <strong>{currentItem.uom}</strong></div>
                                        <div className="item-detail">System On-Hand: <strong style={{fontSize:'20px'}}>{currentItem.onHand || '0'}</strong></div>
                                        <div className="item-qty-label">{needsRecount ? 'RECOUNT — Mismatch detected. Please count again.' : 'Enter Count'}</div>
                                    </div>
                                    {!needsRecount ? (
                                        <div className="card">
                                            <input type="number" className="count-input-lg" value={countQty} onChange={e => setCountQty(e.target.value)} onKeyPress={e => e.key === 'Enter' && submitCount()} autoFocus />
                                            <button onClick={submitCount} disabled={!countQty} className="btn btn-gold btn-block" style={{marginTop:'14px', fontSize:'16px', padding:'14px'}}>Submit Count</button>
                                        </div>
                                    ) : (
                                        <div className="card">
                                            <div className="alert alert-error">Counted <strong>{countQty}</strong>, system shows <strong>{currentItem.onHand}</strong>. Please recount.</div>
                                            <input type="number" className="count-input-lg recount" value={recountQty} onChange={e => setRecountQty(e.target.value)} onKeyPress={e => e.key === 'Enter' && submitCount()} autoFocus />
                                            <button onClick={submitCount} disabled={!recountQty} className="btn btn-gold btn-block" style={{marginTop:'14px', fontSize:'16px', padding:'14px'}}>Submit Recount</button>
                                        </div>
                                    )}
                                    <button onClick={() => { setCurrentItem(null); setScannedSKU(''); setCountQty(''); setRecountQty(''); setNeedsRecount(false); }} className="btn btn-ghost btn-block" style={{marginTop:'10px'}}>Cancel</button>
                                </div>
                            )}

                            {/* Count log */}
                            {countedItems.length > 0 && (
                                <div style={{marginTop:'32px'}}>
                                    <h3 style={{marginBottom:'14px'}}>Count Log ({countedItems.length} items)</h3>
                                    <div className="table-wrap">
                                        <table>
                                            <thead>
                                                <tr>
                                                    <th>Found At</th><th>Expected</th><th>SKU</th>
                                                    <th>Item</th><th>UoM</th><th>System</th>
                                                    <th>Counted</th><th>Variance</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {resolvedCounted.map((it, i) => (
                                                    <React.Fragment key={i}>
                                                        <tr style={{background: it.variance !== 0 || it.misplaced ? '#fff0ed' : 'white'}}>
                                                            <td style={{fontFamily:'var(--mono)', fontSize:'12px', fontWeight:700}}>{it.countedAt}</td>
                                                            <td style={{fontFamily:'var(--mono)', fontSize:'12px', color: it.misplaced ? 'var(--red)' : 'var(--muted)'}}>{it.expectedLocation}</td>
                                                            <td style={{fontFamily:'var(--mono)', fontSize:'12px'}}>{it.sku}</td>
                                                            <td style={{fontSize:'13px'}}>{it.itemName}</td>
                                                            <td>{it.uom}</td>
                                                            <td style={{textAlign:'center'}}>{it.onHand}</td>
                                                            <td style={{textAlign:'center', fontWeight:700, fontSize:'15px'}}>{it.counted}</td>
                                                            <td style={{textAlign:'center', fontWeight:700, fontSize:'15px', color: it.variance === 0 ? 'var(--green)' : 'var(--red)'}}>{it.variance > 0 ? '+':''}{it.variance}</td>
                                                        </tr>
                                                        {it.parentSKU && (
                                                            <tr style={{background:'#f0f4ff'}}>
                                                                <td colSpan="2" style={{paddingLeft:'28px', fontSize:'11px', color:'var(--muted)'}}>↳ parent</td>
                                                                <td style={{fontFamily:'var(--mono)', fontSize:'11px', color:'var(--royal)'}}>{it.parentSKU}</td>
                                                                <td style={{fontSize:'11px', color:'var(--muted)', fontStyle:'italic'}} colSpan="5">{it.parentName}</td>
                                                            </tr>
                                                        )}
                                                    </React.Fragment>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            </div>
        );
    }
    /* ══════════════════════════════════════════════════════════════════════
       PHONEBOOK PAGE
    ══════════════════════════════════════════════════════════════════════ */

    // Sheet color palette — one per source category
    const SHEET_COLORS = {
        'Chemistry':    { bg:'#dbeeff', border:'#003594', text:'#003594' },
        'SRSS':         { bg:'#fff0e6', border:'#d4600a', text:'#8a3c00' },
        'Biology':      { bg:'#e6f9f0', border:'#00875a', text:'#005c3b' },
        'Pitt':         { bg:'#f0e6ff', border:'#6b21a8', text:'#4c1d80' },
        'Pitt Offices': { bg:'#f5f0ff', border:'#8b5cf6', text:'#5b21b6' },
        'Vendor':       { bg:'#fff7e6', border:'#b45309', text:'#7c3a00' },
        'External':     { bg:'#fce7f3', border:'#9d174d', text:'#6d1035' },
        'Shipping':     { bg:'#f0fffe', border:'#0891b2', text:'#055b70' },
    };

    function PhonebookPage() {
        const [phonebookData, setPhonebookData]   = useState(null);  // null=loading
        const [pbError, setPbError]               = useState('');
        const [searchQuery, setSearchQuery]       = useState('');
        const [searchResults, setSearchResults]   = useState(null);
        const [activeFilter, setActiveFilter]     = useState('All');
        const [expandedGroups, setExpandedGroups] = useState({});

        // ── Load phonebook.xlsx on mount ─────────────────────────────────
        useEffect(() => {
            fetch('phonebook.xlsx')
                .then(r => r.arrayBuffer())
                .then(ab => {
                    try {
                        const wb = XLSX.read(ab, { type:'array', raw:false });
                        const contacts = parsePhonebook(wb);
                        setPhonebookData(contacts);
                    } catch(e) { setPbError('Could not parse phonebook.xlsx: ' + e.message); }
                })
                .catch(() => setPbError('phonebook.xlsx not found. Place it in the same directory as this file.'));
        }, []);

        // ── Parser ────────────────────────────────────────────────────────
        function parsePhonebook(wb) {
            const all = [];  // flat list before dedup

            // Helper to row-obj
            const rowsOf = (sheetName) => {
                if (!wb.SheetNames.includes(sheetName)) return [];
                const ws = wb.Sheets[sheetName];
                return XLSX.utils.sheet_to_json(ws, { defval: '' });
            };

            // ── Chemistry ─────────────────────────────────────────────────
            rowsOf('Chemistry - 2025').forEach(r => {
                const last  = String(r['Last Name']  || '').trim();
                const first = String(r['First Name (Preferd Name)'] || r['First Name'] || '').trim();
                if (!last && !first) return;
                all.push({
                    key: makeKey(first, last, r['Email']),
                    lastName: last, firstName: first,
                    pronouns:  String(r['Pronouns']   || '').trim(),
                    group:     String(r['Group']       || '').trim(),
                    classif:   String(r['Classif.']    || '').trim(),
                    title:     String(r['Job Title']   || '').trim(),
                    building:  String(r['Building']    || '').trim(),
                    room:      String(r['Floor / Room']|| r['Room'] || '').trim(),
                    phone:     String(r['Phone']       || '').trim(),
                    phone2:    String(r['Phone 2']     || '').trim(),
                    cell:      String(r['Cell Phone']  || '').trim(),
                    email:     String(r['Email']       || '').trim(),
                    company:   '',
                    department:'',
                    sources:   new Set(['Chemistry']),
                    type:      'person',
                });
            });

            // ── SRSS ──────────────────────────────────────────────────────
            rowsOf('SRSS Contacts').forEach(r => {
                const last  = String(r['Last Name']  || '').trim();
                const first = String(r['First Name'] || '').trim();
                if (!last && !first) return;
                all.push({
                    key: makeKey(first, last, r['Email']),
                    lastName: last, firstName: first,
                    pronouns: '', group: String(r['Group'] || '').trim(),
                    classif:  String(r['Classification'] || '').trim(),
                    title:    String(r['Title / Position Type'] || '').trim(),
                    building: String(r['Building'] || '').trim(),
                    room:     String(r['Room #']   || '').trim(),
                    phone:    String(r['Phone']    || '').trim(),
                    phone2:   String(r['Phone 2']  || '').trim(),
                    cell:     String(r['Cell Phone']|| '').trim(),
                    email:    String(r['Email']    || '').trim(),
                    company: '', department: '',
                    sources: new Set(['SRSS']),
                    type: 'person',
                });
            });

            // ── Biology ───────────────────────────────────────────────────
            rowsOf('Biology Contacts').forEach(r => {
                const last  = String(r['Last Name']  || '').trim();
                const first = String(r['First Name'] || '').trim();
                if (!last && !first) return;
                all.push({
                    key: makeKey(first, last, r['Email']),
                    lastName: last, firstName: first,
                    pronouns: '', group: String(r['Group'] || '').trim(),
                    classif:  String(r['Classification'] || '').trim(),
                    title:    String(r['Title / Position Type'] || '').trim(),
                    building: String(r['Building'] || '').trim(),
                    room:     String(r['Room #']   || '').trim(),
                    phone:    String(r['Phone']    || '').trim(),
                    phone2:   String(r['Phone 2']  || '').trim(),
                    cell:     '',
                    email:    String(r['Email']    || '').trim(),
                    company: '', department: '',
                    sources: new Set(['Biology']),
                    type: 'person',
                });
            });

            // ── Pitt Contacts ─────────────────────────────────────────────
            rowsOf('Pitt Contacts').forEach(r => {
                const last  = String(r['Last Name']  || '').trim();
                const first = String(r['First Name'] || '').trim();
                if (!last && !first) return;
                all.push({
                    key: makeKey(first, last, r['Email']),
                    lastName: last, firstName: first,
                    pronouns: '', group: '',
                    classif:  String(r['Classification'] || '').trim(),
                    title:    String(r['Title / Position Type'] || '').trim(),
                    building: String(r['Building'] || '').trim(),
                    room:     String(r['Room #']   || '').trim(),
                    phone:    String(r['Phone']    || '').trim(),
                    phone2:   '',
                    cell:     String(r['Cell Phone']|| '').trim(),
                    email:    String(r['Email']    || '').trim(),
                    company: '', department: String(r['Department'] || '').trim(),
                    sources: new Set(['Pitt']),
                    type: 'person',
                });
            });

            // ── Pitt Offices ──────────────────────────────────────────────
            rowsOf('Pitt Offices').forEach(r => {
                const name = String(r['Office Name'] || '').trim();
                if (!name) return;
                all.push({
                    key: 'office::' + name.toLowerCase().replace(/\s+/g,''),
                    lastName: name, firstName: '',
                    pronouns: '', group: '',
                    classif: 'Office', title: String(r['Department'] || '').trim(),
                    building: String(r['Building'] || '').trim(), room: '',
                    phone:  String(r['Phone']    || '').trim(),
                    phone2: '', cell: '',
                    email: String(r['Websites'] || '').trim(),
                    company: '', department: String(r['Department'] || '').trim(),
                    sources: new Set(['Pitt Offices']),
                    type: 'office',
                });
            });

            // ── Vendor Contacts ───────────────────────────────────────────
            rowsOf('Vendor Contacts').forEach(r => {
                const last  = String(r['Last Name']  || '').trim();
                const first = String(r['First Name'] || '').trim();
                const company = String(r['Company Name'] || '').trim();
                if (!last && !first && !company) return;
                all.push({
                    key: makeKey(first, last, r['Email']),
                    lastName: last, firstName: first,
                    pronouns: '', group: company,
                    classif: 'Vendor',
                    title: String(r['Title / Position Type'] || '').trim(),
                    building: '', room: '',
                    phone: String(r['Phone'] || '').trim(),
                    phone2: '', cell: '',
                    email: String(r['Email'] || '').trim(),
                    company, department: '',
                    sources: new Set(['Vendor']),
                    type: 'person',
                });
            });

            // ── Non-Pitt & Construction ───────────────────────────────────
            rowsOf('Non-Pitt & Construction').forEach(r => {
                const last  = String(r['Last Name']  || '').trim();
                const first = String(r['First Name'] || '').trim();
                if (!last && !first) return;
                all.push({
                    key: makeKey(first, last, r['Email']),
                    lastName: last, firstName: first,
                    pronouns: '', group: String(r['Company'] || '').trim(),
                    classif: 'External',
                    title: '', building: '', room: '',
                    phone: String(r['Cell / Office Phone'] || '').trim(),
                    phone2: '', cell: '',
                    email: String(r['Email'] || '').trim(),
                    company: String(r['Company'] || '').trim(), department: '',
                    sources: new Set(['External']),
                    type: 'person',
                });
            });

            // ── Shipping Companies ────────────────────────────────────────
            rowsOf('Shipping Company').forEach(r => {
                const name = String(r['Company'] || '').trim();
                if (!name) return;
                all.push({
                    key: 'ship::' + name.toLowerCase().replace(/\s+/g,''),
                    lastName: name, firstName: '',
                    pronouns: '', group: '',
                    classif: 'Shipping', title: String(r['Service Type'] || '').trim(),
                    building: '', room: '',
                    phone: String(r['Phone Number'] || '').trim(),
                    phone2: '', cell: '',
                    email: String(r['Website'] || '').trim(),
                    company: name, department: '',
                    sources: new Set(['Shipping']),
                    type: 'company',
                });
            });

            // ── Deduplicate by key ────────────────────────────────────────
            const map = new Map();
            all.forEach(c => {
                if (map.has(c.key)) {
                    // Merge: add source tags; prefer non-empty fields from existing
                    const ex = map.get(c.key);
                    c.sources.forEach(s => ex.sources.add(s));
                    // Fill in blanks from the new record
                    ['phone','phone2','cell','email','building','room','title','classif','group','pronouns'].forEach(f => {
                        if (!ex[f] && c[f]) ex[f] = c[f];
                    });
                } else {
                    map.set(c.key, c);
                }
            });

            return Array.from(map.values());
        }

        function makeKey(first, last, email) {
            const e = String(email || '').trim().toLowerCase();
            if (e) return 'email::' + e;
            return 'name::' + (last + ',' + first).toLowerCase().replace(/\s+/g,'');
        }

        // ── Search ────────────────────────────────────────────────────────
        const handleSearch = () => {
            if (!phonebookData || !searchQuery.trim()) return;
            const q = searchQuery.trim().toLowerCase();
            const words = q.split(/\s+/);

            const scored = phonebookData
                .map(c => {
                    const haystack = [
                        c.lastName, c.firstName, c.title, c.email,
                        c.phone, c.phone2, c.cell, c.building,
                        c.group, c.company, c.department, c.classif,
                    ].join(' ').toLowerCase();
                    if (!words.every(w => haystack.includes(w))) return null;
                    // Score: exact last name match scores highest
                    let score = 0;
                    if (c.lastName.toLowerCase() === q) score += 10;
                    if (c.firstName.toLowerCase() === q) score += 8;
                    if ((c.lastName+' '+c.firstName).toLowerCase().includes(q)) score += 6;
                    if (c.group.toLowerCase() === q) score += 5;
                    if (c.email.toLowerCase().startsWith(q.replace('@',''))) score += 4;
                    score += (c.lastName.toLowerCase().includes(q) ? 2 : 0);
                    return { ...c, score };
                })
                .filter(Boolean)
                .sort((a, b) => b.score - a.score || a.lastName.localeCompare(b.lastName));

            setSearchResults(scored);
            setActiveFilter('All');
            setExpandedGroups({});
        };

        // ── Group results by Chemistry group ─────────────────────────────
        const groupResults = (results) => {
            if (!results) return [];
            const filtered = activeFilter === 'All'
                ? results
                : results.filter(c => c.sources.has(activeFilter));

            // Collect Chemistry PI groups that have >1 member in results
            const chemResults = filtered.filter(c => c.sources.has('Chemistry') && c.group);
            const groupCounts = {};
            chemResults.forEach(c => { groupCounts[c.group] = (groupCounts[c.group] || 0) + 1; });
            const multiGroups = new Set(Object.keys(groupCounts).filter(g => groupCounts[g] > 1));

            // Separate: grouped Chemistry entries vs ungrouped
            const grouped = {};   // groupName → [members]
            const ungrouped = [];

            filtered.forEach(c => {
                if (c.sources.has('Chemistry') && multiGroups.has(c.group)) {
                    if (!grouped[c.group]) grouped[c.group] = [];
                    grouped[c.group].push(c);
                } else {
                    ungrouped.push(c);
                }
            });

            // Sort each group: PI first, then alphabetical
            Object.keys(grouped).forEach(g => {
                grouped[g].sort((a, b) => {
                    const aIsPi = a.title.includes('Primary Investigator') || a.title.includes('Professor, ') ? 0 : 1;
                    const bIsPi = b.title.includes('Primary Investigator') || b.title.includes('Professor, ') ? 0 : 1;
                    if (aIsPi !== bIsPi) return aIsPi - bIsPi;
                    return a.lastName.localeCompare(b.lastName);
                });
            });

            return { grouped, ungrouped: ungrouped.sort((a,b) => a.lastName.localeCompare(b.lastName)) };
        };

        // ── Available filter chips ────────────────────────────────────────
        const getFilterCounts = () => {
            if (!searchResults) return {};
            const counts = { All: searchResults.length };
            searchResults.forEach(c => {
                c.sources.forEach(s => { counts[s] = (counts[s] || 0) + 1; });
            });
            return counts;
        };

        // ── Render helpers ────────────────────────────────────────────────
        const SourceTag = ({ source }) => {
            const col = SHEET_COLORS[source] || SHEET_COLORS['Pitt'];
            return (
                <span style={{
                    fontSize:'9.5px', fontFamily:'var(--gothic)', fontWeight:700,
                    letterSpacing:'0.08em', textTransform:'uppercase',
                    padding:'2px 7px', borderRadius:'3px',
                    background: col.bg, border:`1px solid ${col.border}`, color: col.text,
                    whiteSpace:'nowrap',
                }}>{source}</span>
            );
        };

        const ContactCard = ({ contact, isGroupMember = false, inGroup = false }) => {
            const primarySource = Array.from(contact.sources)[0];
            const col = SHEET_COLORS[primarySource] || SHEET_COLORS['Pitt'];
            const displayName = contact.type === 'office' || contact.type === 'company'
                ? contact.lastName
                : `${contact.firstName} ${contact.lastName}`.trim();
            const showGroup = !inGroup && contact.group && contact.type === 'person'
                && !['Vendor','External','Shipping'].includes(contact.classif);
            const subtitle = [
                contact.title,
                contact.classif && contact.classif !== contact.title ? contact.classif : '',
                contact.company || contact.department,
            ].filter(Boolean).join(' · ');

            const handleGroupClick = (e) => {
                e.stopPropagation();
                const groupName = contact.group;
                setSearchQuery(groupName);
                // Filter strictly to contacts whose group field exactly matches — no text search
                const members = phonebookData
                    .filter(c => c.group === groupName)
                    .map(c => ({ ...c, score: c.title.includes('Primary Investigator') ? 10 : 0 }))
                    .sort((a, b) => b.score - a.score || a.lastName.localeCompare(b.lastName));
                setSearchResults(members);
                setActiveFilter('All');
                setExpandedGroups({});
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleSourceClick = (e, source) => {
                e.stopPropagation();
                setActiveFilter(source);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div style={{
                    display:'grid',
                    gridTemplateColumns: '1fr 1fr 1fr',
                    gap:'0',
                    padding: isGroupMember ? '10px 14px 10px 28px' : '12px 16px',
                    background: isGroupMember ? '#fafbfd' : '#fff',
                    borderLeft: `3px solid ${col.border}`,
                    borderBottom: '1px solid var(--border)',
                    alignItems: 'center',
                }}>

                    {/* Col 1 — Name, pronouns, then badges on one row */}
                    <div style={{paddingRight:'16px', minWidth:0}}>
                        <div style={{display:'flex', alignItems:'center', gap:'7px', flexWrap:'wrap', marginBottom:'5px'}}>
                            <span style={{fontFamily:'var(--serif)', fontSize:'15px', fontWeight:400, color:'var(--navy)'}}>
                                {displayName}
                            </span>
                            {contact.pronouns && (
                                <span style={{fontSize:'11px', color:'var(--muted)', fontStyle:'italic'}}>{contact.pronouns}</span>
                            )}
                        </div>
                        {/* Source tags + group badge on the same row */}
                        <div style={{display:'flex', flexWrap:'wrap', gap:'4px', alignItems:'center'}}>
                            {Array.from(contact.sources).map(s => {
                                const sc = SHEET_COLORS[s] || SHEET_COLORS['Pitt'];
                                return (
                                    <button key={s} onClick={e => handleSourceClick(e, s)} title={`Filter by ${s}`} style={{
                                        fontSize:'9.5px', fontFamily:'var(--gothic)', fontWeight:700,
                                        letterSpacing:'0.08em', textTransform:'uppercase',
                                        padding:'2px 7px', borderRadius:'3px',
                                        background: sc.bg, border:`1px solid ${sc.border}`, color: sc.text,
                                        cursor:'pointer', whiteSpace:'nowrap',
                                        transition:'filter 0.15s',
                                    }}
                                    onMouseEnter={e => e.currentTarget.style.filter='brightness(0.9)'}
                                    onMouseLeave={e => e.currentTarget.style.filter='none'}
                                    >{s}</button>
                                );
                            })}
                            {showGroup && (
                                <button onClick={handleGroupClick} title={`Search ${contact.group} group`} style={{
                                    display:'inline-flex', alignItems:'center', gap:'4px',
                                    fontSize:'10px', fontFamily:'var(--gothic)', fontWeight:700,
                                    letterSpacing:'0.07em', textTransform:'uppercase',
                                    padding:'2px 8px', borderRadius:'4px',
                                    background:'var(--sky)', border:'1.5px solid var(--royal)',
                                    color:'var(--royal)', cursor:'pointer',
                                    transition:'filter 0.15s',
                                }}
                                onMouseEnter={e => e.currentTarget.style.filter='brightness(0.9)'}
                                onMouseLeave={e => e.currentTarget.style.filter='none'}
                                >
                                    <span style={{opacity:0.55}}>GRP</span>{contact.group}
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Col 2 — Title / role / department */}
                    <div style={{paddingRight:'16px', minWidth:0, borderLeft:'1px solid var(--border)', paddingLeft:'16px'}}>
                        {subtitle && (
                            <span style={{fontSize:'12.5px', color:'var(--muted)', lineHeight:'1.5', display:'block'}}>
                                {subtitle}
                            </span>
                        )}
                        {contact.building && (
                            <span style={{fontSize:'12.5px', color:'var(--text)', display:'block', marginTop:'3px'}}>
                                📍 {contact.building}{contact.room ? ` · ${contact.room}` : ''}
                            </span>
                        )}
                    </div>

                    {/* Col 3 — Phone(s), email */}
                    <div style={{minWidth:0, borderLeft:'1px solid var(--border)', paddingLeft:'16px', display:'flex', flexDirection:'column', gap:'3px'}}>
                        {contact.phone && contact.phone !== '-' && (
                            <span style={{fontSize:'12.5px'}}>
                                📞 <a href={`tel:${contact.phone}`} style={{color:'var(--royal)', textDecoration:'none'}}>{contact.phone}</a>
                            </span>
                        )}
                        {contact.phone2 && contact.phone2 !== '-' && (
                            <span style={{fontSize:'12.5px'}}>
                                📞 <a href={`tel:${contact.phone2}`} style={{color:'var(--royal)', textDecoration:'none'}}>{contact.phone2}</a>
                            </span>
                        )}
                        {contact.cell && contact.cell !== '-' && (
                            <span style={{fontSize:'12.5px'}}>
                                📱 <a href={`tel:${contact.cell}`} style={{color:'var(--royal)', textDecoration:'none'}}>{contact.cell}</a>
                            </span>
                        )}
                        {contact.email && contact.email !== '-' && (
                            contact.email.startsWith('http')
                                ? <span style={{fontSize:'11.5px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>🔗 <a href={contact.email} target="_blank" rel="noreferrer" style={{color:'var(--royal)', textDecoration:'none', fontFamily:'var(--mono)'}}>{contact.email}</a></span>
                                : <span style={{fontSize:'11.5px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>✉️ <a href={`mailto:${contact.email}`} style={{color:'var(--royal)', textDecoration:'none', fontFamily:'var(--mono)'}}>{contact.email}</a></span>
                        )}
                    </div>
                </div>
            );
        };

        const GroupBlock = ({ groupName, members }) => {
            const isOpen = expandedGroups[groupName] !== false; // default open
            const pi = members.find(m => m.lastName === groupName || m.title.includes('Primary Investigator'));
            const others = members.filter(m => m !== pi);
            const col = SHEET_COLORS['Chemistry'];

            return (
                <div style={{border:`1.5px solid ${col.border}`, borderRadius:'8px', marginBottom:'12px', overflow:'hidden'}}>
                    {/* Group header */}
                    <button
                        onClick={() => setExpandedGroups(eg => ({...eg, [groupName]: !isOpen}))}
                        style={{
                            width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between',
                            padding:'10px 16px', background: col.bg, border:'none', cursor:'pointer',
                            borderBottom: isOpen ? `1px solid ${col.border}` : 'none',
                        }}
                    >
                        <div style={{display:'flex', alignItems:'center', gap:'10px'}}>
                            <span style={{fontFamily:'var(--gothic)', fontSize:'12px', fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color: col.text}}>
                                {groupName} Group
                            </span>
                            <span style={{fontSize:'11px', color: col.text, opacity:0.7}}>
                                {members.length} {members.length === 1 ? 'member' : 'members'}
                            </span>
                        </div>
                        <span style={{fontSize:'14px', color: col.text}}>{isOpen ? '▲' : '▼'}</span>
                    </button>
                    {isOpen && (
                        <div>
                            {pi && <ContactCard contact={pi} isGroupMember={false} inGroup={true} />}
                            {others.map((m, i) => <ContactCard key={i} contact={m} isGroupMember={true} inGroup={true} />)}
                        </div>
                    )}
                </div>
            );
        };

        // ── Filter chips ──────────────────────────────────────────────────
        const filterCounts = getFilterCounts();
        const filterOptions = ['All', 'Chemistry', 'Biology', 'SRSS', 'Pitt', 'Pitt Offices', 'Vendor', 'External', 'Shipping'];

        // ── Build display output ──────────────────────────────────────────
        const displayData = searchResults ? groupResults(searchResults) : null;

        return (
            <div>
                <div className="page-banner">
                    <div className="container">
                        <div><h1>Phonebook</h1><p>Search contacts across Chemistry, Biology, SRSS, Pitt offices, vendors, and more</p></div>
                        <div className="page-banner-icon">📞</div>
                    </div>
                </div>
                <div className="container page-content">
                    {/* Status */}
                    {!phonebookData && !pbError && (
                        <div className="alert alert-info">Loading phonebook database…</div>
                    )}
                    {pbError && (
                        <div className="alert alert-error">{pbError}</div>
                    )}

                    {/* Search */}
                    <div className="card">
                        <h2>Search Contacts</h2>
                        <div style={{display:'flex', gap:'0'}}>
                            <input
                                type="text"
                                className="form-input"
                                style={{borderRadius:'6px 0 0 6px', fontSize:'16px', padding:'13px 16px'}}
                                placeholder="Name, email, group, building, title…"
                                value={searchQuery}
                                onChange={e => setSearchQuery(e.target.value)}
                                onKeyPress={e => e.key === 'Enter' && handleSearch()}
                                disabled={!phonebookData}
                            />
                            <button
                                onClick={handleSearch}
                                disabled={!phonebookData || !searchQuery.trim()}
                                className="btn btn-primary"
                                style={{borderRadius:'0 6px 6px 0', padding:'13px 24px', fontSize:'13px'}}
                            >
                                Search
                            </button>
                        </div>
                        {phonebookData && (
                            <div style={{fontSize:'12px', color:'var(--muted)', marginTop:'8px'}}>
                                {phonebookData.length} contacts loaded · search by name, group, email, building, title, or company
                            </div>
                        )}
                    </div>

                    {/* Results */}
                    {searchResults && (
                        <div>
                            {/* Filter chips */}
                            {searchResults.length > 0 && (
                                <div style={{display:'flex', flexWrap:'wrap', gap:'8px', marginBottom:'16px'}}>
                                    {filterOptions.filter(f => filterCounts[f]).map(f => (
                                        <button key={f} onClick={() => setActiveFilter(f)} style={{
                                            padding:'5px 13px', borderRadius:'20px', border:'1.5px solid',
                                            fontSize:'11.5px', fontFamily:'var(--gothic)', fontWeight:700,
                                            letterSpacing:'0.06em', textTransform:'uppercase', cursor:'pointer',
                                            background: activeFilter === f ? 'var(--royal)' : '#fff',
                                            color: activeFilter === f ? '#fff' : 'var(--navy)',
                                            borderColor: activeFilter === f ? 'var(--royal)' : 'var(--border)',
                                        }}>
                                            {f} <span style={{opacity:0.7}}>({filterCounts[f]})</span>
                                        </button>
                                    ))}
                                </div>
                            )}

                            {searchResults.length === 0 ? (
                                <div className="card" style={{textAlign:'center', color:'var(--muted)', padding:'40px'}}>
                                    No contacts found for <strong>"{searchQuery}"</strong>
                                </div>
                            ) : displayData && (
                                <div>
                                    <div style={{fontSize:'13px', color:'var(--muted)', marginBottom:'14px'}}>
                                        {activeFilter === 'All' ? searchResults.length : (filterCounts[activeFilter] || 0)} result{searchResults.length !== 1 ? 's' : ''}
                                        {activeFilter !== 'All' && ` in ${activeFilter}`}
                                    </div>

                                    {/* Grouped Chemistry results */}
                                    {Object.keys(displayData.grouped).sort().map(g => (
                                        <GroupBlock key={g} groupName={g} members={displayData.grouped[g]} />
                                    ))}

                                    {/* Ungrouped results */}
                                    {displayData.ungrouped.length > 0 && (
                                        <div style={{border:'1px solid var(--border)', borderRadius:'8px', overflow:'hidden'}}>
                                            {displayData.ungrouped.map((c, i) => (
                                                <ContactCard key={i} contact={c} />
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            </div>
        );
    }

    /* ══════════════════════════════════════════════════════════════════════
       LABEL MAKER PAGE
    ══════════════════════════════════════════════════════════════════════ */
    function LabelsPage({ inventory }) {
        const [labelTab, setLabelTab] = useState('file');
        const [fileData, setFileData] = useState([]);
        const [manualQueue, setManualQueue] = useState([]);
        const [rawRows, setRawRows] = useState([]);
        const [rawFname, setRawFname] = useState('');
        const [filterY, setFilterY] = useState(true);
        const [fileName, setFileName] = useState('');
        const [itemCount, setItemCount] = useState(0);
        const [fileErr, setFileErr] = useState('');
        const [manualErr, setManualErr] = useState('');
        // SKU lookup tab
        const [skuListInput, setSkuListInput] = useState('');
        const [skuLookupData, setSkuLookupData] = useState([]);
        const [skuLookupResults, setSkuLookupResults] = useState(null); // null = not yet run
        const [labelSize, setLabelSize] = useState('5162');
        const [startOffset, setStartOffset] = useState(0);
        const [barcodeType, setBarcodeType] = useState('CODE128');
        const [pdfBusy, setPdfBusy] = useState(false);
        const [previewKey, setPreviewKey] = useState(0);
        // Manual form
        const [mItemNum, setMItemNum] = useState('');
        const [mName, setMName] = useState('');
        const [mMfrNum, setMMfrNum] = useState('');
        const [mLoc, setMLoc] = useState('');
        const [mUom, setMUom] = useState('');
        const [mAltUnit, setMAltUnit] = useState('');
        const [mConv, setMConv] = useState('');
        const [mCopies, setMCopies] = useState(1);

        const activeData = labelTab === 'file' ? fileData : labelTab === 'manual' ? manualQueue : skuLookupData;
        const layout = LAYOUTS[labelSize];

        // Load from inventory file when 'file' tab is active
        const handleFileUpload = (file) => {
            setFileErr('');
            const ext = file.name.split('.').pop().toLowerCase();
            const processRows = (rows) => { setRawRows(rows); setRawFname(file.name); applyFilter(rows, filterY, file.name); };
            if (ext === 'csv') {
                const reader = new FileReader();
                reader.onload = e => { const lines = e.target.result.split(/\r?\n/); const rows = lines.map(l => l.split(',').map(c => c.replace(/^"|"$/g,'').trim())); processRows(rows); };
                reader.readAsText(file);
            } else if (['xlsx','xls'].includes(ext)) {
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const wb = XLSX.read(e.target.result, { type:'array', raw:false });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
                        processRows(rows);
                    } catch(err) { setFileErr('Could not read file: ' + err.message); }
                };
                reader.readAsArrayBuffer(file);
            } else { setFileErr('Please use .xlsx, .xls, or .csv.'); }
        };

        const applyFilter = (rows, fy, fname) => {
            const items = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                const val = String(row[COL_IDX.itemNum] ?? '').trim();
                if (!val) continue;
                if (fy && val.toUpperCase().startsWith('Y')) continue;
                items.push(makeLabelItem(val, String(row[COL_IDX.name]||'').trim(), String(row[COL_IDX.mfrNum]||'').trim(), String(row[COL_IDX.loc]||'').trim(), String(row[COL_IDX.uom]||'').trim(), String(row[COL_IDX.altUnit]||'').trim(), String(row[COL_IDX.convFactor]||'').trim()));
            }
            if (!items.length) { setFileErr('No data rows found. Try toggling the Y-prefix filter.'); return; }
            setFileData(items); setFileName(fname || rawFname); setItemCount(items.length); setFileErr('');
        };

        const toggleFilterY = () => {
            const nf = !filterY; setFilterY(nf);
            if (rawRows.length) applyFilter(rawRows, nf, rawFname);
        };

        const addManualItem = () => {
            if (!mItemNum.trim()) { setManualErr('Item Number is required.'); return; }
            setManualErr('');
            const copies = Math.max(1, Math.min(50, mCopies || 1));
            const item = makeLabelItem(mItemNum.trim(), mName.trim(), mMfrNum.trim(), mLoc.trim(), mUom.trim(), mAltUnit.trim(), mConv.trim());
            setManualQueue(q => { const nq = [...q]; for (let c = 0; c < copies; c++) nq.push(item); return nq; });
            setMItemNum(''); setMName(''); setMMfrNum(''); setMLoc(''); setMUom(''); setMAltUnit(''); setMConv(''); setMCopies(1);
        };

        const removeQueueGroup = (startIdx, count) => {
            setManualQueue(q => { const nq = [...q]; nq.splice(startIdx, count); return nq; });
        };

        const getCollapsedQueue = () => {
            const collapsed = []; let offset = 0;
            for (const item of manualQueue) {
                const last = collapsed[collapsed.length - 1];
                if (last && last.item.itemNum === item.itemNum) { last.copies++; }
                else { collapsed.push({ item, copies: 1, startIdx: offset }); }
                offset++;
            }
            return collapsed;
        };

        // ── SKU Lookup tab ──────────────────────────────────────────────────
        const runSkuLookup = () => {
            if (!inventory.length) { return; }
            const lines = skuListInput.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
            if (!lines.length) return;
            const found = [];
            const notFound = [];
            lines.forEach(raw => {
                const ns = normalizeSKU(raw);
                const item = inventory.find(i =>
                    normalizeSKU(i.internalSKU) === ns ||
                    i.manufacturerSKUs.some(m => normalizeSKU(m) === ns)
                );
                if (item) {
                    found.push(makeLabelItem(
                        item.internalSKU, item.itemName,
                        item.manufacturerSKUs[0] || '',
                        item.location, item.uom,
                        item.altUom, item.convFactor
                    ));
                } else {
                    notFound.push(raw);
                }
            });
            setSkuLookupData(found);
            setSkuLookupResults({ found: found.length, notFound });
        };

        const clearSkuLookup = () => {
            setSkuListInput('');
            setSkuLookupData([]);
            setSkuLookupResults(null);
        };

        const generatePDF = async () => {
            if (!activeData.length) return;
            setPdfBusy(true);
            await new Promise(r => setTimeout(r, 30));
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ unit:'pt', format:'letter', orientation:'portrait' });
                const PT = layout.pt;
                const items = activeData;
                const offset = Math.max(0, Math.min(PT.COLS * PT.ROWS - 1, startOffset));
                const PAD = PT.PAD_X, PADY = PT.PAD_Y;
                const INNER_W = PT.LABEL_W - 2*PAD;
                const COL_W = INNER_W/2 - 3;
                const scale = PT.LABEL_H / 96;
                const F_NUM = Math.max(7, Math.round(14*scale)), F_NAME = Math.max(5, Math.round(8.5*scale));
                const F_FIELD = Math.max(5, Math.round(10*scale)), BC_H = Math.max(12, Math.round(24*scale));
                const LINE = Math.max(6, Math.round(12*scale));
                const slotsPerPage = PT.COLS * PT.ROWS;
                let pos = offset;
                const fit = (text, maxW) => { let t = String(text??''); if (doc.getTextWidth(t) <= maxW) return t; while (t.length > 1 && doc.getTextWidth(t+'…') > maxW) t = t.slice(0,-1); return t+'…'; };
                const wrap2 = (text, maxW) => { const words = String(text??'').split(' '); const lines = []; let cur = ''; for (const w of words) { const test = cur ? cur+' '+w : w; if (doc.getTextWidth(test) > maxW) { if (cur) lines.push(cur); cur = w; if (lines.length >= 1) break; } else cur = test; } if (cur) lines.push(cur); return lines.slice(0,2); };
                for (let i = 0; i < items.length; i++) {
                    if (pos >= slotsPerPage) { doc.addPage(); pos = 0; }
                    const item = items[i];
                    const { x, y } = labelOriginPt(pos, PT);
                    let cursor = y + PADY;
                    try { const bcCanvas = document.createElement('canvas'); JsBarcode(bcCanvas, item.itemNum||'00000', { format:barcodeType, width:2, height:80, displayValue:false, margin:0, background:'#ffffff', lineColor:'#000000' }); doc.addImage(bcCanvas.toDataURL('image/png'), 'PNG', x+PAD, cursor, INNER_W, BC_H); } catch(e) {}
                    cursor += BC_H + Math.round(3*scale);
                    doc.setFont('helvetica','bold'); doc.setFontSize(F_NUM); doc.setTextColor(0,0,0);
                    cursor += F_NUM; doc.text(item.itemNum||'', x+PT.LABEL_W/2, cursor, { align:'center' });
                    doc.setFont('helvetica','normal'); doc.setFontSize(F_NAME); doc.setTextColor(20,20,20);
                    const nameLines = wrap2(item.name, INNER_W);
                    cursor += Math.round(2*scale);
                    for (const line of nameLines) { cursor += F_NAME+1; doc.text(line, x+PT.LABEL_W/2, cursor, { align:'center' }); }
                    cursor += Math.round(4*scale);
                    const LEFT_X = x+PAD, RIGHT_X = x+PT.LABEL_W-PAD;
                    let LEFT_Y = cursor, RIGHT_Y = cursor;
                    doc.setFontSize(F_FIELD); doc.setFont('helvetica','bold'); doc.setTextColor(0,0,0);
                    const MFR_LBL = 'Mfr# '; const mfrLW = doc.getTextWidth(MFR_LBL);
                    LEFT_Y += F_FIELD; doc.text(MFR_LBL, LEFT_X, LEFT_Y); doc.setFont('helvetica','normal'); doc.setTextColor(40,40,40); doc.text(fit(item.mfrNum, COL_W-mfrLW), LEFT_X+mfrLW, LEFT_Y);
                    LEFT_Y += LINE; doc.setFont('helvetica','bold'); doc.setTextColor(0,0,0);
                    const UOM_LBL = 'UOM '; const uomLW = doc.getTextWidth(UOM_LBL);
                    doc.text(UOM_LBL, LEFT_X, LEFT_Y); doc.setFont('helvetica','normal'); doc.setTextColor(40,40,40); doc.text(fit(item.uom, COL_W-uomLW), LEFT_X+uomLW, LEFT_Y);
                    RIGHT_Y += F_FIELD; doc.setFont('helvetica','bold'); doc.setTextColor(0,0,0); doc.text(fit(item.loc, COL_W), RIGHT_X, RIGHT_Y, { align:'right' });
                    const altStr = altDisplay(item);
                    if (altStr) { RIGHT_Y += LINE; doc.setFont('helvetica','normal'); doc.setTextColor(60,60,60); doc.text(fit(altStr, COL_W), RIGHT_X, RIGHT_Y, { align:'right' }); }
                    pos++;
                }
                doc.save('shelf_labels.pdf');
            } catch(e) { alert('PDF generation error: ' + e.message); }
            setPdfBusy(false);
        };

        // Render preview DOM into a ref-attached div
        const previewRef = useRef(null);
        useEffect(() => {
            if (!previewRef.current) return;
            const area = previewRef.current;
            // Clear
            while (area.firstChild) area.removeChild(area.firstChild);
            if (!activeData.length) return;
            const PX = layout.px;
            const items = activeData;
            const offset = Math.max(0, Math.min(PX.COLS*PX.ROWS-1, startOffset));
            const slotsPerPage = PX.COLS * PX.ROWS;
            const numPages = Math.ceil((offset + items.length) / slotsPerPage);
            const scale = Math.min(1, PX.LABEL_H / 128);
            for (let p = 0; p < numPages; p++) {
                const hdr = document.createElement('div');
                hdr.className = 'label-pg-header';
                hdr.innerHTML = `<span>Page ${p+1} of ${numPages}</span><span style="background:rgba(255,255,255,0.1); padding:3px 10px; border-radius:12px; font-size:11px;">${PX.COLS} × ${PX.ROWS} · ${slotsPerPage} labels/sheet</span>`;
                area.appendChild(hdr);
                const sheet = document.createElement('div');
                sheet.className = 'label-sheet';
                for (let slot = 0; slot < slotsPerPage; slot++) {
                    const globalSlot = p * slotsPerPage + slot;
                    const itemIdx = globalSlot - offset;
                    const { x, y } = labelOriginPx(slot, PX);
                    if (itemIdx >= 0 && itemIdx < items.length) {
                        const item = items[itemIdx];
                        const cell = document.createElement('div');
                        cell.className = 'lc';
                        cell.style.cssText = `left:${x}px;top:${y}px;width:${PX.LABEL_W}px;height:${PX.LABEL_H}px;`;
                        const inner = document.createElement('div');
                        inner.className = 'lc-inner';
                        inner.style.padding = `${Math.round(PX.PAD_Y)}px ${Math.round(PX.PAD_X)}px ${Math.round(PX.PAD_Y*0.7)}px`;
                        // Barcode
                        const bcH = Math.round(26*scale);
                        const bcWrap = document.createElement('div'); bcWrap.className = 'lc-bc';
                        try {
                            const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
                            JsBarcode(svg, item.itemNum||'00000', { format:barcodeType, width:1.4, height:30, displayValue:false, margin:0, background:'#ffffff', lineColor:'#000000' });
                            svg.removeAttribute('width'); svg.removeAttribute('height'); svg.setAttribute('preserveAspectRatio','none');
                            svg.style.width='100%'; svg.style.height=bcH+'px';
                            bcWrap.appendChild(svg);
                        } catch(e) { bcWrap.textContent = item.itemNum; }
                        inner.appendChild(bcWrap);
                        const num = document.createElement('div'); num.className = 'lc-num'; num.style.fontSize = Math.round(13*scale)+'px'; num.textContent = item.itemNum; inner.appendChild(num);
                        const name = document.createElement('div'); name.className = 'lc-name'; name.style.fontSize = Math.round(8*scale)+'px'; name.textContent = item.name; inner.appendChild(name);
                        const bottom = document.createElement('div'); bottom.className = 'lc-bottom'; bottom.style.marginTop = Math.round(3*scale)+'px';
                        const left = document.createElement('div'); left.className = 'lc-left'; const fs = Math.round(9.5*scale)+'px';
                        const mfr = document.createElement('div'); mfr.className = 'lc-field'; mfr.style.fontSize = fs; mfr.innerHTML = `<b>Mfr#</b> ${escHtml(item.mfrNum)}`; left.appendChild(mfr);
                        const uom = document.createElement('div'); uom.className = 'lc-field'; uom.style.fontSize = fs; uom.innerHTML = `<b>UOM</b> ${escHtml(item.uom)}`; left.appendChild(uom);
                        const right = document.createElement('div'); right.className = 'lc-right';
                        const loc = document.createElement('div'); loc.className = 'lc-loc'; loc.style.fontSize = fs; loc.textContent = item.loc; right.appendChild(loc);
                        const altStr = altDisplay(item);
                        if (altStr) { const altEl = document.createElement('div'); altEl.className = 'lc-field'; altEl.style.fontSize = fs; altEl.textContent = altStr; right.appendChild(altEl); }
                        bottom.appendChild(left); bottom.appendChild(right); inner.appendChild(bottom); cell.appendChild(inner); sheet.appendChild(cell);
                    } else {
                        const empty = document.createElement('div'); empty.className = 'lc lc-empty';
                        empty.style.cssText = `left:${x}px;top:${y}px;width:${PX.LABEL_W}px;height:${PX.LABEL_H}px;`;
                        sheet.appendChild(empty);
                    }
                }
                area.appendChild(sheet);
            }
        }, [activeData, labelSize, startOffset, barcodeType, previewKey]);

        const maxOffset = layout.px.COLS * layout.px.ROWS - 1;

        return (
            <div>
                <div className="page-banner">
                    <div className="container">
                        <div><h1>Label Maker</h1><p>Generate Avery 5162 or 5160 barcode shelf labels</p></div>
                        <div className="page-banner-icon">🏷️</div>
                    </div>
                </div>
                <div className="container page-content">
                    <div className="label-app">
                        {/* Sidebar */}
                        <div className="label-sidebar">
                            {/* Data source */}
                            <div className="card card-sm">
                                <h3>1 · Data Source</h3>
                                <div className="label-source-tabs">
                                    <button className={`lst-tab ${labelTab === 'file' ? 'active' : ''}`} onClick={() => setLabelTab('file')}>📂 File</button>
                                    <button className={`lst-tab ${labelTab === 'lookup' ? 'active' : ''}`} onClick={() => setLabelTab('lookup')}>🔍 SKU List</button>
                                    <button className={`lst-tab ${labelTab === 'manual' ? 'active' : ''}`} onClick={() => setLabelTab('manual')}>✏️ Manual</button>
                                </div>

                                {labelTab === 'file' && (
                                    <div>
                                        <div className="drop-zone" id="labelDropZone"
                                            onDragOver={e => { e.preventDefault(); e.currentTarget.classList.add('over'); }}
                                            onDragLeave={e => e.currentTarget.classList.remove('over')}
                                            onDrop={e => { e.preventDefault(); e.currentTarget.classList.remove('over'); if (e.dataTransfer.files[0]) handleFileUpload(e.dataTransfer.files[0]); }}
                                        >
                                            <input type="file" accept=".xlsx,.xls,.csv" onChange={e => { if (e.target.files[0]) handleFileUpload(e.target.files[0]); }} />
                                            <div className="drop-zone-icon">📊</div>
                                            <p><strong>Drop Inventory Report</strong><br/>or click to browse<br/><span style={{fontSize:'11px'}}>.xlsx · .xls · .csv</span></p>
                                        </div>
                                        {fileName && !fileErr && (
                                            <div className="file-pill show">
                                                <span>✅</span>
                                                <span className="fp-name">{fileName}</span>
                                                <span style={{color:'var(--muted)', fontSize:'11px', whiteSpace:'nowrap'}}>{itemCount} items</span>
                                            </div>
                                        )}
                                        {fileErr && <div className="label-err show">{fileErr}</div>}
                                        <div className="col-map">
                                            <span>C</span> Location · <span>E</span> Item #<br/>
                                            <span>F</span> Mfr # · <span>N</span> Item Name<br/>
                                            <span>O</span> UOM · <span>P</span> Alt Unit · <span>Q</span> Conv.
                                        </div>
                                        <div className="toggle-row" onClick={toggleFilterY} role="button" tabIndex={0} onKeyDown={e => e.key === " " || e.key === "Enter" ? toggleFilterY() : null}>
                                            <div className="toggle-label-text">
                                                Filter Y-prefix items
                                                <small>Excludes items whose Item # starts with "Y"</small>
                                            </div>
                                            <div className="toggle-switch">
                                                <input type="checkbox" checked={filterY} onChange={toggleFilterY} onClick={e => e.stopPropagation()} />
                                                <div className="toggle-track"></div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {labelTab === 'lookup' && (
                                    <div>
                                        <p style={{fontSize:'12px', color:'var(--muted)', marginBottom:'10px', lineHeight:'1.5'}}>
                                            Enter item numbers one per line (or comma-separated). Each will be looked up in the loaded inventory database.
                                        </p>
                                        <textarea
                                            className="form-textarea"
                                            rows={8}
                                            value={skuListInput}
                                            onChange={e => { setSkuListInput(e.target.value); setSkuLookupResults(null); }}
                                            placeholder={'CHM-0001\nCHM-0042\nBIO-0117'}
                                            style={{fontSize:'13px', width:'100%', resize:'vertical'}}
                                        />
                                        <div style={{display:'flex', gap:'8px', marginTop:'8px'}}>
                                            <button
                                                onClick={runSkuLookup}
                                                disabled={!skuListInput.trim() || !inventory.length}
                                                className="btn btn-primary btn-block"
                                                style={{fontSize:'12px', flex:1}}
                                            >
                                                {inventory.length ? 'Look Up Items' : 'Database loading…'}
                                            </button>
                                            {skuLookupData.length > 0 && (
                                                <button onClick={clearSkuLookup} className="btn btn-ghost" style={{fontSize:'12px', padding:'10px 12px'}}>Clear</button>
                                            )}
                                        </div>

                                        {skuLookupResults && (
                                            <div style={{marginTop:'10px'}}>
                                                {skuLookupResults.found > 0 && (
                                                    <div className="alert alert-success" style={{padding:'8px 12px', fontSize:'12px', marginBottom:'6px'}}>
                                                        ✓ {skuLookupResults.found} item{skuLookupResults.found !== 1 ? 's' : ''} found — labels ready to preview
                                                    </div>
                                                )}
                                                {skuLookupResults.notFound.length > 0 && (
                                                    <div className="label-err show">
                                                        <strong>Not found ({skuLookupResults.notFound.length}):</strong>
                                                        <div style={{marginTop:'4px', fontFamily:'var(--mono)', fontSize:'11px', lineHeight:'1.8'}}>
                                                            {skuLookupResults.notFound.map((s, i) => <div key={i}>{s}</div>)}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {skuLookupData.length > 0 && (
                                            <div style={{marginTop:'12px'}}>
                                                <div style={{fontSize:'11px', fontWeight:700, color:'var(--muted)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:'6px'}}>Matched ({skuLookupData.length})</div>
                                                {skuLookupData.map((item, i) => (
                                                    <div key={i} className="queue-item-row">
                                                        <span className="qi-num">{item.itemNum}</span>
                                                        <span className="qi-name-s">{item.name || '—'}</span>
                                                        <span className="qi-copies" style={{color:'var(--muted)', fontSize:'10px'}}>{item.loc}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {labelTab === 'manual' && (
                                    <div>
                                        <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
                                            <div>
                                                <label className="form-label">Item Number *</label>
                                                <input type="text" className="form-input" value={mItemNum} onChange={e => setMItemNum(e.target.value)} onKeyDown={e => e.key === 'Enter' && addManualItem()} placeholder="CHM-0042" style={{fontSize:'13px', padding:'8px 10px'}} />
                                            </div>
                                            <div>
                                                <label className="form-label">Mfr #</label>
                                                <input type="text" className="form-input" value={mMfrNum} onChange={e => setMMfrNum(e.target.value)} placeholder="HCL-37-500ML" style={{fontSize:'13px', padding:'8px 10px'}} />
                                            </div>
                                            <div>
                                                <label className="form-label">Item Name</label>
                                                <input type="text" className="form-input" value={mName} onChange={e => setMName(e.target.value)} style={{fontSize:'13px', padding:'8px 10px'}} />
                                            </div>

                const container = document.createElement('div');
                container.setAttribute('contenteditable', 'true');
                container.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;pointer-events:none;white-space:normal;overflow:visible;';

                const sel = window.getSelection();
                const range = document.createRange();
                range.selectNodeContents(container);

                sel.addRange(range);

                    const ok = document.execCommand('copy');
                    sel.removeAllRanges();
                    document.body.removeChild(container);
