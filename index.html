                            <tbody>{bol.materials.map((m, i) => <tr key={i}><td style={{fontFamily:'var(--mono)', fontSize:'12px'}}>{m.unNumber}</td><td>{m.properShippingName}</td><td style={{textAlign:'center'}}>{m.hazardClass}</td><td style={{textAlign:'center'}}>{m.packingGroup}</td><td>{m.quantity}</td><td>{m.type}</td></tr>)}</tbody>
                        </table>
                    </div>
                )}
            </div>
        );
    }

        /* ══════════════════════════════════════════════════════════════════════
       CYCLE COUNT PAGE
    ══════════════════════════════════════════════════════════════════════ */
    function CycleCountPage({ inventory }) {
        const [session, setSession] = useState(null);
        const [section, setSection] = useState('');
        const [rack, setRack] = useState('');
        const [shelf, setShelf] = useState('');
        const [scannedSKU, setScannedSKU] = useState('');
        const [countQty, setCountQty] = useState('');
        const [recountQty, setRecountQty] = useState('');
        const [currentItem, setCurrentItem] = useState(null);
        const [needsRecount, setNeedsRecount] = useState(false);
        const [countedItems, setCountedItems] = useState([]);
        const [misplacedItem, setMisplacedItem] = useState(null);

        const getUniqueSections = () => {
            const s = new Set();
            inventory.forEach(i => { if (!i.location.toUpperCase().includes('SS')) { const p = parseLocation(i.location); if (p.section) s.add(p.section); } });
            return Array.from(s).sort();
        };
        const getUniqueRacks = (sec) => {
            const r = new Set();
            inventory.forEach(i => { const p = parseLocation(i.location); if (p.section === sec) r.add(p.rack); });
            return Array.from(r).sort((a,b) => a-b);
        };
        const getUniqueShelves = (sec, r) => {
            const s = new Set();
            inventory.forEach(i => { const p = parseLocation(i.location); if (p.section === sec && p.rack === parseInt(r)) s.add(p.shelf); });
            return Array.from(s).sort((a,b) => a-b);
        };
        const getAllMissingItems = () => {
            if (!session) return [];
            const allExpected = inventory.filter(i => { if (i.location.toUpperCase().includes('SS')) return false; const p = parseLocation(i.location); return p.section === session.section && p.rack === parseInt(session.rack); });
            const counted = new Set(countedItems.map(i => normalizeSKU(i.sku)));
            return allExpected.filter(i => !counted.has(normalizeSKU(i.internalSKU)));
        };

        const startSession = () => {
            if (!section || !rack) return;
            const shelves = getUniqueShelves(section, rack);
            setSession({ section, rack, startTime: new Date().toISOString() });
            setShelf(shelves[0]?.toString() || '1');
            setCountedItems([]); setScannedSKU(''); setCurrentItem(null);
        };

        const handleScan = () => {
            if (!scannedSKU.trim()) return;
            const ns = normalizeSKU(scannedSKU);
            const alreadyCounted = countedItems.find(i => normalizeSKU(i.sku) === ns);
            if (alreadyCounted) {
                if (confirm(`Already counted ${alreadyCounted.sku}. Remove previous entry to re-count?`)) {
                    setCountedItems(ci => ci.filter(i => normalizeSKU(i.sku) !== ns));
                } else { setScannedSKU(''); return; }
            }
            const item = inventory.find(i => normalizeSKU(i.internalSKU) === ns || i.manufacturerSKUs.some(m => normalizeSKU(m) === ns));
            if (!item) { alert('SKU not found in database.'); setScannedSKU(''); return; }
            const loc = parseLocation(item.location);
            const curLoc = `${session.section}-${session.rack}-${shelf}`;
            const expLoc = `${loc.section}-${loc.rack}-${loc.shelf}`;
            if (curLoc !== expLoc) { setMisplacedItem({ item, expectedLoc: expLoc }); return; }
            setCurrentItem(item); setCountQty(''); setRecountQty(''); setNeedsRecount(false);
        };

        const submitCount = () => {
            if (!countQty && !needsRecount) return;
            if (needsRecount && !recountQty) return;
            const counted = parseInt(needsRecount ? recountQty : countQty);
            const onHand = parseInt(currentItem.onHand || 0);
            if (counted !== onHand && !needsRecount) { setNeedsRecount(true); return; }
            const loc = parseLocation(currentItem.location);
            const expLoc = `${loc.section}-${loc.rack}-${loc.shelf}`;
            const actLoc = `${session.section}-${session.rack}-${shelf}`;
            setCountedItems(ci => [...ci, {
                sku: currentItem.internalSKU, itemName: currentItem.itemName, expectedLocation: currentItem.location,
                countedAt: actLoc, uom: currentItem.uom, onHand, counted, variance: counted - onHand,
                misplaced: expLoc !== actLoc, timestamp: new Date().toISOString()
            }]);
            setScannedSKU(''); setCurrentItem(null); setCountQty(''); setRecountQty(''); setNeedsRecount(false);
        };

        const nextShelf = () => {
            const shelves = getUniqueShelves(session.section, session.rack);
            const idx = shelves.indexOf(parseInt(shelf));
            if (idx < shelves.length - 1) { setShelf(shelves[idx+1].toString()); setScannedSKU(''); setCurrentItem(null); }
            else {
                const missing = getAllMissingItems();
                alert(`Rack complete. ${missing.length > 0 ? `${missing.length} items not found — export for details.` : 'All expected items counted!'}`);
            }
        };
        const prevShelf = () => {
            const shelves = getUniqueShelves(session.section, session.rack);
            const idx = shelves.indexOf(parseInt(shelf));
            if (idx > 0) { setShelf(shelves[idx-1].toString()); setScannedSKU(''); setCurrentItem(null); }
            else alert('Already at the first shelf.');
        };

        const exportCSV = () => {
            const missing = getAllMissingItems();
            const allRows = [
                ...countedItems.map(i => ({ ...i, status: i.misplaced ? 'MISPLACED' : i.variance === 0 ? 'OK' : 'VARIANCE' })),
                ...missing.map(i => ({ sku: i.internalSKU, itemName: i.itemName, expectedLocation: i.location, countedAt: '-', uom: i.uom, onHand: i.onHand||0, counted: 0, variance: -(parseInt(i.onHand)||0), misplaced: false, status: 'MISSING', timestamp: new Date().toISOString() }))
            ];
            const csv = 'Counted At,Expected Location,SKU,Item,UoM,System On-Hand,Counted,Variance,Status,Time\n' +
                allRows.map(i => `${i.countedAt},${i.expectedLocation},${i.sku},"${i.itemName}",${i.uom},${i.onHand},${i.counted},${i.variance},${i.status},${i.timestamp}`).join('\n');
            const blob = new Blob([csv], { type:'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `cycle_count_${session.section}${session.rack}_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        };

        const endSession = () => { if (confirm('End session? Export your data first!')) { setSession(null); setCountedItems([]); setCurrentItem(null); setSection(''); setRack(''); setShelf(''); } };

        return (
            <div>
                <div className="page-banner">
                    <div className="container">
                        <div><h1>Cycle Count</h1><p>Scan-based physical inventory verification by section and rack</p></div>
                        <div className="page-banner-icon">📦</div>
                    </div>
                </div>
                <div className="container page-content">
                    {!session ? (
                        <div className="card" style={{maxWidth:'480px'}}>
                            <h2>Start New Session</h2>
                            <div className="grid-2">
                                <div className="form-group">
                                    <label className="form-label">Section</label>
                                    <select className="form-select" value={section} onChange={e => { setSection(e.target.value); setRack(''); }}>
                                        <option value="">Select…</option>
                                        {getUniqueSections().map(s => <option key={s} value={s}>Section {s}</option>)}
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Rack</label>
                                    <select className="form-select" value={rack} onChange={e => setRack(e.target.value)} disabled={!section}>
                                        <option value="">Select…</option>
                                        {section && getUniqueRacks(section).map(r => <option key={r} value={r}>Rack {r}</option>)}
                                    </select>
                                </div>
                            </div>
                            <button onClick={startSession} disabled={!section || !rack} className="btn btn-primary btn-block">Start Session</button>
                        </div>
                    ) : (
                        <div>
                            <div className="session-header no-print">
                                <div>
                                    <h3>Section {session.section} — Rack {session.rack} — Shelf {shelf}</h3>
                                    <p>Counted: {countedItems.length} items</p>
                                </div>
                                <div style={{display:'flex', gap:'10px'}}>
                                    <button onClick={() => printDocument(buildCycleCountHTML(countedItems, session, getAllMissingItems()))} disabled={!countedItems.length} className="btn btn-outline btn-sm" style={{color:'#fff', borderColor:'rgba(255,255,255,0.4)'}}>🖨 Print</button>
                                    <button onClick={exportCSV} disabled={!countedItems.length} className="btn btn-gold btn-sm">⬇ CSV</button>
                                    <button onClick={endSession} className="btn btn-red btn-sm">End Session</button>
                                </div>
                            </div>

                            <div className="btn-group no-print" style={{marginBottom:'20px'}}>
                                <button onClick={prevShelf} className="btn btn-ghost" style={{fontSize:'15px'}}>← Previous Shelf</button>
                                <button onClick={nextShelf} className="btn btn-primary" style={{fontSize:'15px'}}>Next Shelf →</button>
                            </div>

                            {misplacedItem ? (
                                <div className="alert alert-error" style={{fontSize:'15px', padding:'20px'}}>
                                    <div style={{fontWeight:700, fontSize:'17px', marginBottom:'10px'}}>⚠ MISPLACED ITEM</div>
                                    <div style={{fontSize:'16px', marginBottom:'4px'}}>{misplacedItem.item.itemName}</div>
                                    <div style={{fontSize:'13px', color:'var(--dark-red)', marginBottom:'4px'}}>SKU: {misplacedItem.item.internalSKU}</div>
                                    <div>Expected: <strong>{misplacedItem.expectedLoc}</strong> · Found at: <strong>{session.section}-{session.rack}-{shelf}</strong></div>
                                    <div className="btn-group" style={{marginTop:'14px'}}>
                                        <button onClick={() => { setCurrentItem(misplacedItem.item); setMisplacedItem(null); setCountQty(''); setRecountQty(''); setNeedsRecount(false); }} className="btn btn-gold">Count Anyway</button>
                                        <button onClick={() => { setMisplacedItem(null); setScannedSKU(''); }} className="btn btn-ghost">Skip</button>
                                    </div>
                                </div>
                            ) : !currentItem ? (
                                <div className="card">
                                    <div className="form-group">
                                        <label className="form-label" style={{fontSize:'14px'}}>Scan or Enter Barcode</label>
                                        <input
                                            type="text"
                                            className="form-input"
                                            value={scannedSKU}
                                            onChange={e => setScannedSKU(e.target.value)}
                                            onKeyPress={e => e.key === 'Enter' && handleScan()}
                                            autoFocus
                                            style={{fontSize:'20px', padding:'16px', textAlign:'center', border:'2px solid var(--royal)', letterSpacing:'0.05em'}}
                                        />
                                    </div>
                                    <button onClick={handleScan} className="btn btn-primary btn-block" style={{fontSize:'16px', padding:'14px'}}>Lookup Item</button>
                                </div>
                            ) : (
                                <div>
                                    <div className="scan-display">
                                        <div className="item-name">{currentItem.itemName}</div>
                                        <div className="item-detail">SKU: <strong style={{fontFamily:'var(--mono)'}}>{currentItem.internalSKU}</strong></div>
                                        <div className="item-detail">Location: {currentItem.location}</div>
                                        <div className="item-detail" style={{fontSize:'18px', marginTop:'8px'}}>Unit: <strong>{currentItem.uom}</strong></div>
                                        <div className="item-detail">System On-Hand: <strong style={{fontSize:'20px'}}>{currentItem.onHand || '0'}</strong></div>
                                        <div className="item-qty-label">{needsRecount ? 'RECOUNT — Mismatch detected. Please count again.' : 'Enter Count'}</div>
                                    </div>
                                    {!needsRecount ? (
                                        <div className="card">
                                            <input type="number" className="count-input-lg" value={countQty} onChange={e => setCountQty(e.target.value)} onKeyPress={e => e.key === 'Enter' && submitCount()} autoFocus />
                                            <button onClick={submitCount} disabled={!countQty} className="btn btn-gold btn-block" style={{marginTop:'14px', fontSize:'16px', padding:'14px'}}>Submit Count</button>
                                        </div>
                                    ) : (
                                        <div className="card">
                                            <div className="alert alert-error">Counted <strong>{countQty}</strong>, system shows <strong>{currentItem.onHand}</strong>. Please recount.</div>
                                            <input type="number" className="count-input-lg recount" value={recountQty} onChange={e => setRecountQty(e.target.value)} onKeyPress={e => e.key === 'Enter' && submitCount()} autoFocus />
                                            <button onClick={submitCount} disabled={!recountQty} className="btn btn-gold btn-block" style={{marginTop:'14px', fontSize:'16px', padding:'14px'}}>Submit Recount</button>
                                        </div>
                                    )}
                                    <button onClick={() => { setCurrentItem(null); setScannedSKU(''); setCountQty(''); setRecountQty(''); setNeedsRecount(false); }} className="btn btn-ghost btn-block" style={{marginTop:'10px'}}>Cancel</button>
                                </div>
                            )}

                            {countedItems.length > 0 && (
                                <div style={{marginTop:'32px'}}>
                                    <h3 style={{marginBottom:'14px'}}>Count Log ({countedItems.length} items)</h3>
                                    <div className="table-wrap">
                                        <table>
                                            <thead><tr><th>Found At</th><th>Expected</th><th>SKU</th><th>Item</th><th>UoM</th><th>System</th><th>Counted</th><th>Variance</th></tr></thead>
                                            <tbody>
                                                {countedItems.map((it, i) => (
                                                    <tr key={i} style={{background: it.variance !== 0 || it.misplaced ? '#fff0ed' : 'white'}}>
                                                        <td style={{fontFamily:'var(--mono)', fontSize:'12px', fontWeight:700}}>{it.countedAt}</td>
                                                        <td style={{fontFamily:'var(--mono)', fontSize:'12px', color: it.misplaced ? 'var(--red)' : 'var(--muted)'}}>{it.expectedLocation}</td>
                                                        <td style={{fontFamily:'var(--mono)', fontSize:'12px'}}>{it.sku}</td>
                                                        <td style={{fontSize:'13px'}}>{it.itemName}</td>
                                                        <td>{it.uom}</td>
                                                        <td style={{textAlign:'center'}}>{it.onHand}</td>
                                                        <td style={{textAlign:'center', fontWeight:700, fontSize:'15px'}}>{it.counted}</td>
                                                        <td style={{textAlign:'center', fontWeight:700, fontSize:'15px', color: it.variance === 0 ? 'var(--green)' : 'var(--red)'}}>{it.variance > 0 ? '+':''}{it.variance}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            </div>
        );
    }

    /* ══════════════════════════════════════════════════════════════════════
       LABEL MAKER PAGE
    ══════════════════════════════════════════════════════════════════════ */
    function LabelsPage({ inventory }) {
        const [labelTab, setLabelTab] = useState('file');
        const [fileData, setFileData] = useState([]);
        const [manualQueue, setManualQueue] = useState([]);
        const [rawRows, setRawRows] = useState([]);
        const [rawFname, setRawFname] = useState('');
        const [filterY, setFilterY] = useState(true);
        const [fileName, setFileName] = useState('');
        const [itemCount, setItemCount] = useState(0);
        const [fileErr, setFileErr] = useState('');
        const [manualErr, setManualErr] = useState('');
        const [labelSize, setLabelSize] = useState('5162');
        const [startOffset, setStartOffset] = useState(0);
        const [barcodeType, setBarcodeType] = useState('CODE128');
        const [pdfBusy, setPdfBusy] = useState(false);
        const [previewKey, setPreviewKey] = useState(0);
        // Manual form
        const [mItemNum, setMItemNum] = useState('');
        const [mName, setMName] = useState('');
        const [mMfrNum, setMMfrNum] = useState('');
        const [mLoc, setMLoc] = useState('');
        const [mUom, setMUom] = useState('');
        const [mAltUnit, setMAltUnit] = useState('');
        const [mConv, setMConv] = useState('');
        const [mCopies, setMCopies] = useState(1);

        const activeData = labelTab === 'file' ? fileData : manualQueue;
        const layout = LAYOUTS[labelSize];

        // Load from inventory file when 'file' tab is active
        const handleFileUpload = (file) => {
            setFileErr('');
            const ext = file.name.split('.').pop().toLowerCase();
            const processRows = (rows) => { setRawRows(rows); setRawFname(file.name); applyFilter(rows, filterY, file.name); };
            if (ext === 'csv') {
                const reader = new FileReader();
                reader.onload = e => { const lines = e.target.result.split(/\r?\n/); const rows = lines.map(l => l.split(',').map(c => c.replace(/^"|"$/g,'').trim())); processRows(rows); };
                reader.readAsText(file);
            } else if (['xlsx','xls'].includes(ext)) {
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const wb = XLSX.read(e.target.result, { type:'array', raw:false });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
                        processRows(rows);
                    } catch(err) { setFileErr('Could not read file: ' + err.message); }
                };
                reader.readAsArrayBuffer(file);
            } else { setFileErr('Please use .xlsx, .xls, or .csv.'); }
        };

        const applyFilter = (rows, fy, fname) => {
            const items = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                const val = String(row[COL_IDX.itemNum] ?? '').trim();
                if (!val) continue;
                if (fy && val.toUpperCase().startsWith('Y')) continue;
                items.push(makeLabelItem(val, String(row[COL_IDX.name]||'').trim(), String(row[COL_IDX.mfrNum]||'').trim(), String(row[COL_IDX.loc]||'').trim(), String(row[COL_IDX.uom]||'').trim(), String(row[COL_IDX.altUnit]||'').trim(), String(row[COL_IDX.convFactor]||'').trim()));
            }
            if (!items.length) { setFileErr('No data rows found. Try toggling the Y-prefix filter.'); return; }
            setFileData(items); setFileName(fname || rawFname); setItemCount(items.length); setFileErr('');
        };

        const toggleFilterY = () => {
            const nf = !filterY; setFilterY(nf);
            if (rawRows.length) applyFilter(rawRows, nf, rawFname);
        };

        const addManualItem = () => {
            if (!mItemNum.trim()) { setManualErr('Item Number is required.'); return; }
            setManualErr('');
            const copies = Math.max(1, Math.min(50, mCopies || 1));
            const item = makeLabelItem(mItemNum.trim(), mName.trim(), mMfrNum.trim(), mLoc.trim(), mUom.trim(), mAltUnit.trim(), mConv.trim());
            setManualQueue(q => { const nq = [...q]; for (let c = 0; c < copies; c++) nq.push(item); return nq; });
            setMItemNum(''); setMName(''); setMMfrNum(''); setMLoc(''); setMUom(''); setMAltUnit(''); setMConv(''); setMCopies(1);
        };

        const removeQueueGroup = (startIdx, count) => {
            setManualQueue(q => { const nq = [...q]; nq.splice(startIdx, count); return nq; });
        };

        const getCollapsedQueue = () => {
            const collapsed = []; let offset = 0;
            for (const item of manualQueue) {
                const last = collapsed[collapsed.length - 1];
                if (last && last.item.itemNum === item.itemNum) { last.copies++; }
                else { collapsed.push({ item, copies: 1, startIdx: offset }); }
                offset++;
            }
            return collapsed;
        };

        const generatePDF = async () => {
            if (!activeData.length) return;
            setPdfBusy(true);
            await new Promise(r => setTimeout(r, 30));
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ unit:'pt', format:'letter', orientation:'portrait' });
                const PT = layout.pt;
                const items = activeData;
                const offset = Math.max(0, Math.min(PT.COLS * PT.ROWS - 1, startOffset));
                const PAD = PT.PAD_X, PADY = PT.PAD_Y;
                const INNER_W = PT.LABEL_W - 2*PAD;
                const COL_W = INNER_W/2 - 3;
                const scale = PT.LABEL_H / 96;
                const F_NUM = Math.max(7, Math.round(14*scale)), F_NAME = Math.max(5, Math.round(8.5*scale));
                const F_FIELD = Math.max(5, Math.round(10*scale)), BC_H = Math.max(12, Math.round(24*scale));
                const LINE = Math.max(6, Math.round(12*scale));
                const slotsPerPage = PT.COLS * PT.ROWS;
                let pos = offset;
                const fit = (text, maxW) => { let t = String(text??''); if (doc.getTextWidth(t) <= maxW) return t; while (t.length > 1 && doc.getTextWidth(t+'…') > maxW) t = t.slice(0,-1); return t+'…'; };
                const wrap2 = (text, maxW) => { const words = String(text??'').split(' '); const lines = []; let cur = ''; for (const w of words) { const test = cur ? cur+' '+w : w; if (doc.getTextWidth(test) > maxW) { if (cur) lines.push(cur); cur = w; if (lines.length >= 1) break; } else cur = test; } if (cur) lines.push(cur); return lines.slice(0,2); };
                for (let i = 0; i < items.length; i++) {
                    if (pos >= slotsPerPage) { doc.addPage(); pos = 0; }
                    const item = items[i];
                    const { x, y } = labelOriginPt(pos, PT);
                    let cursor = y + PADY;
                    try { const bcCanvas = document.createElement('canvas'); JsBarcode(bcCanvas, item.itemNum||'00000', { format:barcodeType, width:2, height:80, displayValue:false, margin:0, background:'#ffffff', lineColor:'#000000' }); doc.addImage(bcCanvas.toDataURL('image/png'), 'PNG', x+PAD, cursor, INNER_W, BC_H); } catch(e) {}
                    cursor += BC_H + Math.round(3*scale);
                    doc.setFont('helvetica','bold'); doc.setFontSize(F_NUM); doc.setTextColor(0,0,0);
                    cursor += F_NUM; doc.text(item.itemNum||'', x+PT.LABEL_W/2, cursor, { align:'center' });
                    doc.setFont('helvetica','normal'); doc.setFontSize(F_NAME); doc.setTextColor(20,20,20);
                    const nameLines = wrap2(item.name, INNER_W);
                    cursor += Math.round(2*scale);
                    for (const line of nameLines) { cursor += F_NAME+1; doc.text(line, x+PT.LABEL_W/2, cursor, { align:'center' }); }
                    cursor += Math.round(4*scale);
                    const LEFT_X = x+PAD, RIGHT_X = x+PT.LABEL_W-PAD;
                    let LEFT_Y = cursor, RIGHT_Y = cursor;
                    doc.setFontSize(F_FIELD); doc.setFont('helvetica','bold'); doc.setTextColor(0,0,0);
                    const MFR_LBL = 'Mfr# '; const mfrLW = doc.getTextWidth(MFR_LBL);
                    LEFT_Y += F_FIELD; doc.text(MFR_LBL, LEFT_X, LEFT_Y); doc.setFont('helvetica','normal'); doc.setTextColor(40,40,40); doc.text(fit(item.mfrNum, COL_W-mfrLW), LEFT_X+mfrLW, LEFT_Y);
                    LEFT_Y += LINE; doc.setFont('helvetica','bold'); doc.setTextColor(0,0,0);
                    const UOM_LBL = 'UOM '; const uomLW = doc.getTextWidth(UOM_LBL);
                    doc.text(UOM_LBL, LEFT_X, LEFT_Y); doc.setFont('helvetica','normal'); doc.setTextColor(40,40,40); doc.text(fit(item.uom, COL_W-uomLW), LEFT_X+uomLW, LEFT_Y);
                    RIGHT_Y += F_FIELD; doc.setFont('helvetica','bold'); doc.setTextColor(0,0,0); doc.text(fit(item.loc, COL_W), RIGHT_X, RIGHT_Y, { align:'right' });
                    const altStr = altDisplay(item);
                    if (altStr) { RIGHT_Y += LINE; doc.setFont('helvetica','normal'); doc.setTextColor(60,60,60); doc.text(fit(altStr, COL_W), RIGHT_X, RIGHT_Y, { align:'right' }); }
                    pos++;
                }
                doc.save('shelf_labels.pdf');
            } catch(e) { alert('PDF generation error: ' + e.message); }
            setPdfBusy(false);
        };

        // Render preview DOM into a ref-attached div
        const previewRef = useRef(null);
        useEffect(() => {
            if (!previewRef.current) return;
            const area = previewRef.current;
            // Clear
            while (area.firstChild) area.removeChild(area.firstChild);
            if (!activeData.length) return;
            const PX = layout.px;
            const items = activeData;
            const offset = Math.max(0, Math.min(PX.COLS*PX.ROWS-1, startOffset));
            const slotsPerPage = PX.COLS * PX.ROWS;
            const numPages = Math.ceil((offset + items.length) / slotsPerPage);
            const scale = Math.min(1, PX.LABEL_H / 128);
            for (let p = 0; p < numPages; p++) {
                const hdr = document.createElement('div');
                hdr.className = 'label-pg-header';
                hdr.innerHTML = `<span>Page ${p+1} of ${numPages}</span><span style="background:rgba(255,255,255,0.1); padding:3px 10px; border-radius:12px; font-size:11px;">${PX.COLS} × ${PX.ROWS} · ${slotsPerPage} labels/sheet</span>`;
                area.appendChild(hdr);
                const sheet = document.createElement('div');
                sheet.className = 'label-sheet';
                for (let slot = 0; slot < slotsPerPage; slot++) {
                    const globalSlot = p * slotsPerPage + slot;
                    const itemIdx = globalSlot - offset;
                    const { x, y } = labelOriginPx(slot, PX);
                    if (itemIdx >= 0 && itemIdx < items.length) {
                        const item = items[itemIdx];
                        const cell = document.createElement('div');
                        cell.className = 'lc';
                        cell.style.cssText = `left:${x}px;top:${y}px;width:${PX.LABEL_W}px;height:${PX.LABEL_H}px;`;
                        const inner = document.createElement('div');
                        inner.className = 'lc-inner';
                        inner.style.padding = `${Math.round(PX.PAD_Y)}px ${Math.round(PX.PAD_X)}px ${Math.round(PX.PAD_Y*0.7)}px`;
                        // Barcode
                        const bcH = Math.round(26*scale);
                        const bcWrap = document.createElement('div'); bcWrap.className = 'lc-bc';
                        try {
                            const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
                            JsBarcode(svg, item.itemNum||'00000', { format:barcodeType, width:1.4, height:30, displayValue:false, margin:0, background:'#ffffff', lineColor:'#000000' });
                            svg.removeAttribute('width'); svg.removeAttribute('height'); svg.setAttribute('preserveAspectRatio','none');
                            svg.style.width='100%'; svg.style.height=bcH+'px';
                            bcWrap.appendChild(svg);
                        } catch(e) { bcWrap.textContent = item.itemNum; }
                        inner.appendChild(bcWrap);
                        const num = document.createElement('div'); num.className = 'lc-num'; num.style.fontSize = Math.round(13*scale)+'px'; num.textContent = item.itemNum; inner.appendChild(num);
                        const name = document.createElement('div'); name.className = 'lc-name'; name.style.fontSize = Math.round(8*scale)+'px'; name.textContent = item.name; inner.appendChild(name);
                        const bottom = document.createElement('div'); bottom.className = 'lc-bottom'; bottom.style.marginTop = Math.round(3*scale)+'px';
                        const left = document.createElement('div'); left.className = 'lc-left'; const fs = Math.round(9.5*scale)+'px';
                        const mfr = document.createElement('div'); mfr.className = 'lc-field'; mfr.style.fontSize = fs; mfr.innerHTML = `<b>Mfr#</b> ${escHtml(item.mfrNum)}`; left.appendChild(mfr);
                        const uom = document.createElement('div'); uom.className = 'lc-field'; uom.style.fontSize = fs; uom.innerHTML = `<b>UOM</b> ${escHtml(item.uom)}`; left.appendChild(uom);
                        const right = document.createElement('div'); right.className = 'lc-right';
                        const loc = document.createElement('div'); loc.className = 'lc-loc'; loc.style.fontSize = fs; loc.textContent = item.loc; right.appendChild(loc);
                        const altStr = altDisplay(item);
                        if (altStr) { const altEl = document.createElement('div'); altEl.className = 'lc-field'; altEl.style.fontSize = fs; altEl.textContent = altStr; right.appendChild(altEl); }
                        bottom.appendChild(left); bottom.appendChild(right); inner.appendChild(bottom); cell.appendChild(inner); sheet.appendChild(cell);
                    } else {
                        const empty = document.createElement('div'); empty.className = 'lc lc-empty';
                        empty.style.cssText = `left:${x}px;top:${y}px;width:${PX.LABEL_W}px;height:${PX.LABEL_H}px;`;
                        sheet.appendChild(empty);
                    }
                }
                area.appendChild(sheet);
            }
        }, [activeData, labelSize, startOffset, barcodeType, previewKey]);

        const maxOffset = layout.px.COLS * layout.px.ROWS - 1;

        return (
            <div>
                <div className="page-banner">
                    <div className="container">
                        <div><h1>Label Maker</h1><p>Generate Avery 5162 or 5160 barcode shelf labels</p></div>
                        <div className="page-banner-icon">🏷️</div>
                    </div>
                </div>
                <div className="container page-content">
                    <div className="label-app">
                        {/* Sidebar */}
                        <div className="label-sidebar">
                            {/* Data source */}
                            <div className="card card-sm">
                                <h3>1 · Data Source</h3>
                                <div className="label-source-tabs">
                                    <button className={`lst-tab ${labelTab === 'file' ? 'active' : ''}`} onClick={() => setLabelTab('file')}>📂 File Import</button>
                                    <button className={`lst-tab ${labelTab === 'manual' ? 'active' : ''}`} onClick={() => setLabelTab('manual')}>✏️ Manual</button>
                                </div>

                                {labelTab === 'file' && (
                                    <div>
                                        <div className="drop-zone" id="labelDropZone"
                                            onDragOver={e => { e.preventDefault(); e.currentTarget.classList.add('over'); }}
                                            onDragLeave={e => e.currentTarget.classList.remove('over')}
                                            onDrop={e => { e.preventDefault(); e.currentTarget.classList.remove('over'); if (e.dataTransfer.files[0]) handleFileUpload(e.dataTransfer.files[0]); }}
                                        >
                                            <input type="file" accept=".xlsx,.xls,.csv" onChange={e => { if (e.target.files[0]) handleFileUpload(e.target.files[0]); }} />
                                            <div className="drop-zone-icon">📊</div>
                                            <p><strong>Drop Inventory Report</strong><br/>or click to browse<br/><span style={{fontSize:'11px'}}>.xlsx · .xls · .csv</span></p>
                                        </div>
                                        {fileName && !fileErr && (
                                            <div className="file-pill show">
                                                <span>✅</span>
                                                <span className="fp-name">{fileName}</span>
                                                <span style={{color:'var(--muted)', fontSize:'11px', whiteSpace:'nowrap'}}>{itemCount} items</span>
                                            </div>
                                        )}
                                        {fileErr && <div className="label-err show">{fileErr}</div>}
                                        <div className="col-map">
                                            <span>C</span> Location · <span>E</span> Item #<br/>
                                            <span>F</span> Mfr # · <span>N</span> Item Name<br/>
                                            <span>O</span> UOM · <span>P</span> Alt Unit · <span>Q</span> Conv.
                                        </div>
                                        <div className="toggle-row" onClick={toggleFilterY} role="button" tabIndex={0} onKeyDown={e => e.key === " " || e.key === "Enter" ? toggleFilterY() : null}>
                                            <div className="toggle-label-text">
                                                Filter Y-prefix items
                                                <small>Excludes items whose Item # starts with "Y"</small>
                                            </div>
                                            <div className="toggle-switch">
                                                <input type="checkbox" checked={filterY} onChange={toggleFilterY} onClick={e => e.stopPropagation()} />
                                                <div className="toggle-track"></div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {labelTab === 'manual' && (
                                    <div>
                                        <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
                                            <div>
                                                <label className="form-label">Item Number *</label>
                                                <input type="text" className="form-input" value={mItemNum} onChange={e => setMItemNum(e.target.value)} onKeyDown={e => e.key === 'Enter' && addManualItem()} placeholder="CHM-0042" style={{fontSize:'13px', padding:'8px 10px'}} />
                                            </div>
                                            <div>
                                                <label className="form-label">Mfr #</label>
                                                <input type="text" className="form-input" value={mMfrNum} onChange={e => setMMfrNum(e.target.value)} placeholder="HCL-37-500ML" style={{fontSize:'13px', padding:'8px 10px'}} />
                                            </div>
                                            <div>
                                                <label className="form-label">Item Name</label>
                                                <input type="text" className="form-input" value={mName} onChange={e => setMName(e.target.value)} style={{fontSize:'13px', padding:'8px 10px'}} />
                                            </div>
                                            <div>
                                                <label className="form-label">Location</label>
                                                <input type="text" className="form-input" value={mLoc} onChange={e => setMLoc(e.target.value)} placeholder="A-1-3" style={{fontSize:'13px', padding:'8px 10px'}} />
                                            </div>
                                            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px'}}>
                                                <div>
                                                    <label className="form-label">UOM</label>
                                                    <input type="text" className="form-input" value={mUom} onChange={e => setMUom(e.target.value)} style={{fontSize:'13px', padding:'8px 10px'}} />
                                                </div>
                                                <div>
                                                    <label className="form-label">Copies</label>
                                                    <input type="number" className="form-input" value={mCopies} onChange={e => setMCopies(parseInt(e.target.value)||1)} min="1" max="50" style={{fontSize:'13px', padding:'8px 10px'}} />
                                                </div>
                                            </div>
                                        </div>
                                        {manualErr && <div className="label-err show" style={{marginTop:'8px'}}>{manualErr}</div>}
                                        <button onClick={addManualItem} className="btn btn-outline btn-block" style={{marginTop:'10px', fontSize:'12px'}}>+ Add to Queue</button>

                                        {manualQueue.length > 0 && (
                                            <div style={{marginTop:'14px'}}>
                                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'8px'}}>
                                                    <span style={{fontSize:'11px', fontWeight:700, color:'var(--muted)', letterSpacing:'0.08em', textTransform:'uppercase'}}>Queue ({manualQueue.length})</span>
                                                    <button onClick={() => setManualQueue([])} style={{background:'none', border:'none', fontSize:'11px', color:'var(--red)', cursor:'pointer', fontFamily:'var(--sans)'}}>Clear all</button>
                                                </div>
                                                {getCollapsedQueue().map((g, i) => (
                                                    <div key={i} className="queue-item-row">
                                                        <span className="qi-num">{g.item.itemNum}</span>
                                                        <span className="qi-name-s">{g.item.name || '—'}</span>
                                                        {g.copies > 1 && <span className="qi-copies">×{g.copies}</span>}
                                                        <button className="qi-del" onClick={() => removeQueueGroup(g.startIdx, g.copies)}>×</button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>

                            {/* Options */}
                            <div className="card card-sm">
                                <h3>2 · Options</h3>
                                <div className="form-group">
                                    <label className="form-label">Label Size</label>
                                    <select className="form-select" value={labelSize} onChange={e => { setLabelSize(e.target.value); setStartOffset(0); }} style={{fontSize:'13px', padding:'8px 10px'}}>
                                        <option value="5162">5162 — 1⅓″ × 4″ (14-up, 2×7)</option>
                                        <option value="5160">5160 — 1″ × 2⅝″ (30-up, 3×10)</option>
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Skip Positions (partial sheet)</label>
                                    <input type="number" className="form-input" value={startOffset} onChange={e => setStartOffset(Math.max(0, Math.min(maxOffset, parseInt(e.target.value)||0)))} min="0" max={maxOffset} style={{fontSize:'13px', padding:'8px 10px'}} />
                                    <div style={{fontSize:'11px', color:'var(--muted)', marginTop:'4px'}}>0 = top-left · {maxOffset} = last position</div>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Barcode Format</label>
                                    <select className="form-select" value={barcodeType} onChange={e => setBarcodeType(e.target.value)} style={{fontSize:'13px', padding:'8px 10px'}}>
                                        <option value="CODE128">Code 128 (recommended)</option>
                                        <option value="CODE39">Code 39</option>
                                    </select>
                                </div>
                            </div>

                            {/* Output */}
                            <div className="card card-sm">
                                <h3>3 · Output</h3>
                                <button className="btn btn-gold btn-block" disabled={!activeData.length || pdfBusy} onClick={generatePDF} style={{marginBottom:'8px'}}>
                                    {pdfBusy ? <><span className="spinner" style={{display:'inline-block'}}></span> Generating…</> : '⬇ Download PDF'}
                                </button>
                                <button className="btn btn-outline btn-block" disabled={!activeData.length} onClick={() => setPreviewKey(k => k+1)} style={{fontSize:'12px'}}>
                                    👁 Refresh Preview
                                </button>
                            </div>
                        </div>

                        {/* Preview */}
                        <div>
                            <div className="label-preview-area">
                                {activeData.length === 0 && (
                                    <div className="label-empty-state">
                                        <div className="ei">🏷</div>
                                        <p>Load a file or add items manually to preview labels here.</p>
                                    </div>
                                )}
                                <div ref={previewRef} style={{display:'flex', flexDirection:'column', alignItems:'center', width:'100%'}}></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
