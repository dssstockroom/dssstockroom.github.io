<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Catalog Lookup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.typekit.net/myu6uxh.css">
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Roboto', sans-serif; background: #f8f9fa; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Instrument Serif', Georgia, serif; font-weight: normal; }
        .container { max-width: 1200px; margin: 0 auto; padding: 32px 20px; }
        .header { text-align: center; border-bottom: 3px solid #003594; padding-bottom: 24px; margin-bottom: 40px; }
        .header img { height: 80px; margin-bottom: 12px; }
        .header h1 { color: #003594; font-size: 32px; margin: 8px 0; letter-spacing: -0.5px; }
        .header p { color: #00205B; margin: 4px 0; font-size: 15px; font-family: 'alternate-gothic-no-3-d', 'Roboto', sans-serif; letter-spacing: 0.5px; text-transform: uppercase; }
        .tabs { display: flex; gap: 4px; background: white; border-radius: 8px 8px 0 0; padding: 8px 8px 0 8px; margin-bottom: 0; border: 2px solid #e5e7eb; border-bottom: none; }
        .tab { padding: 14px 28px; font-weight: 600; background: none; border: none; color: #6b7280; cursor: pointer; border-radius: 6px 6px 0 0; transition: all 0.2s; font-size: 14px; font-family: 'alternate-gothic-no-3-d', 'Roboto', sans-serif; letter-spacing: 0.8px; text-transform: uppercase; }
        .tab:hover { background: #DBEEFF; color: #003594; }
        .tab.active { background: #003594; color: #FFB81C; font-weight: 700; }
        .card { background: white; border: 2px solid #e5e7eb; border-top: none; border-radius: 0 0 8px 8px; padding: 32px; margin-bottom: 24px; }
        .card:not(:first-child) { border-top: 2px solid #e5e7eb; border-radius: 8px; }
        .card h2 { color: #003594; font-size: 28px; margin: 0 0 24px 0; letter-spacing: -0.5px; }
        .card h3 { color: #00205B; font-size: 20px; margin: 24px 0 16px 0; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-weight: 600; font-size: 13px; color: #00205B; margin-bottom: 8px; font-family: 'alternate-gothic-no-3-d', 'Roboto', sans-serif; letter-spacing: 0.5px; text-transform: uppercase; }
        .form-input, .form-textarea { width: 100%; padding: 12px 16px; border: 2px solid #C8C9C7; border-radius: 6px; font-size: 15px; font-family: 'Roboto', sans-serif; transition: all 0.2s; background: white; }
        .form-input:focus, .form-textarea:focus { outline: none; border-color: #003594; box-shadow: 0 0 0 3px #DBEEFF; }
        .form-textarea { font-family: monospace; resize: vertical; }
        .btn { padding: 14px 28px; font-weight: 700; border-radius: 6px; cursor: pointer; border: 2px solid; font-size: 13px; display: inline-flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; font-family: 'alternate-gothic-no-3-d', 'Roboto', sans-serif; letter-spacing: 0.8px; text-transform: uppercase; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: #003594; color: white; border-color: #003594; }
        .btn-primary:hover:not(:disabled) { background: #00205B; border-color: #00205B; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,53,148,0.3); }
        .btn-secondary { background: #FFB81C; color: #003594; border-color: #FFB81C; }
        .btn-secondary:hover { background: #e6a513; border-color: #e6a513; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,184,28,0.4); }
        .btn-gray { background: white; color: #00205B; border-color: #C8C9C7; }
        .btn-gray:hover { background: #f8f9fa; border-color: #00205B; }
        .btn-red { background: #FF5B45; color: white; border-color: #FF5B45; }
        .btn-red:hover { background: #e54a35; border-color: #e54a35; }
        .btn-block { width: 100%; }
        .btn-group { display: flex; gap: 16px; }
        .btn-group .btn { flex: 1; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .alert { padding: 16px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: start; gap: 12px; border: 2px solid; }
        .alert-success { background: #d1fae5; border-color: #00AD6E; color: #065f46; }
        .alert-error { background: #FFDECD; border-color: #FF5B45; color: #770538; }
        .alert-info { background: #DBEEFF; border-color: #66B2E3; color: #00205B; }
        table { width: 100%; border-collapse: collapse; border: 2px solid #00205B; background: white; }
        th, td { padding: 14px 10px; border: 1px solid #C8C9C7; text-align: left; }
        th { background: #DBEEFF; font-weight: 700; cursor: pointer; user-select: none; color: #00205B; font-family: 'alternate-gothic-no-3-d', 'Roboto', sans-serif; font-size: 13px; letter-spacing: 0.5px; text-transform: uppercase; transition: all 0.15s; }
        th:hover { background: #66B2E3; color: white; }
        tbody tr:hover { background: #DBEEFF; }
        tbody tr { transition: background 0.15s; }
        .text-center { text-align: center; }
        .text-mono { font-family: monospace; }
        .history-item { border: 2px solid #C8C9C7; border-radius: 8px; padding: 20px; margin-bottom: 16px; background: white; transition: all 0.2s; }
        .history-item:hover { border-color: #003594; box-shadow: 0 4px 12px rgba(0,53,148,0.15); transform: translateY(-2px); }
        .history-item h3 { font-family: 'alternate-gothic-no-3-d', 'Roboto', sans-serif; letter-spacing: 0.5px; }
        .history-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
        .preview-box { max-height: 400px; overflow-y: auto; border: 2px solid #C8C9C7; border-radius: 6px; }
        @media screen { .print-only { display: none !important; } }
        @media print {
            body { margin: 0; padding: 20px; background: white; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            table { font-size: 11px; page-break-inside: auto; border-color: #000; }
            th, td { border-color: #000; }
            th { background: #f9fafb !important; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            th, td { padding: 6px 4px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [inventory, setInventory] = useState([]);
            const [activeTab, setActiveTab] = useState('search');
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState(null);
            const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });
            const [error, setError] = useState('');
            const [uploadSuccess, setUploadSuccess] = useState(false);
            const [fileName, setFileName] = useState('');
            const [fileLastModified, setFileLastModified] = useState(null);
            const [packingSlip, setPackingSlip] = useState({ supplier: '', poNumber: '', dateReceived: '', receivedBy: '', items: [], notes: '', notFoundSKUs: [] });
            const [itemInput, setItemInput] = useState('');
            const [packingSlipError, setPackingSlipError] = useState('');
            const [savedPackingSlips, setSavedPackingSlips] = useState([]);
            const [historySearchQuery, setHistorySearchQuery] = useState('');
            const [selectedSlip, setSelectedSlip] = useState(null);
            const [hazmatBOL, setHazmatBOL] = useState({
                shipperName: 'UNIVERSITY OF PITTSBURGH', shipperAttn: '', shipperAddress: 'CHEMISTRY STOCKROOM', shipperAddress2: '219 PARKMAN AVE RM326',
                shipperCity: 'PITTSBURGH', shipperState: 'PA', shipperZip: '15213', shipperPhone: '412-624-8551',
                consigneeName: '', consigneeAttn: '', consigneeAddress: '', consigneeAddress2: '', consigneeCity: '', consigneeState: '', consigneeZip: '', consigneePhone: '',
                carrierName: '', carrierPhone: '', shipDate: '', emergencyContact: '', emergencyPhone: '', materials: []
            });
            const [hazmatInput, setHazmatInput] = useState('');

            useEffect(() => {
                // Load inventory from embedded file
                fetch('inventory-status-report.xlsx')
                    .then(response => response.arrayBuffer())
                    .then(arrayBuffer => {
                        try {
                            const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                            const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, raw: false, defval: '' });
                            if (jsonData.length < 2) return;
                            const data = [];
                            for (let i = 1; i < jsonData.length; i++) {
                                const row = jsonData[i];
                                if (row.length >= 15 && row[4]) {
                                    const item = {
                                        location: String(row[2] || '').trim(), 
                                        internalSKU: String(row[4] || '').trim(),
                                        manufacturerSKUs: [String(row[5] || '').trim(), String(row[6] || '').trim(), String(row[7] || '').trim(), String(row[8] || '').trim()].filter(sku => sku.length > 0),
                                        itemName: String(row[13] || '').trim(), 
                                        uom: String(row[14] || '').trim(), 
                                        altUom: String(row[15] || '').trim(),
                                        convFactor: String(row[16] || '').trim(), 
                                        childPartNbr: String(row[17] || '').trim(), 
                                        childConvFactor: String(row[18] || '').trim(),
                                        vendor: String(row[12] || '').trim(), 
                                        externalPrice: String(row[26] || '').trim(),
                                        ourPrice: String(row[27] || '').trim()
                                    };
                                    if (item.internalSKU && item.location) data.push(item);
                                }
                            }
                            setInventory(data);
                            setFileName('inventory-status-report.xlsx');
                        } catch (err) {
                            console.error('Error reading embedded file:', err);
                        }
                    })
                    .catch(err => console.error('Error loading inventory file:', err));

                // Check file modification time
                fetch('inventory-status-report.xlsx', { method: 'HEAD' })
                    .then(response => {
                        const lastModified = response.headers.get('Last-Modified');
                        if (lastModified) setFileLastModified(new Date(lastModified));
                    })
                    .catch(() => {});

                // Load saved packing slips
                try {
                    const savedSlips = localStorage.getItem('stockroom_packing_slips');
                    if (savedSlips) setSavedPackingSlips(JSON.parse(savedSlips));
                } catch (err) { console.error('Error loading saved data:', err); }
            }, []);

            const handleFileUpload = (e) => {
                // This function is no longer used but kept for compatibility
            };

            const getUploadDate = () => {
                if (fileLastModified) return fileLastModified.toLocaleDateString() + ' at ' + fileLastModified.toLocaleTimeString();
                return null;
            };

            const parseLocation = (location) => {
                const normalized = location.replace(/\s+/g, '').replace(/-+/g, '-');
                const excludeKeywords = ['HALLWAY', 'WASTEROOM', 'DOCKCAGE', 'THOMAS'];
                const upperLocation = location.toUpperCase();
                for (const keyword of excludeKeywords) { if (upperLocation.includes(keyword)) return { section: null, rack: 999, shelf: 999, original: location }; }
                if (upperLocation === 'NEW' || upperLocation === 'NEW-' || upperLocation === 'NEW--') return { section: null, rack: 999, shelf: 999, original: location };
                let sectionMatch = normalized.match(/(?:DISC|NEW)\s*([A-Za-z])-?(\d+)-?(\d+)/i);
                if (sectionMatch) return { section: sectionMatch[1].toUpperCase(), rack: parseInt(sectionMatch[2]), shelf: parseInt(sectionMatch[3]), original: location };
                const match = normalized.match(/^([A-Za-z])-?(\d+)-?([A-Za-z]?\d+[A-Za-z]?)/);
                if (match) { const shelfNum = parseInt(match[3].replace(/[A-Za-z]/g, '')) || 0; return { section: match[1].toUpperCase(), rack: parseInt(match[2]), shelf: shelfNum, original: location }; }
                return { section: 'Z', rack: 999, shelf: 999, original: location };
            };

            const sortByLocation = (items) => [...items].sort((a, b) => {
                const locA = parseLocation(a.location), locB = parseLocation(b.location);
                if (locA.section !== locB.section) return locA.section.localeCompare(locB.section);
                if (locA.rack !== locB.rack) return locA.rack - locB.rack;
                return locA.shelf - locB.shelf;
            });

            const normalizeSKU = (sku) => sku.replace(/-/g, '').toUpperCase();

            const handleGeneralSearch = () => {
                if (!inventory.length) { setError('Please upload a database file first'); return; }
                const query = searchQuery.trim().toLowerCase();
                if (query.length === 0) { setError('Please enter a search term'); return; }
                const queryWords = query.split(/\s+/).filter(w => w.length > 0);
                const normalizedQuery = normalizeSKU(query);
                const found = inventory.filter(item => {
                    const normalizedInternalSKU = normalizeSKU(item.internalSKU);
                    const normalizedMfgSKUs = item.manufacturerSKUs.map(sku => normalizeSKU(sku));
                    if (normalizedInternalSKU.includes(normalizedQuery) || normalizedQuery.includes(normalizedInternalSKU)) return true;
                    if (normalizedMfgSKUs.some(sku => sku.includes(normalizedQuery) || normalizedQuery.includes(sku))) return true;
                    const itemNameLower = item.itemName.toLowerCase();
                    if (queryWords.every(word => itemNameLower.includes(word))) return true;
                    if (item.vendor) { const vendorLower = item.vendor.toLowerCase(); if (queryWords.every(word => vendorLower.includes(word))) return true; }
                    return false;
                });
                setSearchResults(found); setSortConfig({ key: null, direction: 'asc' }); setError('');
            };

            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };

            const getSortedResults = (results) => {
                if (!sortConfig.key || !results) return results;
                const sorted = [...results].sort((a, b) => {
                    let aValue = a[sortConfig.key], bValue = b[sortConfig.key];
                    if (sortConfig.key === 'manufacturerSKUs') { aValue = a.manufacturerSKUs.join(', '); bValue = b.manufacturerSKUs.join(', '); }
                    if (sortConfig.key === 'ourPrice' || sortConfig.key === 'externalPrice') { 
                        aValue = parseFloat(aValue || 0); 
                        bValue = parseFloat(bValue || 0); 
                        if (sortConfig.key === 'externalPrice') {
                            aValue = aValue * 1.54;
                            bValue = bValue * 1.54;
                        }
                    }
                    if (sortConfig.key === 'location') {
                        const locA = parseLocation(a.location), locB = parseLocation(b.location);
                        if (locA.section !== locB.section) { const result = locA.section.localeCompare(locB.section); return sortConfig.direction === 'asc' ? result : -result; }
                        if (locA.rack !== locB.rack) { const result = locA.rack - locB.rack; return sortConfig.direction === 'asc' ? result : -result; }
                        const result = locA.shelf - locB.shelf; return sortConfig.direction === 'asc' ? result : -result;
                    }
                    if (typeof aValue === 'string') { aValue = aValue.toLowerCase(); bValue = bValue ? bValue.toLowerCase() : ''; }
                    if (aValue < bValue) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (aValue > bValue) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });
                return sorted;
            };

            const SortIcon = ({ columnKey }) => {
                if (sortConfig.key !== columnKey) return <span style={{color: '#9ca3af', marginLeft: '4px'}}>⇅</span>;
                return sortConfig.direction === 'asc' ? <span style={{marginLeft: '4px'}}>↑</span> : <span style={{marginLeft: '4px'}}>↓</span>;
            };

            const handlePackingSlipItems = () => {
                if (!inventory.length) { setPackingSlipError('Please upload database first'); return; }
                const lines = itemInput.split('\n').filter(line => line.trim().length > 0);
                const items = [], notFoundSKUs = [], uomSuffixes = ['PK', 'CS', 'EA', 'BX', 'DZ', 'CT', 'RL', 'PL', 'BT', 'TB'];
                lines.forEach(line => {
                    const parts = line.split(',').map(p => p.trim());
                    if (parts.length < 2) return;
                    const sku = parts[0], quantity = parts[1], expiration = parts[2] || '';
                    const normalizedSearchSKU = normalizeSKU(sku);
                    let item = inventory.find(i => normalizeSKU(i.internalSKU) === normalizedSearchSKU || i.manufacturerSKUs.some(mfgSKU => normalizeSKU(mfgSKU) === normalizedSearchSKU));
                    if (!item) { for (const suffix of uomSuffixes) { const skuWithSuffix = normalizedSearchSKU + suffix; item = inventory.find(i => normalizeSKU(i.internalSKU) === skuWithSuffix || i.manufacturerSKUs.some(mfgSKU => normalizeSKU(mfgSKU) === skuWithSuffix)); if (item) break; } }
                    if (!item) { for (const suffix of uomSuffixes) { if (normalizedSearchSKU.endsWith(suffix)) { const skuWithoutSuffix = normalizedSearchSKU.slice(0, -suffix.length); item = inventory.find(i => normalizeSKU(i.internalSKU) === skuWithoutSuffix || i.manufacturerSKUs.some(mfgSKU => normalizeSKU(mfgSKU) === skuWithoutSuffix)); if (item) break; } } }
                    if (item) items.push({ quantity, itemName: item.itemName, internalSKU: item.internalSKU, vendorSKUs: item.manufacturerSKUs.join(', '), expiration, location: item.location });
                    else notFoundSKUs.push({ sku, quantity });
                });
                const sortedItems = sortByLocation(items);
                const updatedSlip = { ...packingSlip, items: sortedItems, notFoundSKUs };
                setPackingSlip(updatedSlip); setPackingSlipError('');
                if (updatedSlip.items.length) {
                    const slipWithMetadata = { ...updatedSlip, id: Date.now(), createdAt: new Date().toISOString() };
                    try { const updatedSlips = [slipWithMetadata, ...savedPackingSlips]; localStorage.setItem('stockroom_packing_slips', JSON.stringify(updatedSlips)); setSavedPackingSlips(updatedSlips); } catch (e) {}
                }
            };

            const deletePackingSlip = (id) => {
                try {
                    const updatedSlips = savedPackingSlips.filter(slip => slip.id !== id);
                    localStorage.setItem('stockroom_packing_slips', JSON.stringify(updatedSlips));
                    setSavedPackingSlips(updatedSlips);
                    if (selectedSlip && selectedSlip.id === id) setSelectedSlip(null);
                } catch (err) {}
            };

            const viewPackingSlip = (slip) => setSelectedSlip(slip);

            const exportPackingSlips = () => {
                try {
                    const dataStr = JSON.stringify(savedPackingSlips, null, 2);
                    const dataBlob = new Blob([dataStr], { type: 'application/json' });
                    const url = URL.createObjectURL(dataBlob);
                    const link = document.createElement('a');
                    link.href = url; link.download = `packing_slips_backup_${new Date().toISOString().split('T')[0]}.json`;
                    document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
                } catch (err) { alert('Export error'); }
            };

            const importPackingSlips = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedSlips = JSON.parse(event.target.result);
                        if (!Array.isArray(importedSlips)) { alert('Invalid format'); return; }
                        const existingIds = new Set(savedPackingSlips.map(s => s.id));
                        const newSlips = importedSlips.filter(s => !existingIds.has(s.id));
                        const mergedSlips = [...savedPackingSlips, ...newSlips];
                        localStorage.setItem('stockroom_packing_slips', JSON.stringify(mergedSlips));
                        setSavedPackingSlips(mergedSlips); alert(`Imported ${newSlips.length} slip(s)`);
                    } catch (err) { alert('Import error'); }
                };
                reader.readAsText(file); e.target.value = '';
            };

            const handleHazmatMaterials = () => {
                const lines = hazmatInput.split('\n').filter(line => line.trim().length > 0);
                const materials = lines.map(line => {
                    const parts = line.split(',').map(p => p.trim());
                    return { unNumber: parts[0] || '', properShippingName: parts[1] || '', hazardClass: parts[2] || '', packingGroup: parts[3] || '', quantity: parts[4] || '', type: parts[5] || '' };
                });
                setHazmatBOL({ ...hazmatBOL, materials });
            };

            const clearHazmatBOL = () => {
                setHazmatBOL({
                    shipperName: 'UNIVERSITY OF PITTSBURGH', shipperAttn: '', shipperAddress: 'CHEMISTRY STOCKROOM', shipperAddress2: '219 PARKMAN AVE RM326',
                    shipperCity: 'PITTSBURGH', shipperState: 'PA', shipperZip: '15213', shipperPhone: '412-624-8551',
                    consigneeName: '', consigneeAttn: '', consigneeAddress: '', consigneeAddress2: '', consigneeCity: '', consigneeState: '', consigneeZip: '', consigneePhone: '',
                    carrierName: '', carrierPhone: '', shipDate: '', emergencyContact: '', emergencyPhone: '', materials: []
                });
                setHazmatInput('');
            };

            return (
                <div>
                    <div className="no-print">
                        <div className="container">
                            <div className="header">
                                <img src="https://upload.wikimedia.org/wikipedia/en/f/fb/University_of_Pittsburgh_seal.svg" alt="Pitt" />
                                <h1>Dietrich School Scientific Stockroom</h1>
                                <p>Inventory Catalog Lookup System</p>
                            </div>
                            <div className="tabs">
                                <button className={`tab ${activeTab === 'search' ? 'active' : ''}`} onClick={() => setActiveTab('search')}>General Search</button>
                                <button className={`tab ${activeTab === 'packing' ? 'active' : ''}`} onClick={() => setActiveTab('packing')}>Packing Slip</button>
                                <button className={`tab ${activeTab === 'history' ? 'active' : ''}`} onClick={() => setActiveTab('history')}>History ({savedPackingSlips.length})</button>
                                <button className={`tab ${activeTab === 'hazmat' ? 'active' : ''}`} onClick={() => setActiveTab('hazmat')}>Hazmat BOL</button>
                            </div>
                            <div className="card">
                                <h2>Database Status</h2>
                                {inventory.length > 0 ? (
                                    <div className="alert alert-success">
                                        <div>
                                            <strong>Database loaded:</strong> {inventory.length} items
                                            {fileName && <div style={{fontSize: '13px', marginTop: '4px'}}>File: {fileName}</div>}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="alert alert-info">Loading inventory database...</div>
                                )}
                            </div>
                            {activeTab === 'search' && (
                                <>
                                    <div className="card">
                                        <h2>General Search</h2>
                                        <div className="form-group">
                                            <label className="form-label">Search by SKU or Item Name</label>
                                            <input type="text" className="form-input" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Enter SKU or item name..." onKeyPress={(e) => e.key === 'Enter' && handleGeneralSearch()} />
                                        </div>
                                        {error && <div className="alert alert-error">{error}</div>}
                                        <button onClick={handleGeneralSearch} className="btn btn-primary btn-block">Search Inventory</button>
                                    </div>
                                    {searchResults && (
                                        <div className="card">
                                            <h2>Search Results ({searchResults.length} items found)</h2>
                                            {searchResults.length > 0 ? (
                                                <div style={{overflowX: 'auto'}}>
                                                    <table>
                                                        <thead>
                                                            <tr>
                                                                <th onClick={() => handleSort('location')} className="text-center">Location <SortIcon columnKey="location" /></th>

                                    <tbody>{selectedSlip.items.map((item, idx) => (<tr key={idx}><td className="text-center">☐</td><td className="text-center text-mono" style={{fontWeight: 'bold'}}>{item.location}</td><td className="text-center">{item.quantity}</td><td>{item.itemName}</td><td className="text-center text-mono" style={{fontSize: '11px'}}>{item.internalSKU}</td><td className="text-mono" style={{fontSize: '11px'}}>{item.vendorSKUs}</td><td className="text-center" style={{fontSize: '11px'}}>{item.expiration || '-'}</td></tr>))}</tbody>
                                </table>
                                {selectedSlip.notes?.trim() && (<div style={{marginTop: '16px', padding: '12px', border: '2px solid black', borderRadius: '4px'}}><p style={{fontSize: '12px', margin: '0 0 4px 0'}}><strong>Notes:</strong></p><p style={{fontSize: '12px', margin: '4px 0', whiteSpace: 'pre-wrap'}}>{selectedSlip.notes}</p></div>)}
                                {selectedSlip.notFoundSKUs?.length > 0 && (<div style={{marginTop: '16px', padding: '12px', border: '2px solid black', borderRadius: '4px', background: '#FFDECD'}}><p style={{fontSize: '12px', fontWeight: 'bold', margin: '0 0 8px 0', color: '#770538'}}>SKUs Not Found:</p><ul style={{margin: '4px 0', paddingLeft: '20px', fontSize: '12px', color: '#770538'}}>{selectedSlip.notFoundSKUs.map((item, idx) => (<li key={idx} className="text-mono">{typeof item === 'string' ? item : `${item.sku} (Qty: ${item.quantity})`}</li>))}</ul></div>)}
                            </div>
                        </div>
                    )}
                    {hazmatBOL.materials.length > 0 && activeTab === 'hazmat' && (
                        <div className="print-only">
                            <div style={{padding: '20px'}}>
                                <div style={{textAlign: 'center', marginBottom: '16px', borderBottom: '4px solid black', paddingBottom: '8px'}}>
                                    <h1 style={{fontSize: '22px', margin: '4px 0', fontWeight: 'bold'}}>HAZARDOUS MATERIALS BILL OF LADING</h1>
                                    <p style={{fontSize: '11px', margin: '4px 0'}}>DOT-Compliant (49 CFR)</p>
                                </div>
                                <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '16px', fontSize: '11px'}}>
                                    <div style={{border: '2px solid black', padding: '8px'}}>
                                        <p style={{fontWeight: 'bold', marginBottom: '4px'}}>SHIPPER:</p>
                                        <p style={{margin: '2px 0'}}>{hazmatBOL.shipperName}</p>
                                        {hazmatBOL.shipperAttn && <p style={{margin: '2px 0'}}>ATTN: {hazmatBOL.shipperAttn}</p>}
                                        <p style={{margin: '2px 0'}}>{hazmatBOL.shipperAddress}</p>
                                        {hazmatBOL.shipperAddress2 && <p style={{margin: '2px 0'}}>{hazmatBOL.shipperAddress2}</p>}
                                        <p style={{margin: '2px 0'}}>{hazmatBOL.shipperCity}, {hazmatBOL.shipperState} {hazmatBOL.shipperZip}</p>
                                        <p style={{margin: '2px 0'}}>Phone: {hazmatBOL.shipperPhone}</p>
                                    </div>
                                    <div style={{border: '2px solid black', padding: '8px'}}>
                                        <p style={{fontWeight: 'bold', marginBottom: '4px'}}>CONSIGNEE:</p>
                                        <p style={{margin: '2px 0'}}>{hazmatBOL.consigneeName}</p>
                                        {hazmatBOL.consigneeAttn && <p style={{margin: '2px 0'}}>ATTN: {hazmatBOL.consigneeAttn}</p>}
                                        <p style={{margin: '2px 0'}}>{hazmatBOL.consigneeAddress}</p>
                                        {hazmatBOL.consigneeAddress2 && <p style={{margin: '2px 0'}}>{hazmatBOL.consigneeAddress2}</p>}
                                        <p style={{margin: '2px 0'}}>{hazmatBOL.consigneeCity}, {hazmatBOL.consigneeState} {hazmatBOL.consigneeZip}</p>
                                        <p style={{margin: '2px 0'}}>Phone: {hazmatBOL.consigneePhone}</p>
                                    </div>
                                </div>
                                <div style={{border: '2px solid black', padding: '8px', marginBottom: '16px', fontSize: '11px'}}>
                                    <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px'}}>
                                        <p style={{margin: '2px 0'}}><strong>Carrier:</strong> {hazmatBOL.carrierName}</p>
                                        <p style={{margin: '2px 0'}}><strong>Ship Date:</strong> {hazmatBOL.shipDate}</p>
                                    </div>
                                </div>
                                <div style={{border: '2px solid black', padding: '8px', marginBottom: '16px', fontSize: '11px', background: '#fff3cd'}}>
                                    <p style={{margin: '2px 0'}}><strong>24-Hour Emergency:</strong> {hazmatBOL.emergencyContact}</p>
                                    <p style={{margin: '2px 0'}}><strong>Phone:</strong> {hazmatBOL.emergencyPhone}</p>
                                </div>
                                <table>
                                    <thead><tr><th style={{fontSize: '11px'}}>UN/ID</th><th style={{fontSize: '11px'}}>Proper Shipping Name</th><th style={{fontSize: '11px'}}>Class</th><th style={{fontSize: '11px'}}>Group</th><th style={{fontSize: '11px'}}>Quantity</th><th style={{fontSize: '11px'}}>Type</th></tr></thead>
                                    <tbody>{hazmatBOL.materials.map((m, i) => (<tr key={i}><td style={{fontSize: '11px'}}>{m.unNumber}</td><td style={{fontSize: '11px'}}>{m.properShippingName}</td><td style={{fontSize: '11px', textAlign: 'center'}}>{m.hazardClass}</td><td style={{fontSize: '11px', textAlign: 'center'}}>{m.packingGroup}</td><td style={{fontSize: '11px'}}>{m.quantity}</td><td style={{fontSize: '11px'}}>{m.type}</td></tr>))}</tbody>
                                </table>
                                <div style={{border: '2px solid black', padding: '12px', marginTop: '20px', fontSize: '10px'}}>
                                    <p style={{fontWeight: 'bold', marginBottom: '8px'}}>SHIPPER CERTIFICATION (49 CFR 172.204):</p>
                                    <p style={{margin: '4px 0'}}>This is to certify that the above-named materials are properly classified, described, packaged, marked, and labeled, and are in proper condition for transportation according to the applicable regulations of the Department of Transportation.</p>
                                    <div style={{marginTop: '20px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '40px'}}>
                                        <div><p style={{borderBottom: '1px solid black', paddingBottom: '2px'}}>Shipper Signature</p><p style={{borderBottom: '1px solid black', paddingBottom: '2px', marginTop: '16px'}}>Print Name</p></div>
                                        <div><p style={{borderBottom: '1px solid black', paddingBottom: '2px'}}>Date</p></div>
                                    </div>
                                </div>
                                <div style={{border: '2px solid black', padding: '12px', marginTop: '12px', fontSize: '10px'}}>
                                    <p style={{fontWeight: 'bold', marginBottom: '8px'}}>CARRIER ACKNOWLEDGMENT:</p>
                                    <p style={{margin: '4px 0'}}>Carrier acknowledges receipt of packages and required placards. Carrier certifies emergency response information was made available and/or carrier has the DOT emergency response guidebook or equivalent documentation.</p>
                                    <div style={{marginTop: '20px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '40px'}}>
                                        <div><p style={{borderBottom: '1px solid black', paddingBottom: '2px'}}>Carrier Signature</p><p style={{borderBottom: '1px solid black', paddingBottom: '2px', marginTop: '16px'}}>Print Name</p></div>
                                        <div><p style={{borderBottom: '1px solid black', paddingBottom: '2px'}}>Date</p></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
