<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dietrich School Scientific Stockroom</title>
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/en/thumb/f/fb/University_of_Pittsburgh_seal.svg/960px-University_of_Pittsburgh_seal.svg.png">
    <!-- Pitt Brand Typography -->
    <!-- Alternate Gothic Compressed (hero) + Alternate Gothic (subheads) via Adobe/Typekit -->
    <link rel="stylesheet" href="https://use.typekit.net/myu6uxh.css">
    <!-- Instrument Serif (accent headings) + Merriweather (body serif) + Roboto (body sans) via Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
    <style>
        /* ── Pitt Color Palette ─────────────────────────────────────────── */
        :root {
            --royal:    #003594;
            --gold:     #FFB81C;
            --navy:     #00205B;
            --sky:      #DBEEFF;
            --gray:     #C8C9C7;
            --lt-blue:  #66B2E3;
            --haze:     #FFE939;
            --green:    #00AD6E;
            --red:      #FF5B45;
            --dark-red: #770538;

            --bg:       #f4f5f7;
            --surface:  #ffffff;
            --border:   #e2e4e8;
            --text:     #1a1d23;
            --muted:    #5a6072;
            /* Pitt Typography System —
               --gothic   : Alternate Gothic No. 3 D (Adobe/Typekit) — nav, labels, sub-headings; ALL CAPS
               --serif    : Instrument Serif (Google) — accent headings only; NOT for body copy
               --sans     : Roboto (Google) — body copy and supporting text
               --body-serif: Merriweather (Google) — body copy, serif option
               --mono     : Roboto Mono — SKUs, code, data fields                        */
            --gothic:    'alternate-gothic-no-3-d', 'Arial Narrow', sans-serif;
            --serif:     'Instrument Serif', Georgia, serif;
            --sans:      'Roboto', Arial, sans-serif;
            --body-serif: 'Merriweather', Georgia, serif;
            --mono:      'Roboto Mono', 'Courier New', monospace;

            --nav-h:    64px;
            --footer-h: 36px;
        }

        /* ── Reset & Base ────────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* Instrument Serif for display headings; Alternate Gothic for sub-headings/labels */
        h1, h2 { font-family: var(--serif); font-weight: 400; letter-spacing: 0.01em; }
        h3, h4 { font-family: var(--gothic); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
        code, .mono { font-family: var(--mono); }

        /* ── Navigation ──────────────────────────────────────────────────── */
        nav {
            position: sticky;
            top: 0;
            z-index: 200;
            background: var(--royal);
            border-bottom: 3px solid var(--gold);
            height: var(--nav-h);
            display: flex;
            align-items: stretch;
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 24px;
            border-right: 1px solid rgba(255,184,28,0.25);
            text-decoration: none;
            cursor: pointer;
            flex-shrink: 0;
        }
        .nav-brand img {
            height: 36px;
            width: 36px;
            object-fit: contain;
        }
        .nav-brand-text { display: flex; flex-direction: column; line-height: 1.2; }
        .nav-brand-text .nav-title {
            font-family: var(--gothic);
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .nav-brand-text .nav-sub {
            font-size: 9.5px;
            color: rgba(219,238,255,0.7);
            letter-spacing: 0.07em;
            text-transform: uppercase;
            font-family: var(--gothic);
            font-weight: 400;
        }
        .nav-links {
            display: flex;
            align-items: stretch;
            flex: 1;
            padding: 0 8px;
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 0 18px;
            color: rgba(255,255,255,0.75);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            background: none;
            border-bottom: 3px solid transparent;
            margin-bottom: -3px;
            transition: all 0.18s;
            font-family: var(--gothic);
            white-space: nowrap;
        }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,0.07); }
        .nav-link.active { color: var(--gold); border-bottom-color: var(--gold); }
        .nav-link .nav-icon { font-size: 15px; opacity: 0.85; }

        /* ── Nav Search ── */
        .nav-search {
            display: flex;
            align-items: center;
            margin-left: auto;
            padding: 0 16px;
            border-left: 1px solid rgba(255,184,28,0.2);
        }
        .nav-search-wrap {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            overflow: hidden;
            transition: all 0.18s;
        }
        .nav-search-wrap:focus-within {
            background: rgba(255,255,255,0.18);
            border-color: var(--gold);
            box-shadow: 0 0 0 2px rgba(255,184,28,0.2);
        }
        .nav-search-input {
            background: none;
            border: none;
            outline: none;
            color: #fff;
            font-family: var(--sans);
            font-size: 13px;
            padding: 7px 10px;
            width: 200px;
        }
        .nav-search-input::placeholder { color: rgba(255,255,255,0.45); }
        .nav-search-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            padding: 7px 10px;
            font-size: 14px;
            transition: color 0.15s;
            display: flex;
            align-items: center;
        }
        .nav-search-btn:hover { color: var(--gold); }

        /* ── Page Shell ──────────────────────────────────────────────────── */
        .page-shell {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            width: 100%;
        }
        .page-content {
            padding: 36px 0 60px;
            flex: 1;
        }

        /* ── Page Header Banner ──────────────────────────────────────────── */
        .page-banner {
            background: linear-gradient(135deg, var(--navy) 0%, var(--royal) 100%);
            border-bottom: 3px solid var(--gold);
            padding: 28px 0;
            margin-bottom: 32px;
        }
        .page-banner .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .page-banner h1 {
            color: #fff;
            font-size: 32px;
            font-weight: 400;
            font-family: var(--serif);
        }
        .page-banner p {
            color: rgba(219,238,255,0.8);
            font-size: 13px;
            margin-top: 4px;
            font-family: var(--sans);
            font-weight: 300;
            letter-spacing: 0.05em;
        }
        .page-banner-icon {
            font-size: 48px;
            line-height: 1;
            flex-shrink: 0;
        }

        /* ── Cards ───────────────────────────────────────────────────────── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .card h2 {
            color: var(--royal);
            font-size: 26px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--sky);
            font-family: var(--serif);
            font-weight: 400;
        }
        .card h3 {
            color: var(--navy);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-family: var(--gothic);
            margin-bottom: 14px;
        }
        .card-sm { padding: 20px; }

        /* ── Form Elements ───────────────────────────────────────────────── */
        .form-group { margin-bottom: 18px; }
        .form-label {
            display: block;
            font-weight: 700;
            font-size: 10.5px;
            color: var(--navy);
            margin-bottom: 7px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-family: var(--gothic);
        }
        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--gray);
            border-radius: 6px;
            font-size: 14.5px;
            font-family: var(--sans);
            color: var(--text);
            background: #fff;
            transition: all 0.15s;
            outline: none;
        }
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            border-color: var(--royal);
            box-shadow: 0 0 0 3px rgba(0,53,148,0.1);
        }
        .form-textarea { font-family: var(--mono); font-size: 13px; resize: vertical; }
        .form-select { cursor: pointer; }

        /* ── Buttons ─────────────────────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 22px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            border: 1.5px solid transparent;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.15s;
            font-family: var(--gothic);
            white-space: nowrap;
        }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn-primary { background: var(--royal); color: #fff; border-color: var(--royal); }
        .btn-primary:hover:not(:disabled) { background: var(--navy); border-color: var(--navy); }
        .btn-gold { background: var(--gold); color: var(--royal); border-color: var(--gold); }
        .btn-gold:hover:not(:disabled) { background: var(--haze); }
        .btn-outline { background: transparent; color: var(--royal); border-color: var(--royal); }
        .btn-outline:hover:not(:disabled) { background: var(--sky); }
        .btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }
        .btn-ghost:hover:not(:disabled) { background: var(--bg); color: var(--text); }
        .btn-red { background: var(--red); color: #fff; border-color: var(--red); }
        .btn-red:hover:not(:disabled) { background: #e54a35; }
        .btn-block { width: 100%; }
        .btn-sm { padding: 7px 14px; font-size: 12px; }

        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn-group .btn { flex: 1; min-width: 120px; }

        /* ── Alerts ──────────────────────────────────────────────────────── */
        .alert {
            padding: 14px 18px;
            border-radius: 8px;
            margin-bottom: 18px;
            border-left: 4px solid;
            font-size: 14px;
        }
        .alert-success { background: #e6faf3; border-color: var(--green); color: #03522a; }
        .alert-error   { background: #fff0ed; border-color: var(--red);   color: var(--dark-red); }
        .alert-info    { background: var(--sky); border-color: var(--lt-blue); color: var(--navy); }
        .alert-warn    { background: #fffbe6; border-color: var(--gold);  color: #6b4f00; }

        /* ── Grid Utilities ──────────────────────────────────────────────── */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }

        /* ── Tables ──────────────────────────────────────────────────────── */
        .table-wrap { overflow-x: auto; border-radius: 8px; border: 1.5px solid var(--navy); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 10px; border-bottom: 1px solid var(--border); text-align: left; }
        th {
            background: var(--sky);
            font-weight: 700;
            color: var(--navy);
            font-family: var(--gothic);
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }
        th:hover { background: #c5dbf5; }
        tbody tr:hover { background: #fafbfd; }
        tbody tr:last-child td { border-bottom: none; }

        /* ── Footer ──────────────────────────────────────────────────────── */
        footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: var(--footer-h);
            background: var(--navy);
            color: rgba(219,238,255,0.7);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            font-size: 11px;
            font-family: var(--gothic);
            letter-spacing: 0.05em;
            z-index: 150;
            border-top: 2px solid rgba(255,184,28,0.3);
        }
        footer .footer-status { display: flex; align-items: center; gap: 10px; }
        footer .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--green);
            flex-shrink: 0;
        }
        footer .status-dot.loading { background: var(--gold); }
        footer .status-dot.error   { background: var(--red); }

        body { padding-bottom: var(--footer-h); }
        @media (max-width: 900px) { body { padding-bottom: 56px; } }

        /* ── Print ───────────────────────────────────────────────────────── */
        /* print-only divs are never shown on screen — printing is handled via iframe */
        .print-only { display: none !important; }

        /* ══════════════════════════════════════════════════════════════════
           HOME PAGE
        ══════════════════════════════════════════════════════════════════ */
        .home-hero {
            background: linear-gradient(145deg, var(--navy) 0%, var(--royal) 60%, #0044bb 100%);
            padding: 56px 0 48px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }
        .home-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E") repeat;
        }
        .home-hero::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0; right: 0;
            height: 4px;
            background: var(--gold);
        }
        .home-hero .container { position: relative; }
        .hero-layout {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 48px;
            align-items: center;
        }
        .hero-text h1 {
            font-size: 42px;
            color: #fff;
            line-height: 1.1;
            margin-bottom: 12px;
            font-family: var(--serif);
            font-weight: 400;
        }
        .hero-text h1 em {
            font-style: italic;
            color: var(--gold);
        }
        .hero-text p {
            color: rgba(219,238,255,0.8);
            font-size: 15px;
            line-height: 1.7;
            font-weight: 300;
            font-family: var(--sans);
            max-width: 420px;
        }
        .hero-search-box {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,184,28,0.3);
            border-radius: 12px;
            padding: 24px;
        }
        .hero-search-box h3 {
            color: var(--gold);
            font-family: var(--gothic);
            font-size: 10px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 14px;
        }
        .hero-search-input-wrap { display: flex; gap: 0; }
        .hero-search-input {
            flex: 1;
            padding: 12px 16px;
            border: 1.5px solid rgba(255,255,255,0.3);
            border-right: none;
            border-radius: 6px 0 0 6px;
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-size: 14px;
            font-family: var(--sans);
            outline: none;
            transition: all 0.15s;
        }
        .hero-search-input::placeholder { color: rgba(255,255,255,0.45); }
        .hero-search-input:focus { background: rgba(255,255,255,0.18); border-color: var(--gold); }
        .hero-search-btn {
            padding: 12px 20px;
            background: var(--gold);
            color: var(--royal);
            border: 1.5px solid var(--gold);
            border-radius: 0 6px 6px 0;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.1em;
            cursor: pointer;
            font-family: var(--gothic);
            transition: all 0.15s;
            white-space: nowrap;
        }
        .hero-search-btn:hover { background: var(--haze); }
        .hero-search-hint {
            font-size: 11px;
            color: rgba(219,238,255,0.55);
            margin-top: 8px;
            font-family: var(--sans);
        }

        /* Tool cards on home */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
            margin-bottom: 32px;
        }
        .tool-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 22px 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            overflow: hidden;
            text-align: left;
            border-bottom: 3px solid transparent;
        }
        .tool-card:hover {
            border-color: var(--lt-blue);
            border-bottom-color: var(--royal);
            box-shadow: 0 6px 20px rgba(0,53,148,0.1);
            transform: translateY(-2px);
        }
        .tool-card-icon { font-size: 28px; line-height: 1; }
        .tool-card-name {
            font-family: var(--gothic);
            font-size: 15px;
            color: var(--royal);
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .tool-card-desc {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
        }
        .tool-card-arrow {
            position: absolute;
            bottom: 18px;
            right: 18px;
            font-size: 18px;
            color: var(--gray);
            transition: all 0.2s;
        }
        .tool-card:hover .tool-card-arrow { color: var(--royal); transform: translateX(3px); }

        /* Search results on home */
        .search-results-card { margin-top: 24px; }

        /* ══════════════════════════════════════════════════════════════════
           FORMS PAGE — tabs for Packing Slip / Hazmat / History
        ══════════════════════════════════════════════════════════════════ */
        .sub-tabs {
            display: flex;
            gap: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 24px;
            width: fit-content;
        }
        .sub-tab {
            padding: 9px 22px;
            font-weight: 700;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s;
            font-size: 11px;
            font-family: var(--gothic);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sub-tab:hover { color: var(--royal); background: var(--sky); }
        .sub-tab.active { background: var(--royal); color: var(--gold); font-weight: 700; }

        /* ══════════════════════════════════════════════════════════════════
           HAZMAT BOL
        ══════════════════════════════════════════════════════════════════ */
        .bol-section-label {
            font-size: 9.5px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--gold);
            background: var(--royal);
            padding: 4px 10px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 14px;
            font-family: var(--gothic);
        }

        /* ══════════════════════════════════════════════════════════════════
           HISTORY
        ══════════════════════════════════════════════════════════════════ */
        .history-item {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px 20px;
            margin-bottom: 12px;
            background: #fff;
            transition: all 0.15s;
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }
        .history-item:hover { border-color: var(--lt-blue); box-shadow: 0 2px 8px rgba(0,53,148,0.06); }
        .history-item-type-badge {
            font-size: 9.5px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
            flex-shrink: 0;
            font-family: var(--gothic);
        }
        .badge-packing  { background: var(--sky); color: var(--navy); }

    <div id="root"></div>
    <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Print utility — renders into a hidden iframe so only the target
          document is printed, never the surrounding app UI ──────────── */
    function printDocument(htmlContent) {
        // Remove any existing print frame
        const existing = document.getElementById('__printFrame');
        if (existing) existing.remove();
        const iframe = document.createElement('iframe');
        iframe.id = '__printFrame';
        iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:0;height:0;border:none;';
        document.body.appendChild(iframe);
        const doc = iframe.contentWindow.document;
        doc.open();
        doc.write(htmlContent);
        doc.close();
        iframe.contentWindow.focus();
        setTimeout(() => {
            iframe.contentWindow.print();
            setTimeout(() => iframe.remove(), 1000);
        }, 300);
    }

    /* ══════════════════════════════════════════════════════════════════════
       LABEL GENERATOR — layout/rendering constants and helpers
    ══════════════════════════════════════════════════════════════════════ */
    const LAYOUT_5162 = {
        name: '5162 / 8162 — 1⅓″ × 4″ (14-up)',
        maxOffset: 13,
        px: { PAGE_W:816, PAGE_H:1056, LABEL_W:384, LABEL_H:128, COLS:2, ROWS:7, MARGIN_L:15, MARGIN_T:80, COL_GAP:18, PAD_X:10, PAD_Y:7 },
        pt: { PAGE_W:612, PAGE_H:792, LABEL_W:288, LABEL_H:96, COLS:2, ROWS:7, MARGIN_L:11.25, MARGIN_T:60, COL_GAP:13.5, PAD_X:8, PAD_Y:6 }
    };
    const LAYOUT_5160 = {
        name: '5160 / 8160 — 1″ × 2⅝″ (30-up)',
        maxOffset: 29,
        px: { PAGE_W:816, PAGE_H:1056, LABEL_W:252, LABEL_H:96, COLS:3, ROWS:10, MARGIN_L:13, MARGIN_T:48, COL_GAP:12, PAD_X:7, PAD_Y:5 },
        pt: { PAGE_W:612, PAGE_H:792, LABEL_W:189, LABEL_H:72, COLS:3, ROWS:10, MARGIN_L:9.75, MARGIN_T:36, COL_GAP:9, PAD_X:6, PAD_Y:4 }
    };
    const LAYOUTS = { '5162': LAYOUT_5162, '5160': LAYOUT_5160 };
    const COL_IDX = { loc:2, itemNum:4, mfrNum:5, name:13, uom:14, altUnit:15, convFactor:16 };

    function labelOriginPx(idx, PX) {
        return { x: PX.MARGIN_L + (idx % PX.COLS)*(PX.LABEL_W+PX.COL_GAP), y: PX.MARGIN_T + Math.floor(idx/PX.COLS)*PX.LABEL_H };
    }
    function labelOriginPt(idx, PT) {
        return { x: PT.MARGIN_L + (idx % PT.COLS)*(PT.LABEL_W+PT.COL_GAP), y: PT.MARGIN_T + Math.floor(idx/PT.COLS)*PT.LABEL_H };
    }
    function altDisplay(item) {
        const parts = [item.convFactor, item.altUnit].filter(s => s && s !== '0');
        return parts.length === 2 ? parts.join(' / ') : parts.join('');
    }
    function makeLabelItem(itemNum, name, mfrNum, loc, uom, altUnit, convFactor) {
        return { itemNum, name, mfrNum, loc, uom, altUnit, convFactor };
    }
    function escHtml(str) {
        return String(str??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    /* ══════════════════════════════════════════════════════════════════════
       SHARED UTILITIES
    ══════════════════════════════════════════════════════════════════════ */
    const normalizeSKU = s => s.replace(/-/g,'').toUpperCase();

    const parseLocation = (loc) => {
        const u = loc.toUpperCase();
        const excl = ['HALLWAY','WASTEROOM','DOCKCAGE','THOMAS'];
        for (const k of excl) if (u.includes(k)) return { section: null, rack: 999, shelf: 999 };
        if (u === 'NEW' || u === 'NEW-' || u === 'NEW--') return { section: null, rack: 999, shelf: 999 };
        const n = loc.replace(/\s+/g,'').replace(/-+/g,'-');
        let m = n.match(/(?:DISC|NEW)\s*([A-Za-z])-?(\d+)-?(\d+)/i);
        if (m) return { section: m[1].toUpperCase(), rack: parseInt(m[2]), shelf: parseInt(m[3]) };
        m = n.match(/^([A-Za-z])-?(\d+)-?([A-Za-z]?\d+[A-Za-z]?)/);
        if (m) return { section: m[1].toUpperCase(), rack: parseInt(m[2]), shelf: parseInt(m[3].replace(/[A-Za-z]/g,'')) || 0 };
        return { section: 'Z', rack: 999, shelf: 999 };
    };

    const sortByLocation = items => [...items].sort((a, b) => {
        const la = parseLocation(a.location), lb = parseLocation(b.location);
        if (la.section !== lb.section) return (la.section||'Z').localeCompare(lb.section||'Z');
        if (la.rack !== lb.rack) return la.rack - lb.rack;
        return la.shelf - lb.shelf;
    });

    const SortIcon = ({ sortConfig, columnKey }) =>
        sortConfig.key !== columnKey
            ? <span style={{color:'#aaa', marginLeft:'3px', fontSize:'11px'}}>⇅</span>
            : sortConfig.direction === 'asc'
                ? <span style={{marginLeft:'3px', fontSize:'11px'}}>↑</span>
                : <span style={{marginLeft:'3px', fontSize:'11px'}}>↓</span>;

    const AUTH_KEY = 'stockroom_auth';
    const CORRECT  = 'enzyme';

    function LoginScreen({ onAuth }) {
        const [input, setInput]   = useState('');
        const [error, setError]   = useState(false);
        const [shake, setShake]   = useState(false);

        const attempt = () => {
            if (input.trim().toLowerCase() === CORRECT) {
                localStorage.setItem(AUTH_KEY, '1');
                onAuth();

                setError(true);
                setShake(true);

        const handleKey = (e) => { if (e.key === 'Enter') attempt(); };

                                    width: '100%',
                                    borderColor: error ? '#FF5B45' : undefined,
                                    marginBottom: error ? '6px' : '20px',
                                }}
                            />
                            {error && (
                                <div style={{fontSize:'12px', color:'#FF5B45', marginBottom:'14px'}}>

                            )}

    /* ══════════════════════════════════════════════════════════════════════

    ══════════════════════════════════════════════════════════════════════ */
    function App() {
        const [authed, setAuthed] = useState(() => localStorage.getItem(AUTH_KEY) === '1');

        if (!authed) return <LoginScreen onAuth={() => setAuthed(true)} />;

        return <AuthenticatedApp />;
    }

    function AuthenticatedApp() {
        const [inventory, setInventory] = useState([]);
        const [dbStatus, setDbStatus] = useState('loading'); // loading | ok | error
        const [fileLastModified, setFileLastModified] = useState(null);
        const [activePage, setActivePage] = useState('home');
        const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

        // Close mobile menu on page change
        const navigateTo = (page) => { setActivePage(page); setMobileMenuOpen(false); };

        // Load inventory
        useEffect(() => {
            fetch('inventory-status-report.xlsx')
                .then(r => {
                    const lm = r.headers.get('Last-Modified');
                    if (lm) setFileLastModified(new Date(lm));
                    return r.arrayBuffer();
                })
                .then(ab => {
                    try {
                        const wb = XLSX.read(ab, { type:'array', cellDates:true });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        if (wb.Props?.ModifiedDate) setFileLastModified(new Date(wb.Props.ModifiedDate));
                        const json = XLSX.utils.sheet_to_json(ws, { header:1, raw:false, defval:'' });
                        if (json.length < 2) return;
                        const data = [];
                        for (let i = 1; i < json.length; i++) {
                            const r = json[i];
                            if (r.length >= 15 && r[4]) {
                                const item = {
                                    location: String(r[2]||'').trim(),
                                    internalSKU: String(r[4]||'').trim(),
                                    manufacturerSKUs: [r[5],r[6],r[7],r[8]].map(x=>String(x||'').trim()).filter(s=>s),
                                    itemName: String(r[13]||'').trim(),
                                    uom: String(r[14]||'').trim(),
                                    altUom: String(r[15]||'').trim(),
                                    convFactor: String(r[16]||'').trim(),
                                    childPartNbr: String(r[17]||'').trim(),
                                    childConvFactor: String(r[18]||'').trim(),
                                    vendor: String(r[12]||'').trim(),
                                    externalPrice: String(r[26]||'').trim(),
                                    ourPrice: String(r[27]||'').trim(),
                                    onHand: String(r[23]||'').trim()
                                };
                                if (item.internalSKU && item.location) data.push(item);
                            }
                        }
                        setInventory(data);
                        setDbStatus('ok');
                    } catch(e) { setDbStatus('error'); }
                })
                .catch(() => {
                    try {
                        const saved = localStorage.getItem('stockroom_inventory');
                        if (saved) { setInventory(JSON.parse(saved)); setDbStatus('ok'); }
                        else setDbStatus('error');
                    } catch(e) { setDbStatus('error'); }
                });
        }, []);

        const [navSearch, setNavSearch] = useState('');
        const [navSearchSubmitted, setNavSearchSubmitted] = useState('');

        const pages = [
            { id:'home',       label:'Home',         icon:'🏠' },
            { id:'forms',      label:'Forms',         icon:'📋' },
            { id:'cyclecount', label:'Cycle Count',   icon:'📦' },
            { id:'labels',     label:'Label Maker',   icon:'🏷️' },
            { id:'phonebook',  label:'Phonebook',     icon:'📞' },
            { id:'emails',     label:'Emails',        icon:'✉️' },
        ];

        const handleNavSearch = (e) => {
            e.preventDefault();
            if (!navSearch.trim()) return;
            navigateTo('home');
            setNavSearchSubmitted(navSearch.trim());
            setNavSearch('');
            setMobileMenuOpen(false);
        };

        return (
            <div className="page-shell">
                {/* Nav */}
                <nav>
                    <div className="nav-brand" onClick={() => navigateTo('home')}>
                        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/f/fb/University_of_Pittsburgh_seal.svg/960px-University_of_Pittsburgh_seal.svg.png" alt="University of Pittsburgh" />
                        <div className="nav-brand-text">
                            <span className="nav-title">Scientific Stockroom</span>
                            <span className="nav-sub">Shared Research Support Services</span>
                        </div>
                    </div>
                    <div className="nav-links">
                        {pages.map(p => (
                            <button key={p.id} className={`nav-link ${activePage === p.id ? 'active' : ''}`} onClick={() => navigateTo(p.id)}>
                                <span className="nav-icon">{p.icon}</span>
                                {p.label}
                            </button>
                        ))}
                    </div>
                    <div className="nav-search">
                        <form className="nav-search-wrap" onSubmit={handleNavSearch}>
                            <input
                                type="text"
                                className="nav-search-input"
                                placeholder="Quick search…"
                                value={navSearch}
                                onChange={e => setNavSearch(e.target.value)}
                            />
                            <button type="submit" className="nav-search-btn" aria-label="Search">
                                🔍
                            </button>
                        </form>
                    </div>
                    {/* Hamburger — mobile only */}
                    <button
                        className={`nav-hamburger ${mobileMenuOpen ? 'open' : ''}`}
                        onClick={() => setMobileMenuOpen(o => !o)}
                        aria-label="Toggle menu"
                    >
                        <span></span><span></span><span></span>
                    </button>
                </nav>

                {/* Mobile slide-down menu */}
                <div className={`nav-mobile-menu ${mobileMenuOpen ? 'open' : ''}`}>
                    {pages.map(p => (
                        <button key={p.id} className={`nav-mobile-link ${activePage === p.id ? 'active' : ''}`} onClick={() => navigateTo(p.id)}>
                            <span className="nav-icon">{p.icon}</span>
                            {p.label}
                        </button>
                    ))}
                    <div className="nav-mobile-search">
                        <form className="nav-mobile-search-wrap" onSubmit={handleNavSearch}>
                            <input
                                type="text"
                                className="nav-mobile-search-input"
                                placeholder="Search catalog…"
                                value={navSearch}
                                onChange={e => setNavSearch(e.target.value)}
                            />
                            <button type="submit" className="nav-mobile-search-btn" aria-label="Search">🔍</button>
                        </form>
                    </div>
                </div>

                {/* Page content */}
                {activePage === 'home'       && <HomePage       inventory={inventory} dbStatus={dbStatus} navigate={setActivePage} externalSearch={navSearchSubmitted} onExternalSearchConsumed={() => setNavSearchSubmitted('')} />}
                {activePage === 'forms'      && <FormsPage      inventory={inventory} />}
                {activePage === 'cyclecount' && <CycleCountPage inventory={inventory} />}
                {activePage === 'labels'     && <LabelsPage     inventory={inventory} />}
                {activePage === 'phonebook'  && <PhonebookPage />}
                {activePage === 'emails'     && <EmailsPage />}

                {/* Footer */}
                <footer>
                    <div className="footer-status">
                        <div className={`status-dot ${dbStatus === 'loading' ? 'loading' : dbStatus === 'error' ? 'error' : ''}`}></div>
                        {dbStatus === 'loading' && <span>Loading inventory database…</span>}
                        {dbStatus === 'ok'      && <span>Database loaded — {inventory.length.toLocaleString()} items</span>}
                        {dbStatus === 'error'   && <span>Database unavailable — place inventory-status-report.xlsx alongside this file</span>}
                    </div>
                    <span className="footer-right">
                        {fileLastModified
                            ? `Last updated: ${fileLastModified.toLocaleDateString()} ${fileLastModified.toLocaleTimeString()}`
                            : 'Dietrich School Scientific Stockroom · Toolbox'}
                    </span>
                </footer>
            </div>
        );
    }

    function buildCycleCountHTML(countedRows, missingRows, session, currentRack, currentSection) {
        const rangeLabel = session.startRack === currentRack
            ? `Section ${currentSection} — Rack ${currentRack}`
            : `Section ${currentSection} — Racks ${session.startRack}–${currentRack}`;

        const rows = countedRows.map(it => {
            const statusColor = it.variance !== 0 || it.misplaced ? '#fff0ed' : 'white';
            const varColor    = it.variance === 0 ? '#00AD6E' : '#FF5B45';
            const childRow = `
                <tr style="background:#eef1fb">
                    <td colspan="2" style="padding-left:28px;font-size:10px;color:#5a6072">↳ parent</td>
                    <td class="mono" style="font-size:10px;color:#003594">${it.parentSKU}</td>
                    <td colspan="5" style="font-size:10px;color:#5a6072;font-style:italic">${it.parentName}</td>
                </tr>`;
            return `
                <tr style="background:${statusColor}">
                    <td class="mono" style="font-size:10px;font-weight:600;color:#003594">${it.countedAt}</td>
                    <td class="mono" style="font-size:10px;color:${it.misplaced?'#FF5B45':'#5a6072'}">${it.expectedLocation}</td>
                    <td class="mono" style="font-size:10px;color:#003594">${it.sku}</td>
                    <td style="font-size:11px">${it.itemName}</td>
                    <td style="font-size:10px">${it.uom}</td>
                    <td style="text-align:center;font-size:11px">${it.onHand}</td>
                    <td style="text-align:center;font-size:11px;font-weight:600">${it.counted}</td>
                    <td style="text-align:center;font-size:12px;font-weight:700;color:${varColor}">${it.variance>0?'+':''}${it.variance}</td>
                </tr>${it.parentSKU ? childRow : ''}`;
        }).join('');

        const missingRows2 = missingRows.map(i => `
            <tr class="missing-row">
                <td class="mono" style="font-size:10px">${i.location || i.expectedLocation}</td>
                <td class="mono" style="font-size:10px;color:#003594">${i.internalSKU || i.sku}</td>
                <td style="font-size:11px">${i.itemName}</td>
                <td style="font-size:10px">${i.uom}</td>
                <td style="text-align:center;font-size:11px">${i.onHand||0}</td>
            </tr>`).join('');

        const missingSection = missingRows.length > 0 ? `
            <h2>Missing Items</h2>
            <table><thead><tr>
                <th>Expected Location</th><th>SKU</th><th>Item Name</th><th>UoM</th><th>System On-Hand</th>
            </tr></thead>
            <tbody>${missingRows2}</tbody></table>` : '';

        const variances = countedRows.filter(i=>i.variance!==0).length;
        const misplaced = countedRows.filter(i=>i.misplaced).length;

        return `<!DOCTYPE html><html><head>${PRINT_HEAD}</head><body>
            <h1>Cycle Count Report</h1>
            <p style="text-align:center;font-family:var(--gothic);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#5a6072;margin-bottom:16px">
                ${rangeLabel} &nbsp;·&nbsp; ${new Date().toLocaleDateString()}
            </p>
            <h2>Counted Items</h2>
            <table><thead><tr>
                <th>Found At</th><th>Expected</th><th>SKU</th><th>Item Name</th>
                <th>UoM</th><th>System</th><th>Counted</th><th>Variance</th>
            </tr></thead>
            <tbody>${rows}</tbody></table>
            ${missingSection}
            <div class="summary-box">
                Counted: ${countedRows.length} &nbsp;·&nbsp;
                Variances: ${variances} &nbsp;·&nbsp;
                Misplaced: ${misplaced} &nbsp;·&nbsp;
                Missing: ${missingRows.length}
            </div>
            </body></html>`;
    }
    /* ══════════════════════════════════════════════════════════════════════
       HOME PAGE

    function HomePage({ inventory, dbStatus, navigate, externalSearch, onExternalSearchConsumed }) {
        const [searchQuery, setSearchQuery] = useState('');
        const [searchResults, setSearchResults] = useState(null);
        const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });
        const [error, setError] = useState('');

        // Run search triggered from nav bar
        useEffect(() => {
            if (externalSearch && inventory.length) {
                setSearchQuery(externalSearch);
                runSearch(externalSearch);
                onExternalSearchConsumed();
                // Scroll to results
                setTimeout(() => document.querySelector('.search-results-card')?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
            }
        }, [externalSearch, inventory]);

        const runSearch = (q) => {
            const query = (q || searchQuery).trim().toLowerCase();
            if (!query) { setError('Please enter a search term.'); return; }
            if (!inventory.length) { setError('Database still loading…'); return; }
            const words = query.split(/\s+/);
            const nq = normalizeSKU(query);
            const found = inventory.filter(item => {
                const ni = normalizeSKU(item.internalSKU);
                const nm = item.manufacturerSKUs.map(normalizeSKU);
                if (ni.includes(nq) || nq.includes(ni)) return true;
                if (nm.some(m => m.includes(nq) || nq.includes(m))) return true;
                if (words.every(w => item.itemName.toLowerCase().includes(w))) return true;
                if (item.vendor && words.every(w => item.vendor.toLowerCase().includes(w))) return true;
                return false;
            });
            setSearchResults(found); setSortConfig({ key: null, direction: 'asc' }); setError('');
        };

        const handleSearch = () => runSearch();

        const handleSort = key => setSortConfig({ key, direction: sortConfig.key === key && sortConfig.direction === 'asc' ? 'desc' : 'asc' });

        const getSortedResults = res => {
            if (!sortConfig.key || !res) return res;
            return [...res].sort((a, b) => {
                let av = a[sortConfig.key], bv = b[sortConfig.key];
                if (sortConfig.key === 'manufacturerSKUs') { av = a.manufacturerSKUs.join(', '); bv = b.manufacturerSKUs.join(', '); }
                if (sortConfig.key === 'ourPrice') { av = parseFloat(av||0); bv = parseFloat(bv||0); }
                if (sortConfig.key === 'location') {
                    const la = parseLocation(a.location), lb = parseLocation(b.location);
                    if (la.section !== lb.section) return sortConfig.direction === 'asc' ? (la.section||'Z').localeCompare(lb.section||'Z') : (lb.section||'Z').localeCompare(la.section||'Z');
                    if (la.rack !== lb.rack) return sortConfig.direction === 'asc' ? la.rack - lb.rack : lb.rack - la.rack;
                    return sortConfig.direction === 'asc' ? la.shelf - lb.shelf : lb.shelf - la.shelf;
                }
                if (typeof av === 'string') { av = av.toLowerCase(); bv = (bv||'').toLowerCase(); }
                if (av < bv) return sortConfig.direction === 'asc' ? -1 : 1;
                if (av > bv) return sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });
        };

        const tools = [
            { id:'forms',      icon:'📋', name:'Forms',        desc:'Generate receiving packing slips and hazardous materials bills of lading. View and reprint past records.' },
            { id:'cyclecount', icon:'📦', name:'Cycle Count',  desc:'Scan-based physical inventory verification by section and rack. Exports variance reports as CSV.' },
            { id:'labels',     icon:'🏷️', name:'Label Maker',  desc:'Generate Avery 5162 or 5160 barcode shelf labels from the inventory database or manual entry.' },
            { id:'phonebook',  icon:'📞', name:'Phonebook',    desc:'Search the department phonebook across Chemistry, SRSS, Biology, Pitt contacts, vendors, and more.' },
            { id:'emails',     icon:'✉️', name:'Emails',       desc:'Send order status notifications to customers. One-click mailto launch or copy a styled HTML email for Outlook.' },
        ];

        return (
            <div>
                {/* Hero */}
                <div className="home-hero">
                    <div className="container">
                        <div className="hero-layout">
                            <div className="hero-text">
                                <h1>Dietrich School<br/><em>Scientific Stockroom</em></h1>
                                <p>Inventory management tools for receiving, cataloging, cycle counting, and labeling. Search the catalog below or navigate to a specific tool.</p>
                            </div>
                            <div className="hero-search-box">
                                <h3>Catalog Search</h3>
                                <div className="hero-search-input-wrap">
                                    <input
                                        type="text"
                                        className="hero-search-input"
                                        placeholder="SKU, item name, or vendor…"
                                        value={searchQuery}
                                        onChange={e => setSearchQuery(e.target.value)}
                                        onKeyPress={e => e.key === 'Enter' && handleSearch()}
                                        style={{fontSize:'16px', padding:'15px 18px'}}
                                    />
                                    <button className="hero-search-btn" onClick={handleSearch} style={{fontSize:'13px', padding:'15px 24px'}}>Search</button>
                                </div>
                                {error && <div style={{fontSize:'12px', color:'#ffb3a5', marginTop:'8px'}}>{error}</div>}
                                <div className="hero-search-hint">Search by internal SKU, manufacturer SKU, or item name</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div className="container page-content" style={{paddingTop:0}}>
                    {/* Search Results */}
                    {searchResults && (
                        <div className="card search-results-card" style={{marginBottom:'32px'}}>
                            <h2>Search Results <span style={{fontSize:'16px', color:'#666', fontFamily:'var(--sans)', fontWeight:400}}>({searchResults.length} {searchResults.length === 1 ? 'item' : 'items'})</span></h2>
                            {searchResults.length > 0 ? (
                                <div>
                                    <div className="table-wrap">
                                        <table>
                                            <thead>
                                                <tr>
                                                    <th onClick={() => handleSort('location')}>Location <SortIcon sortConfig={sortConfig} columnKey="location"/></th>
                                                    <th onClick={() => handleSort('itemName')}>Item Name <SortIcon sortConfig={sortConfig} columnKey="itemName"/></th>
                                                    <th onClick={() => handleSort('internalSKU')}>Internal SKU <SortIcon sortConfig={sortConfig} columnKey="internalSKU"/></th>
                                                    <th onClick={() => handleSort('manufacturerSKUs')}>Vendor SKUs <SortIcon sortConfig={sortConfig} columnKey="manufacturerSKUs"/></th>
                                                    <th onClick={() => handleSort('vendor')}>Vendor <SortIcon sortConfig={sortConfig} columnKey="vendor"/></th>
                                                    <th onClick={() => handleSort('uom')}>UoM <SortIcon sortConfig={sortConfig} columnKey="uom"/></th>
                                                    <th onClick={() => handleSort('ourPrice')}>Price <SortIcon sortConfig={sortConfig} columnKey="ourPrice"/></th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {getSortedResults(searchResults).map((item, idx) => (
                                                    <tr key={idx}>
                                                        <td style={{fontFamily:'var(--mono)', fontWeight:700, fontSize:'13px'}}>{item.location}</td>
                                                        <td style={{fontSize:'14px'}}>{item.itemName}</td>
                                                        <td style={{fontFamily:'var(--mono)', fontSize:'12px', color:'var(--royal)'}}>{item.internalSKU}</td>
                                                        <td style={{fontFamily:'var(--mono)', fontSize:'12px', color:'var(--muted)'}}>{item.manufacturerSKUs.join(', ')}</td>
                                                        <td style={{fontSize:'13px'}}>{item.vendor || '—'}</td>
                                                        <td style={{fontSize:'13px'}}>
                                                            <div>{item.uom}</div>
                                                            {item.altUom && <div style={{fontSize:'11px', color:'var(--muted)'}}>{item.altUom}{item.convFactor ? ` ×${item.convFactor}`:''}</div>}
                                                            {item.childPartNbr && <div style={{fontSize:'11px', color:'var(--muted)'}}>→ {item.childPartNbr}</div>}
                                                        </td>
                                                        <td style={{textAlign:'right'}}>
                                                            {item.ourPrice && <div style={{fontWeight:700, color:'var(--green)', fontSize:'14px'}}>${item.ourPrice}</div>}
                                                            {item.externalPrice && <div style={{fontSize:'12px', color:'var(--red)'}}>Ext: ${(parseFloat(item.externalPrice)*1.54).toFixed(2)}</div>}
                                                            {!item.ourPrice && !item.externalPrice && <span style={{color:'var(--muted)'}}>—</span>}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="alert alert-info" style={{marginTop:'16px', marginBottom:0}}>
                                        <strong>Note:</strong> Prices are subject to change and should not be considered a quote. Please confirm current pricing with a sales representative.
                                    </div>
                                </div>
                            ) : (
                                <p style={{textAlign:'center', color:'var(--muted)', padding:'32px 0'}}>No items found matching <strong>"{searchQuery}"</strong>.</p>
                            )}
                        </div>
                    )}

                    {/* Tool cards */}
                    <h2 style={{fontFamily:'var(--gothic)', color:'var(--navy)', fontSize:'13px', letterSpacing:'0.12em', textTransform:'uppercase', fontWeight:700, marginBottom:'16px'}}>Available Tools</h2>
                    <div className="tool-grid">
                        {tools.map(t => (
                            <button key={t.id} className="tool-card" onClick={() => navigate(t.id)}>
                                <div className="tool-card-icon">{t.icon}</div>
                                <div className="tool-card-name">{t.name}</div>
                                <div className="tool-card-desc">{t.desc}</div>
                                <div className="tool-card-arrow">→</div>
                            </button>
                        ))}
                    </div>
                </div>
            </div>
        );
    }

    /* ══════════════════════════════════════════════════════════════════════
       FORMS PAGE — Packing Slip, Hazmat BOL, shared History
    ══════════════════════════════════════════════════════════════════════ */
    function FormsPage({ inventory }) {
        const [subTab, setSubTab] = useState('packing');
        const [history, setHistory] = useState([]);
        const [selectedRecord, setSelectedRecord] = useState(null);
        const [historySearch, setHistorySearch] = useState('');

        // Load unified history
        useEffect(() => {
            try {
                const h = localStorage.getItem('stockroom_forms_history');
                if (h) setHistory(JSON.parse(h));
                else {
                    // Migrate old packing slips
                    const old = localStorage.getItem('stockroom_packing_slips');
                    if (old) {
                        const migrated = JSON.parse(old).map(s => ({ ...s, _type: 'packing' }));
                        setHistory(migrated);
                        localStorage.setItem('stockroom_forms_history', JSON.stringify(migrated));
                    }
                }
            } catch(e) {}
        }, []);

        const saveToHistory = (record) => {
            try {
                const updated = [{ ...record, id: Date.now(), createdAt: new Date().toISOString() }, ...history];
                localStorage.setItem('stockroom_forms_history', JSON.stringify(updated));
                setHistory(updated);
            } catch(e) {}
        };

        const deleteRecord = (id) => {
            try {
                const updated = history.filter(h => h.id !== id);
                localStorage.setItem('stockroom_forms_history', JSON.stringify(updated));
                setHistory(updated);
                if (selectedRecord?.id === id) setSelectedRecord(null);
            } catch(e) {}
        };

        const exportHistory = () => {
            try {
                const blob = new Blob([JSON.stringify(history, null, 2)], { type:'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `forms_history_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            } catch(e) {}
        };

        const importHistory = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (!Array.isArray(imported)) { alert('Invalid file format.'); return; }
                    const existingIds = new Set(history.map(h => h.id));
                    const newItems = imported.filter(h => !existingIds.has(h.id));
                    const merged = [...history, ...newItems];
                    localStorage.setItem('stockroom_forms_history', JSON.stringify(merged));
                    setHistory(merged);
                    alert(`Imported ${newItems.length} record${newItems.length === 1 ? '' : 's'}.`);
                } catch(e) { alert('Error reading file.'); }
            };
            reader.readAsText(file); e.target.value = '';
        };

        const filteredHistory = history.filter(h => {
            if (!historySearch) return true;
            const q = historySearch.toLowerCase();
            if ((h.poNumber||'').toLowerCase().includes(q)) return true;
            if ((h.supplier||'').toLowerCase().includes(q)) return true;
            if ((h.consigneeName||'').toLowerCase().includes(q)) return true;
            if ((h._type||'').toLowerCase().includes(q)) return true;
            if ((h.receivedBy||'').toLowerCase().includes(q)) return true;
            if ((h.notes||'').toLowerCase().includes(q)) return true;
            if ((h.items||[]).some(i =>
                (i.itemName||'').toLowerCase().includes(q) ||
                (i.internalSKU||'').toLowerCase().includes(q) ||
                (i.vendorSKUs||'').toLowerCase().includes(q) ||
                (i.expiration||'').toLowerCase().includes(q)
            )) return true;
            if ((h.notFoundSKUs||[]).some(x =>
                typeof x === 'string'
                    ? x.toLowerCase().includes(q)
                    : (x.sku||'').toLowerCase().includes(q)
            )) return true;
            return false;
        });

        return (
            <div>
                <div className="page-banner">
                    <div className="container">
                        <div>
                            <h1>Forms</h1>
                            <p>Packing slips, hazardous materials bills of lading, and form history</p>
                        </div>
                        <div className="page-banner-icon">📋</div>
                    </div>
                </div>
                <div className="container page-content">
                    <div className="sub-tabs">
                        <button className={`sub-tab ${subTab === 'packing' ? 'active' : ''}`} onClick={() => setSubTab('packing')}>📦 Packing Slip</button>
                        <button className={`sub-tab ${subTab === 'hazmat' ? 'active' : ''}`} onClick={() => setSubTab('hazmat')}>☢️ Hazmat BOL</button>
                        <button className={`sub-tab ${subTab === 'newproduct' ? 'active' : ''}`} onClick={() => setSubTab('newproduct')}>🆕 New Product Request</button>
                        <button className={`sub-tab ${subTab === 'history' ? 'active' : ''}`} onClick={() => setSubTab('history')}>🕐 History ({history.length})</button>
                    </div>

                    {subTab === 'packing' && <PackingSlipForm inventory={inventory} onSave={saveToHistory} />}
                    {subTab === 'hazmat'     && <HazmatBOLForm          onSave={saveToHistory} />}
                    {subTab === 'newproduct' && <NewProductRequestForm   onSave={saveToHistory} />}
                    {subTab === 'history' && (
                        <div>
                            <div className="card">

    /* ── Packing Slip Form ────────────────────────────────────────────── */
    function PackingSlipForm({ inventory, onSave }) {
        const [slip, setSlip] = useState({ supplier:'', poNumber:'', dateReceived:'', receivedBy:'', items:[], notes:'', notFoundSKUs:[], _type:'packing' });
        const [itemInput, setItemInput] = useState('');
        const [processed, setProcessed] = useState(false);

        const processItems = () => {
            if (!inventory.length) return;
            const lines = itemInput.split('\n').filter(l => l.trim());
            const items = [], notFound = [];
            const uoms = ['PK','CS','EA','BX','DZ','CT','RL','PL','BT','TB'];
            lines.forEach(line => {
                const p = line.split(',').map(x => x.trim());
                if (p.length < 2) return;
                const [sku, qty, exp=''] = p;
                const ns = normalizeSKU(sku);
                let item = inventory.find(i => normalizeSKU(i.internalSKU) === ns || i.manufacturerSKUs.some(m => normalizeSKU(m) === ns));
                if (!item) { for (const u of uoms) { item = inventory.find(i => normalizeSKU(i.internalSKU) === ns+u || i.manufacturerSKUs.some(m => normalizeSKU(m) === ns+u)); if (item) break; } }
                if (!item) { for (const u of uoms) { if (ns.endsWith(u)) { const base = ns.slice(0,-u.length); item = inventory.find(i => normalizeSKU(i.internalSKU) === base || i.manufacturerSKUs.some(m => normalizeSKU(m) === base)); if (item) break; } } }
                if (item) items.push({ quantity:qty, itemName:item.itemName, internalSKU:item.internalSKU, vendorSKUs:item.manufacturerSKUs.join(', '), expiration:exp, location:item.location });
                else notFound.push({ sku, quantity:qty });
            });
            const sorted = sortByLocation(items);
            const updated = { ...slip, items:sorted, notFoundSKUs:notFound };
            setSlip(updated);
            setProcessed(true);
            return updated;
        };

        const handlePrint = () => {
            const result = processItems();
            if (result?.items.length) { onSave(result); setTimeout(() => printDocument(buildPackingSlipHTML(result)), 100); }
        };

        const handleClear = () => {
            setSlip({ supplier:'', poNumber:'', dateReceived:'', receivedBy:'', items:[], notes:'', notFoundSKUs:[], _type:'packing' });
            setItemInput(''); setProcessed(false);
        };

        return (
            <div>
                <div className="card">
                    <h2>Generate Packing Slip</h2>
                    <div className="grid-2">
                        <div className="form-group">
                            <label className="form-label">Supplier</label>
                            <input type="text" className="form-input" value={slip.supplier} onChange={e => setSlip({...slip, supplier:e.target.value})} />
                        </div>
                        <div className="form-group">
                            <label className="form-label">Purchase Order #</label>
                            <input type="text" className="form-input" value={slip.poNumber} onChange={e => setSlip({...slip, poNumber:e.target.value})} />
                        </div>
                    </div>
                    <div className="grid-2">
                        <div className="form-group">
                            <label className="form-label">Date Received</label>
                            <input type="date" className="form-input" value={slip.dateReceived} onChange={e => setSlip({...slip, dateReceived:e.target.value})} />
                        </div>
                        <div className="form-group">
                            <label className="form-label">Received By</label>
                            <input type="text" className="form-input" value={slip.receivedBy} onChange={e => setSlip({...slip, receivedBy:e.target.value})} />
                        </div>
                    </div>
                    <div className="form-group">
                        <label className="form-label">Items — one per line: SKU, Qty, Expiration (optional)</label>
                        <textarea className="form-textarea" rows="10" value={itemInput} onChange={e => setItemInput(e.target.value)} placeholder={"SKU-001, 5, 12/31/2025\nSKU-002, 3"} />
                    </div>
                    <div className="form-group">
                        <label className="form-label">Notes</label>
                        <textarea className="form-textarea" rows="3" value={slip.notes} onChange={e => setSlip({...slip, notes:e.target.value})} />
                    </div>
                    <div className="btn-group">
                        <button onClick={handlePrint} className="btn btn-gold">🖨 Process & Print</button>
                        <button onClick={handleClear} className="btn btn-ghost">Clear</button>
                    </div>
                </div>

                {/* Preview after processing */}
                {processed && slip.items.length > 0 && (
                    <div className="card">
                        <h2>Preview</h2>
                        <PackingSlipPreview slip={slip} />
                    </div>
                )}

            </div>
        );
    }

        /* ══════════════════════════════════════════════════════════════════════
       CYCLE COUNT PAGE
    ══════════════════════════════════════════════════════════════════════ */
    function CycleCountPage({ inventory }) {
        // ── Session: tracks start point (fixed) and current position (moves) ──
        const [session, setSession]           = useState(null);   // { startSection, startRack, startTime }
        const [startSection, setStartSection] = useState('');
        const [startRack, setStartRack]       = useState('');
        const [currentSection, setCurrentSection] = useState(''); // active section while counting
        const [currentRack, setCurrentRack]       = useState(''); // active rack while counting
        const [shelf, setShelf]               = useState('');
        const [scannedSKU, setScannedSKU]     = useState('');
        const [countQty, setCountQty]         = useState('');
        const [recountQty, setRecountQty]     = useState('');
        const [currentItem, setCurrentItem]   = useState(null);
        const [needsRecount, setNeedsRecount] = useState(false);
        const [countedItems, setCountedItems] = useState([]);
        const [misplacedItem, setMisplacedItem] = useState(null);

        // ── Location helpers ──────────────────────────────────────────────────
        const getUniqueSections = () => {
            const s = new Set();
            inventory.forEach(i => {
                if (!i.location.toUpperCase().includes('SS')) {
                    const p = parseLocation(i.location);
                    if (p.section) s.add(p.section);
                }
            });
            return Array.from(s).sort();
        };
        const getUniqueRacks = (sec) => {
            const r = new Set();
            inventory.forEach(i => { const p = parseLocation(i.location); if (p.section === sec) r.add(p.rack); });
            return Array.from(r).filter(r => r < 999).sort((a,b) => a-b);
        };
        const getUniqueShelves = (sec, r) => {
            const s = new Set();
            inventory.forEach(i => { const p = parseLocation(i.location); if (p.section === sec && p.rack === parseInt(r)) s.add(p.shelf); });
            return Array.from(s).filter(s => s < 999).sort((a,b) => a-b);
        };

        // ── Parent/child helpers ──────────────────────────────────────────────
        // Build a map: childSKU (normalized) → parent item
        const getParentMap = () => {
            const map = {};
            inventory.forEach(parent => {
                if (parent.childPartNbr) {
                    map[normalizeSKU(parent.childPartNbr)] = parent;
                }
            });
            return map;
        };

        // ── Missing items: from startRack through currentRack (inclusive) ─────
        const getAllMissingItems = () => {
            if (!session) return [];
            const startR = parseInt(session.startRack);
            const endR   = parseInt(currentRack);
            const allRacks = getUniqueRacks(session.startSection);
            // All racks from startRack index through currentRack index
            const startIdx = allRacks.indexOf(startR);
            const endIdx   = allRacks.indexOf(endR);
            const coveredRacks = new Set(allRacks.slice(startIdx, endIdx + 1));

            const expected = inventory.filter(i => {
                if (i.location.toUpperCase().includes('SS')) return false;
                const p = parseLocation(i.location);
                return p.section === session.startSection && coveredRacks.has(p.rack);
            });
            const counted = new Set(countedItems.map(i => normalizeSKU(i.sku)));
            return expected.filter(i => !counted.has(normalizeSKU(i.internalSKU)));
        };

        // ── Resolve parent/child relationships for export ─────────────────────
        // Returns { countedRows, missingRows } with parent info folded in
        const resolveParentChild = () => {
            const parentMap   = getParentMap();
            const rawMissing  = getAllMissingItems();
            const countedNorm = new Set(countedItems.map(i => normalizeSKU(i.sku)));

            // Annotate each counted item with its parent (if any)
            const countedRows = countedItems.map(ci => {
                const parent = parentMap[normalizeSKU(ci.sku)];
                return { ...ci, parentSKU: parent ? parent.internalSKU : null, parentName: parent ? parent.itemName : null };
            });

            // For missing items: suppress parent if its child was counted
            const missingRows = rawMissing.filter(mi => {
                // If this item IS a parent (has a childPartNbr) and that child was counted → suppress
                if (mi.childPartNbr && countedNorm.has(normalizeSKU(mi.childPartNbr))) return false;
                return true;
            });

            return { countedRows, missingRows };
        };

        // ── Session start ─────────────────────────────────────────────────────
        const startSession = () => {
            if (!startSection || !startRack) return;
            const shelves = getUniqueShelves(startSection, startRack);
            setSession({ startSection, startRack, startTime: new Date().toISOString() });
            setCurrentSection(startSection);
            setCurrentRack(startRack);
            setShelf(shelves[0]?.toString() || '1');
            setCountedItems([]); setScannedSKU(''); setCurrentItem(null);
        };

        // ── Scan / count ──────────────────────────────────────────────────────
        const handleScan = () => {
            if (!scannedSKU.trim()) return;
            const ns = normalizeSKU(scannedSKU);
            const alreadyCounted = countedItems.find(i => normalizeSKU(i.sku) === ns);
            if (alreadyCounted) {
                if (confirm(`Already counted ${alreadyCounted.sku}. Remove previous entry to re-count?`)) {
                    setCountedItems(ci => ci.filter(i => normalizeSKU(i.sku) !== ns));
                } else { setScannedSKU(''); return; }
            }
            const item = inventory.find(i => normalizeSKU(i.internalSKU) === ns || i.manufacturerSKUs.some(m => normalizeSKU(m) === ns));
            if (!item) { alert('SKU not found in database.'); setScannedSKU(''); return; }
            const loc    = parseLocation(item.location);
            const curLoc = `${currentSection}-${currentRack}-${shelf}`;
            const expLoc = `${loc.section}-${loc.rack}-${loc.shelf}`;
            if (curLoc !== expLoc) { setMisplacedItem({ item, expectedLoc: expLoc }); return; }
            setCurrentItem(item); setCountQty(''); setRecountQty(''); setNeedsRecount(false);
        };

        const submitCount = () => {
            if (!countQty && !needsRecount) return;
            if (needsRecount && !recountQty) return;
            const counted = parseInt(needsRecount ? recountQty : countQty);
            const onHand  = parseInt(currentItem.onHand || 0);
            if (counted !== onHand && !needsRecount) { setNeedsRecount(true); return; }
            const loc    = parseLocation(currentItem.location);
            const expLoc = `${loc.section}-${loc.rack}-${loc.shelf}`;
            const actLoc = `${currentSection}-${currentRack}-${shelf}`;
            setCountedItems(ci => [...ci, {
                sku: currentItem.internalSKU, itemName: currentItem.itemName,
                expectedLocation: currentItem.location,
                countedAt: actLoc, uom: currentItem.uom, onHand, counted,
                variance: counted - onHand, misplaced: expLoc !== actLoc,
                timestamp: new Date().toISOString()
            }]);
            setScannedSKU(''); setCurrentItem(null); setCountQty(''); setRecountQty(''); setNeedsRecount(false);
        };

        // ── Shelf / rack navigation ────────────────────────────────────────────
        const isLastShelf = () => {
            const shelves = getUniqueShelves(currentSection, currentRack);
            return shelves.indexOf(parseInt(shelf)) >= shelves.length - 1;
        };
        const isLastRack = () => {
            const racks = getUniqueRacks(currentSection);
            return racks.indexOf(parseInt(currentRack)) >= racks.length - 1;
        };

        const nextShelf = () => {
            const shelves = getUniqueShelves(currentSection, currentRack);
            const idx = shelves.indexOf(parseInt(shelf));
            if (idx < shelves.length - 1) {
                setShelf(shelves[idx + 1].toString());
                setScannedSKU(''); setCurrentItem(null);
            }
        };
        const prevShelf = () => {
            const shelves = getUniqueShelves(currentSection, currentRack);
            const idx = shelves.indexOf(parseInt(shelf));
            if (idx > 0) {
                setShelf(shelves[idx - 1].toString());
                setScannedSKU(''); setCurrentItem(null);
            } else {
                // Back to previous rack's last shelf
                const racks = getUniqueRacks(currentSection);
                const rIdx  = racks.indexOf(parseInt(currentRack));
                if (rIdx > 0) {
                    const prevRack   = racks[rIdx - 1];
                    const prevShelves = getUniqueShelves(currentSection, prevRack);
                    setCurrentRack(prevRack.toString());
                    setShelf(prevShelves[prevShelves.length - 1]?.toString() || '1');
                    setScannedSKU(''); setCurrentItem(null);
                } else {
                    alert('Already at the first shelf.');
                }
            }
        };
        const nextRack = () => {
            const racks = getUniqueRacks(currentSection);
            const idx   = racks.indexOf(parseInt(currentRack));
            if (idx < racks.length - 1) {
                const nr      = racks[idx + 1];
                const shelves = getUniqueShelves(currentSection, nr);
                setCurrentRack(nr.toString());
                setShelf(shelves[0]?.toString() || '1');
                setScannedSKU(''); setCurrentItem(null);
            }
        };

        // ── Export CSV ────────────────────────────────────────────────────────
        const exportCSV = () => {
            const { countedRows, missingRows } = resolveParentChild();
            const allRows = [
                ...countedRows.map(i => ({
                    countedAt: i.countedAt, expectedLocation: i.expectedLocation,
                    sku: i.sku, itemName: i.itemName, uom: i.uom,
                    onHand: i.onHand, counted: i.counted, variance: i.variance,
                    status: i.misplaced ? 'MISPLACED' : i.variance === 0 ? 'OK' : 'VARIANCE',
                    parentSKU: i.parentSKU || '', parentName: i.parentName || '',
                    timestamp: i.timestamp
                })),
                ...missingRows.map(i => ({
                    countedAt: '-', expectedLocation: i.location,
                    sku: i.internalSKU, itemName: i.itemName, uom: i.uom,
                    onHand: i.onHand || 0, counted: 0, variance: -(parseInt(i.onHand) || 0),
                    status: 'MISSING', parentSKU: '', parentName: '',
                    timestamp: new Date().toISOString()
                }))
            ];
            const header = 'Counted At,Expected Location,SKU,Item,UoM,System On-Hand,Counted,Variance,Status,Parent SKU,Parent Item,Time';
            const csv = header + '\n' + allRows.map(i =>
                `${i.countedAt},${i.expectedLocation},${i.sku},"${i.itemName}",${i.uom},${i.onHand},${i.counted},${i.variance},${i.status},"${i.parentSKU}","${i.parentName}",${i.timestamp}`
            ).join('\n');
            const blob = new Blob([csv], { type:'text/csv' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            const range = session.startRack === currentRack
                ? `${currentSection}${currentRack}`
                : `${currentSection}${session.startRack}-${currentRack}`;
            a.href = url;
            a.download = `cycle_count_${range}_${new Date().toISOString().split('T')[0]}.csv`;
