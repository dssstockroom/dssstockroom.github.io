<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Catalog Lookup</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.typekit.net/myu6uxh.css">
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; padding-bottom: 40px; font-family: 'Roboto', sans-serif; background: #f8f9fa; }
        h1, h2, h3 { font-family: 'Instrument Serif', serif; font-weight: normal; }
        .container { max-width: 1200px; margin: 0 auto; padding: 32px 20px; }
        .header { text-align: center; border-bottom: 3px solid #003594; padding-bottom: 24px; margin-bottom: 40px; }
        .header img { height: 80px; margin-bottom: 12px; }
        .header h1 { color: #003594; font-size: 32px; margin: 8px 0; }
        .header p { color: #00205B; margin: 4px 0; font-size: 15px; font-family: 'alternate-gothic-no-3-d', 'Roboto', sans-serif; letter-spacing: 0.5px; text-transform: uppercase; }
        .tabs { display: flex; gap: 4px; background: white; border-radius: 8px 8px 0 0; padding: 8px 8px 0 8px; margin-bottom: 0; border: 2px solid #e5e7eb; border-bottom: none; }
        .tab { padding: 14px 28px; font-weight: 600; background: none; border: none; color: #6b7280; cursor: pointer; border-radius: 6px 6px 0 0; transition: all 0.2s; font-size: 14px; font-family: 'alternate-gothic-no-3-d', 'Roboto', sans-serif; letter-spacing: 0.8px; text-transform: uppercase; }
        .tab:hover { background: #DBEEFF; color: #003594; }
        .tab.active { background: #003594; color: #FFB81C; font-weight: 700; }
        .card { background: white; border: 2px solid #e5e7eb; border-top: none; border-radius: 0 0 8px 8px; padding: 32px; margin-bottom: 24px; }
        .card:not(:first-child) { border-top: 2px solid #e5e7eb; border-radius: 8px; }
        .card h2 { color: #003594; font-size: 28px; margin: 0 0 24px 0; }
        .card h3 { color: #00205B; font-size: 20px; margin: 24px 0 16px 0; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-weight: 600; font-size: 13px; color: #00205B; margin-bottom: 8px; font-family: 'alternate-gothic-no-3-d', 'Roboto', sans-serif; letter-spacing: 0.5px; text-transform: uppercase; }
        .form-input, .form-textarea { width: 100%; padding: 12px 16px; border: 2px solid #C8C9C7; border-radius: 6px; font-size: 15px; transition: all 0.2s; }
        .form-input:focus, .form-textarea:focus { outline: none; border-color: #003594; box-shadow: 0 0 0 3px #DBEEFF; }
        .form-textarea { font-family: monospace; }
        select.form-input { cursor: pointer; }
        .btn { padding: 14px 28px; font-weight: 700; border-radius: 6px; cursor: pointer; border: 2px solid; font-size: 13px; display: inline-flex; align-items: center; gap: 10px; transition: all 0.2s; font-family: 'alternate-gothic-no-3-d', 'Roboto', sans-serif; letter-spacing: 0.8px; text-transform: uppercase; justify-content: center; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: #003594; color: white; border-color: #003594; }
        .btn-primary:hover:not(:disabled) { background: #00205B; }
        .btn-secondary { background: #FFB81C; color: #003594; border-color: #FFB81C; }
        .btn-secondary:hover { background: #e6a513; }
        .btn-gray { background: white; color: #00205B; border-color: #C8C9C7; }
        .btn-gray:hover { background: #f8f9fa; }
        .btn-red { background: #FF5B45; color: white; border-color: #FF5B45; }
        .btn-red:hover { background: #e54a35; }
        .btn-block { width: 100%; }
        .btn-group { display: flex; gap: 16px; }
        .btn-group .btn { flex: 1; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .alert { padding: 16px 20px; border-radius: 8px; margin-bottom: 20px; border: 2px solid; }
        .alert-success { background: #d1fae5; border-color: #00AD6E; color: #065f46; }
        .alert-error { background: #FFDECD; border-color: #FF5B45; color: #770538; }
        .alert-info { background: #DBEEFF; border-color: #66B2E3; color: #00205B; }
        table { width: 100%; border-collapse: collapse; border: 2px solid #00205B; }
        th, td { padding: 14px 10px; border: 1px solid #C8C9C7; }
        th { background: #DBEEFF; font-weight: 700; cursor: pointer; color: #00205B; font-family: 'alternate-gothic-no-3-d', 'Roboto', sans-serif; font-size: 13px; letter-spacing: 0.5px; text-transform: uppercase; }
        th:hover { background: #66B2E3; color: white; }
        tbody tr:hover { background: #f8f9fa; }
        .text-center { text-align: center; }
        .text-mono { font-family: monospace; }
        .history-item { border: 2px solid #C8C9C7; border-radius: 8px; padding: 20px; margin-bottom: 16px; background: white; }
        .history-item:hover { border-color: #003594; }
        .preview-box { max-height: 400px; overflow-y: auto; border: 2px solid #C8C9C7; border-radius: 6px; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #003594; color: white; padding: 8px 20px; text-align: center; font-size: 12px; z-index: 1000; }
        @media screen { .print-only { display: none !important; } }
        @media print {
            body { margin: 0; padding: 20px; background: white; padding-bottom: 0; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .footer { display: none !important; }
            table { font-size: 11px; border-color: #000; }
            th, td { padding: 6px 4px; border-color: #000; }
            th { background: #f9fafb !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [inventory, setInventory] = useState([]);
            const [activeTab, setActiveTab] = useState('search');
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState(null);
            const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });
            const [error, setError] = useState('');
            const [fileLastModified, setFileLastModified] = useState(null);
            
            const [packingSlip, setPackingSlip] = useState({ supplier: '', poNumber: '', dateReceived: '', receivedBy: '', items: [], notes: '', notFoundSKUs: [] });
            const [itemInput, setItemInput] = useState('');
            const [savedPackingSlips, setSavedPackingSlips] = useState([]);
            const [historySearchQuery, setHistorySearchQuery] = useState('');
            const [selectedSlip, setSelectedSlip] = useState(null);
            
            const [cycleCountSession, setCycleCountSession] = useState(null);
            const [cycleCountSection, setCycleCountSection] = useState('');
            const [cycleCountRack, setCycleCountRack] = useState('');
            const [cycleCountShelf, setCycleCountShelf] = useState('');
            const [scannedSKU, setScannedSKU] = useState('');
            const [countQuantity, setCountQuantity] = useState('');
            const [recountQuantity, setRecountQuantity] = useState('');
            const [currentItem, setCurrentItem] = useState(null);
            const [needsRecount, setNeedsRecount] = useState(false);
            const [countedItems, setCountedItems] = useState([]);
            const [misplacedItem, setMisplacedItem] = useState(null);
            
            const [hazmatBOL, setHazmatBOL] = useState({
                shipperName: 'UNIVERSITY OF PITTSBURGH', shipperAttn: '', shipperAddress: 'CHEMISTRY STOCKROOM', shipperAddress2: '219 PARKMAN AVE RM326',
                shipperCity: 'PITTSBURGH', shipperState: 'PA', shipperZip: '15213', shipperPhone: '412-624-8551',
                consigneeName: '', consigneeAttn: '', consigneeAddress: '', consigneeAddress2: '', consigneeCity: '', consigneeState: '', consigneeZip: '', consigneePhone: '',
                carrierName: '', carrierPhone: '', shipDate: '', emergencyContact: '', emergencyPhone: '', materials: []
            });
            const [hazmatInput, setHazmatInput] = useState('');

            useEffect(() => {
                fetch('inventory-status-report.xlsx')
                    .then(r => {
                        const lm = r.headers.get('Last-Modified');
                        if (lm) setFileLastModified(new Date(lm));
                        return r.arrayBuffer();
                    })
                    .then(ab => {
                        try {
                            const wb = XLSX.read(ab, { type: 'array', cellDates: true });
                            const ws = wb.Sheets[wb.SheetNames[0]];
                            if (wb.Props?.ModifiedDate) setFileLastModified(new Date(wb.Props.ModifiedDate));
                            const json = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: '' });
                            if (json.length < 2) return;
                            const data = [];
                            for (let i = 1; i < json.length; i++) {
                                const r = json[i];
                                if (r.length >= 15 && r[4]) {
                                    const item = {
                                        location: String(r[2] || '').trim(), internalSKU: String(r[4] || '').trim(),
                                        manufacturerSKUs: [String(r[5] || '').trim(), String(r[6] || '').trim(), String(r[7] || '').trim(), String(r[8] || '').trim()].filter(s => s),
                                        itemName: String(r[13] || '').trim(), uom: String(r[14] || '').trim(), altUom: String(r[15] || '').trim(),
                                        convFactor: String(r[16] || '').trim(), childPartNbr: String(r[17] || '').trim(), childConvFactor: String(r[18] || '').trim(),
                                        vendor: String(r[12] || '').trim(), externalPrice: String(r[26] || '').trim(), ourPrice: String(r[27] || '').trim(),
                                        onHand: String(r[23] || '').trim()
                                    };
                                    if (item.internalSKU && item.location) data.push(item);
                                }
                            }
                            setInventory(data);
                        } catch (e) {}
                    })
                    .catch(() => {
                        try {
                            const saved = localStorage.getItem('stockroom_inventory');
                            if (saved) setInventory(JSON.parse(saved));
                        } catch (e) {}
                    });

                try {
                    const slips = localStorage.getItem('stockroom_packing_slips');
                    if (slips) setSavedPackingSlips(JSON.parse(slips));
                } catch (e) {}
            }, []);

            const parseLocation = (loc) => {
                const n = loc.replace(/\s+/g, '').replace(/-+/g, '-');
                const ex = ['HALLWAY', 'WASTEROOM', 'DOCKCAGE', 'THOMAS'];
                const u = loc.toUpperCase();
                for (const k of ex) if (u.includes(k)) return { section: null, rack: 999, shelf: 999 };
                if (u === 'NEW' || u === 'NEW-' || u === 'NEW--') return { section: null, rack: 999, shelf: 999 };
                let m = n.match(/(?:DISC|NEW)\s*([A-Za-z])-?(\d+)-?(\d+)/i);
                if (m) return { section: m[1].toUpperCase(), rack: parseInt(m[2]), shelf: parseInt(m[3]) };
                m = n.match(/^([A-Za-z])-?(\d+)-?([A-Za-z]?\d+[A-Za-z]?)/);
                if (m) return { section: m[1].toUpperCase(), rack: parseInt(m[2]), shelf: parseInt(m[3].replace(/[A-Za-z]/g, '')) || 0 };
                return { section: 'Z', rack: 999, shelf: 999 };
            };

            const sortByLocation = (items) => [...items].sort((a, b) => {
                const la = parseLocation(a.location), lb = parseLocation(b.location);
                if (la.section !== lb.section) return la.section.localeCompare(lb.section);
                if (la.rack !== lb.rack) return la.rack - lb.rack;
                return la.shelf - lb.shelf;
            });

            const normalizeSKU = (s) => s.replace(/-/g, '').toUpperCase();

            const handleGeneralSearch = () => {
                if (!inventory.length) { setError('Database loading...'); return; }
                const q = searchQuery.trim().toLowerCase();
                if (!q) { setError('Enter search'); return; }
                const words = q.split(/\s+/);
                const nq = normalizeSKU(q);
                const found = inventory.filter(item => {
                    const ni = normalizeSKU(item.internalSKU);
                    const nm = item.manufacturerSKUs.map(normalizeSKU);
                    if (ni.includes(nq) || nq.includes(ni)) return true;
                    if (nm.some(m => m.includes(nq) || nq.includes(m))) return true;
                    if (words.every(w => item.itemName.toLowerCase().includes(w))) return true;
                    if (item.vendor && words.every(w => item.vendor.toLowerCase().includes(w))) return true;
                    return false;
                });
                setSearchResults(found); setSortConfig({ key: null, direction: 'asc' }); setError('');
            };

            const handleSort = (key) => setSortConfig({ key, direction: sortConfig.key === key && sortConfig.direction === 'asc' ? 'desc' : 'asc' });

            const getSortedResults = (res) => {
                if (!sortConfig.key || !res) return res;
                return [...res].sort((a, b) => {
                    let av = a[sortConfig.key], bv = b[sortConfig.key];
                    if (sortConfig.key === 'manufacturerSKUs') { av = a.manufacturerSKUs.join(', '); bv = b.manufacturerSKUs.join(', '); }
                    if (sortConfig.key === 'ourPrice') { av = parseFloat(av || 0); bv = parseFloat(bv || 0); }
                    if (sortConfig.key === 'location') {
                        const la = parseLocation(a.location), lb = parseLocation(b.location);
                        if (la.section !== lb.section) return sortConfig.direction === 'asc' ? la.section.localeCompare(lb.section) : lb.section.localeCompare(la.section);
                        if (la.rack !== lb.rack) return sortConfig.direction === 'asc' ? la.rack - lb.rack : lb.rack - la.rack;
                        return sortConfig.direction === 'asc' ? la.shelf - lb.shelf : lb.shelf - la.shelf;
                    }
                    if (typeof av === 'string') { av = av.toLowerCase(); bv = bv ? bv.toLowerCase() : ''; }
                    if (av < bv) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (av > bv) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });
            };

            const SortIcon = ({ columnKey }) => sortConfig.key !== columnKey ? <span style={{color: '#9ca3af', marginLeft: '4px'}}>⇅</span> : sortConfig.direction === 'asc' ? <span style={{marginLeft: '4px'}}>↑</span> : <span style={{marginLeft: '4px'}}>↓</span>;

            const handlePackingSlipItems = () => {
                if (!inventory.length) return;
                const lines = itemInput.split('\n').filter(l => l.trim());
                const items = [], notFound = [], uom = ['PK', 'CS', 'EA', 'BX', 'DZ', 'CT', 'RL', 'PL', 'BT', 'TB'];
                lines.forEach(line => {
                    const p = line.split(',').map(x => x.trim());
                    if (p.length < 2) return;
                    const sku = p[0], qty = p[1], exp = p[2] || '', ns = normalizeSKU(sku);
                    let item = inventory.find(i => normalizeSKU(i.internalSKU) === ns || i.manufacturerSKUs.some(m => normalizeSKU(m) === ns));
                    if (!item) { for (const u of uom) { item = inventory.find(i => normalizeSKU(i.internalSKU) === ns + u || i.manufacturerSKUs.some(m => normalizeSKU(m) === ns + u)); if (item) break; } }
                    if (!item) { for (const u of uom) { if (ns.endsWith(u)) { const base = ns.slice(0, -u.length); item = inventory.find(i => normalizeSKU(i.internalSKU) === base || i.manufacturerSKUs.some(m => normalizeSKU(m) === base)); if (item) break; } } }
                    if (item) items.push({ quantity: qty, itemName: item.itemName, internalSKU: item.internalSKU, vendorSKUs: item.manufacturerSKUs.join(', '), expiration: exp, location: item.location });
                    else notFound.push({ sku, quantity: qty });
                });
                const sorted = sortByLocation(items);
                const slip = { ...packingSlip, items: sorted, notFoundSKUs: notFound };
                setPackingSlip(slip);
                if (slip.items.length) {
                    try { const all = [{ ...slip, id: Date.now(), createdAt: new Date().toISOString() }, ...savedPackingSlips]; localStorage.setItem('stockroom_packing_slips', JSON.stringify(all)); setSavedPackingSlips(all); } catch (e) {}
                }
            };

            const deletePackingSlip = (id) => {
                try { const u = savedPackingSlips.filter(s => s.id !== id); localStorage.setItem('stockroom_packing_slips', JSON.stringify(u)); setSavedPackingSlips(u); if (selectedSlip?.id === id) setSelectedSlip(null); } catch (e) {}
            };

            const exportPackingSlips = () => {
                try {
                    const blob = new Blob([JSON.stringify(savedPackingSlips, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = `packing_slips_${new Date().toISOString().split('T')[0]}.json`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                } catch (e) {}
            };

            const importPackingSlips = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (!Array.isArray(imported)) { alert('Invalid'); return; }
                        const existingIds = new Set(savedPackingSlips.map(s => s.id));
                        const newSlips = imported.filter(s => !existingIds.has(s.id));
                        const merged = [...savedPackingSlips, ...newSlips];
                        localStorage.setItem('stockroom_packing_slips', JSON.stringify(merged));
                        setSavedPackingSlips(merged); alert(`Imported ${newSlips.length}`);
                    } catch (e) { alert('Error'); }
                };
                reader.readAsText(file); e.target.value = '';
            };

            const handleHazmatMaterials = () => {
                const lines = hazmatInput.split('\n').filter(l => l.trim());
                const materials = lines.map(line => {
                    const p = line.split(',').map(x => x.trim());
                    return { unNumber: p[0] || '', properShippingName: p[1] || '', hazardClass: p[2] || '', packingGroup: p[3] || '', quantity: p[4] || '', type: p[5] || '' };
                });
                setHazmatBOL({ ...hazmatBOL, materials });
            };

            const clearHazmatBOL = () => {
                setHazmatBOL({
                    shipperName: 'UNIVERSITY OF PITTSBURGH', shipperAttn: '', shipperAddress: 'CHEMISTRY STOCKROOM', shipperAddress2: '219 PARKMAN AVE RM326',
                    shipperCity: 'PITTSBURGH', shipperState: 'PA', shipperZip: '15213', shipperPhone: '412-624-8551',
                    consigneeName: '', consigneeAttn: '', consigneeAddress: '', consigneeAddress2: '', consigneeCity: '', consigneeState: '', consigneeZip: '', consigneePhone: '',
                    carrierName: '', carrierPhone: '', shipDate: '', emergencyContact: '', emergencyPhone: '', materials: []
                });
                setHazmatInput('');
            };

            // Cycle Count Functions
            const startCycleCount = () => {
                if (!cycleCountSection || !cycleCountRack) return;
                const shelves = getUniqueShelves(cycleCountSession.section, cycleCountSession.rack);
                setCycleCountSession({ section: cycleCountSection, rack: cycleCountRack, startTime: new Date().toISOString() });
                setCycleCountShelf(shelves[0]?.toString() || '1');
                setCountedItems([]);
            };

            const handleScan = () => {
                if (!scannedSKU.trim()) return;
                const ns = normalizeSKU(scannedSKU);
                
                // Check if already counted
                const alreadyCounted = countedItems.find(i => normalizeSKU(i.sku) === ns);
                if (alreadyCounted) {
                    if (confirm(`Already counted ${alreadyCounted.sku}. Edit previous entry?`)) {
                        setCountedItems(countedItems.filter(i => normalizeSKU(i.sku) !== ns));
                    } else {
                        setScannedSKU('');
                        return;
                    }
                }
                
                const item = inventory.find(i => normalizeSKU(i.internalSKU) === ns || i.manufacturerSKUs.some(m => normalizeSKU(m) === ns));
                if (!item) { alert('SKU not found in database'); setScannedSKU(''); return; }
                
                const loc = parseLocation(item.location);
                const currentLoc = `${cycleCountSession.section}-${cycleCountSession.rack}-${cycleCountShelf}`;
                const expectedLoc = `${loc.section}-${loc.rack}-${loc.shelf}`;
                
                if (currentLoc !== expectedLoc) {
                    setMisplacedItem({ item, expectedLoc });
                    return;
                }
                
                setCurrentItem(item);
                setCountQuantity('');
                setRecountQuantity('');
                setNeedsRecount(false);
            };

            const countMisplacedItem = () => {
                setCurrentItem(misplacedItem.item);
                setMisplacedItem(null);
                setCountQuantity('');
                setRecountQuantity('');
                setNeedsRecount(false);
            };

            const cancelMisplaced = () => {
                setMisplacedItem(null);
                setScannedSKU('');
            };

            const submitCount = () => {
                if (!countQuantity && !needsRecount) return;
                if (needsRecount && !recountQuantity) return;
                const counted = parseInt(needsRecount ? recountQuantity : countQuantity);
                const onHand = parseInt(currentItem.onHand || 0);
                if (counted !== onHand && !needsRecount) { setNeedsRecount(true); return; }
                
                const loc = parseLocation(currentItem.location);
                const expectedLoc = `${loc.section}-${loc.rack}-${loc.shelf}`;
                const actualLoc = `${cycleCountSession.section}-${cycleCountSession.rack}-${cycleCountShelf}`;
                const isMisplaced = expectedLoc !== actualLoc;
                
                setCountedItems([...countedItems, {
                    sku: currentItem.internalSKU, itemName: currentItem.itemName, expectedLocation: currentItem.location,
                    countedAt: actualLoc, uom: currentItem.uom, onHand, counted, variance: counted - onHand, 
                    misplaced: isMisplaced, timestamp: new Date().toISOString()
                }]);
                setScannedSKU(''); setCurrentItem(null); setCountQuantity(''); setRecountQuantity(''); setNeedsRecount(false);
            };

            const nextShelf = () => {
                const shelves = getUniqueShelves(cycleCountSession.section, cycleCountSession.rack);
                const currentIdx = shelves.indexOf(parseInt(cycleCountShelf));
                if (currentIdx < shelves.length - 1) {
                    setCycleCountShelf(shelves[currentIdx + 1].toString());
                    setScannedSKU('');
                    setCurrentItem(null);
                } else {
                    alert('Last shelf in this rack');
                }
            };

            const getExpectedItems = () => {
                return inventory.filter(item => {
                    if (item.location.toUpperCase().includes('SS')) return false;
                    const loc = parseLocation(item.location);
                    return loc.section === cycleCountSession.section && 
                           loc.rack === parseInt(cycleCountSession.rack) && 
                           loc.shelf === parseInt(cycleCountShelf);
                });
            };

            const getMissingItems = () => {
                const expected = getExpectedItems();
                const countedSKUs = new Set(countedItems.filter(i => !i.misplaced && i.countedAt === `${cycleCountSession.section}-${cycleCountSession.rack}-${cycleCountShelf}`).map(i => normalizeSKU(i.sku)));
                return expected.filter(item => !countedSKUs.has(normalizeSKU(item.internalSKU)));
            };

            const exportCycleCount = () => {
                if (!countedItems.length) return;
                const csv = 'Counted At,Expected Location,SKU,Item,UoM,OnHand,Counted,Variance,Misplaced,Time\n' + 
                    countedItems.map(i => `${i.countedAt},${i.expectedLocation},${i.sku},"${i.itemName}",${i.uom},${i.onHand},${i.counted},${i.variance},${i.misplaced ? 'YES' : 'NO'},${i.timestamp}`).join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `cycle_count_${cycleCountSession.section}${cycleCountSession.rack}_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            };

            const printCycleCount = () => window.print();

            const endCycleCount = () => {
                if (confirm('End session? Export data first!')) {
                    setCycleCountSession(null); setCountedItems([]); setCurrentItem(null); 
                    setCycleCountSection(''); setCycleCountRack(''); setCycleCountShelf('');
                }
            };

            const getUniqueSections = () => {
                const sec = new Set();
                inventory.forEach(i => {
                    if (i.location.toUpperCase().includes('SS')) return;
                    const p = parseLocation(i.location);
                    if (p.section) sec.add(p.section);
                });
                return Array.from(sec).sort();
            };

            const getUniqueRacks = (section) => {
                const racks = new Set();
                inventory.forEach(i => {
                    const p = parseLocation(i.location);
                    if (p.section === section) racks.add(p.rack);
                });
                return Array.from(racks).sort((a, b) => a - b);
            };

            const getUniqueShelves = (section, rack) => {
                const shelves = new Set();
                inventory.forEach(i => {
                    const p = parseLocation(i.location);
                    if (p.section === section && p.rack === parseInt(rack)) shelves.add(p.shelf);
                });
                return Array.from(shelves).sort((a, b) => a - b);
            };

            return (
                <div>
                    <div className="no-print">
                        <div className="container">
                            <div className="header">
                                <img src="https://upload.wikimedia.org/wikipedia/en/f/fb/University_of_Pittsburgh_seal.svg" alt="Pitt" />
                                <h1>Dietrich School Scientific Stockroom</h1>
                                <p>Inventory Catalog Lookup System</p>
                            </div>
                            <div className="tabs">
                                <button className={`tab ${activeTab === 'search' ? 'active' : ''}`} onClick={() => setActiveTab('search')}>General Search</button>
                                <button className={`tab ${activeTab === 'packing' ? 'active' : ''}`} onClick={() => setActiveTab('packing')}>Packing Slip</button>
                                <button className={`tab ${activeTab === 'history' ? 'active' : ''}`} onClick={() => setActiveTab('history')}>History ({savedPackingSlips.length})</button>
                                <button className={`tab ${activeTab === 'cyclecount' ? 'active' : ''}`} onClick={() => setActiveTab('cyclecount')}>Cycle Count</button>
                                <button className={`tab ${activeTab === 'hazmat' ? 'active' : ''}`} onClick={() => setActiveTab('hazmat')}>Hazmat BOL</button>
                            </div>
                            <div className="card">
                                <h2>Database Status</h2>
                                {inventory.length > 0 ? <div className="alert alert-success"><strong>Loaded:</strong> {inventory.length} items</div> : <div className="alert alert-info">Loading...</div>}
                            </div>
                            {activeTab === 'search' && (
                                <div>
                                    <div className="card">
                                        <h2>General Search</h2>
                                        <div className="form-group">
                                            <label className="form-label">Search by SKU or Item Name</label>
                                            <input type="text" className="form-input" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleGeneralSearch()} />
                                        </div>
                                        {error && <div className="alert alert-error">{error}</div>}
                                        <button onClick={handleGeneralSearch} className="btn btn-primary btn-block">Search</button>
                                    </div>
                                    {searchResults && (
                                        <div className="card">
                                            <h2>Results ({searchResults.length})</h2>
                                            {searchResults.length > 0 ? (
                                                <div>
                                                    <div style={{overflowX: 'auto'}}>
                                                        <table>
                                                            <thead>
                                                                <tr>
                                                                    <th onClick={() => handleSort('location')} className="text-center">Location <SortIcon columnKey="location" /></th>
                                                                    <th onClick={() => handleSort('itemName')}>Item <SortIcon columnKey="itemName" /></th>
                                                                    <th onClick={() => handleSort('internalSKU')} className="text-center">Internal SKU <SortIcon columnKey="internalSKU" /></th>
                                                                    <th onClick={() => handleSort('manufacturerSKUs')}>Vendor SKUs <SortIcon columnKey="manufacturerSKUs" /></th>
                                                                    <th onClick={() => handleSort('vendor')} className="text-center">Vendor <SortIcon columnKey="vendor" /></th>
                                                                    <th onClick={() => handleSort('uom')} className="text-center">UoM <SortIcon columnKey="uom" /></th>
                                                                    <th onClick={() => handleSort('altUom')} className="text-center">Alt UoM <SortIcon columnKey="altUom" /></th>
                                                                    <th onClick={() => handleSort('ourPrice')} className="text-center">Price <SortIcon columnKey="ourPrice" /></th>
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                {getSortedResults(searchResults).map((item, idx) => (
                                                                    <tr key={idx}>
                                                                        <td className="text-center text-mono" style={{fontWeight: 'bold'}}>{item.location}</td>
                                                                        <td>{item.itemName}</td>
                                                                        <td className="text-center text-mono" style={{fontSize: '12px'}}>{item.internalSKU}</td>
                                                                        <td className="text-mono" style={{fontSize: '12px'}}>{item.manufacturerSKUs.join(', ')}</td>
                                                                        <td className="text-center" style={{fontSize: '12px'}}>{item.vendor || '-'}</td>
                                                                        <td className="text-center">
                                                                            <div>{item.uom}</div>
                                                                            {item.childPartNbr && <div style={{fontSize: '11px', color: '#666', marginTop: '2px'}}>→ {item.childPartNbr}{item.childConvFactor && ` (${item.childConvFactor})`}</div>}
                                                                        </td>
                                                                        <td className="text-center">
                                                                            {item.altUom ? <div><div>{item.altUom}</div>{item.convFactor && <div style={{fontSize: '11px', color: '#666'}}>×{item.convFactor}</div>}</div> : '-'}
                                                                        </td>
                                                                        <td className="text-center">
                                                                            {item.ourPrice && <div style={{fontWeight: 'bold', color: '#00AD6E'}}>${item.ourPrice}</div>}
                                                                            {item.externalPrice && <div style={{fontWeight: 'bold', color: '#FF5B45', fontSize: '12px', marginTop: '2px'}}>${(parseFloat(item.externalPrice) * 1.54).toFixed(2)}</div>}
                                                                            {!item.ourPrice && !item.externalPrice && '-'}
                                                                        </td>
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                    <div style={{marginTop: '20px', padding: '16px', background: '#DBEEFF', borderRadius: '6px', border: '2px solid #66B2E3'}}>
                                                        <p style={{fontSize: '13px', color: '#00205B', margin: 0}}><strong>Note:</strong> Prices are subject to change and should not be considered a quote. Please inquire with a sales representative to confirm current pricing.</p>
                                                    </div>
                                                </div>
                                            ) : <p style={{textAlign: 'center', color: '#666', padding: '32px'}}>No items found.</p>}
                                        </div>
                                    )}
                                </div>
                            )}
                            {activeTab === 'packing' && (
                                <div className="card">
                                    <h2>Generate Packing Slip</h2>
                                    <div className="grid-2">
                                        <div className="form-group"><label className="form-label">Supplier</label><input type="text" className="form-input" value={packingSlip.supplier} onChange={(e) => setPackingSlip({...packingSlip, supplier: e.target.value})} /></div>
                                        <div className="form-group"><label className="form-label">Purchase Order #</label><input type="text" className="form-input" value={packingSlip.poNumber} onChange={(e) => setPackingSlip({...packingSlip, poNumber: e.target.value})} /></div>
                                    </div>
                                    <div className="grid-2">
                                        <div className="form-group"><label className="form-label">Date Received</label><input type="date" className="form-input" value={packingSlip.dateReceived} onChange={(e) => setPackingSlip({...packingSlip, dateReceived: e.target.value})} /></div>
                                        <div className="form-group"><label className="form-label">Received By</label><input type="text" className="form-input" value={packingSlip.receivedBy} onChange={(e) => setPackingSlip({...packingSlip, receivedBy: e.target.value})} /></div>
                                    </div>
                                    <div className="form-group"><label className="form-label">Items (SKU, Qty, Exp)</label><textarea className="form-textarea" rows="10" value={itemInput} onChange={(e) => setItemInput(e.target.value)} placeholder="SKU-001, 5, 12/31/2025" /></div>
                                    <div className="form-group"><label className="form-label">Notes</label><textarea className="form-textarea" rows="4" value={packingSlip.notes} onChange={(e) => setPackingSlip({...packingSlip, notes: e.target.value})} /></div>
                                    <div className="btn-group">
                                        <button onClick={() => { handlePackingSlipItems(); setTimeout(() => window.print(), 100); }} className="btn btn-secondary">Print</button>
                                        <button onClick={() => { setPackingSlip({ supplier: '', poNumber: '', dateReceived: '', receivedBy: '', items: [], notes: '', notFoundSKUs: [] }); setItemInput(''); }} className="btn btn-gray">Clear</button>
                                    </div>
                                </div>
                            )}
                            {activeTab === 'history' && (
                                <div>
                                    <div className="card">
                                        <h2>History</h2>
                                        <div className="form-group">
                                            <label className="form-label">Search</label>
                                            <input type="text" className="form-input" value={historySearchQuery} onChange={(e) => setHistorySearchQuery(e.target.value)} />
                                        </div>
                                        <div className="btn-group">
                                            <button onClick={exportPackingSlips} disabled={!savedPackingSlips.length} className="btn btn-primary">Export</button>
                                            <label className="btn btn-secondary" style={{margin: 0}}><input type="file" accept=".json" onChange={importPackingSlips} style={{display: 'none'}} />Import</label>
                                        </div>
                                    </div>
                                    {selectedSlip && (
                                        <div className="card">
                                            <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '16px'}}>
                                                <h2 style={{margin: 0}}>PO# {selectedSlip.poNumber}</h2>
                                                <button onClick={() => setSelectedSlip(null)} className="btn btn-gray">Close</button>
                                            </div>
                                            <button onClick={() => window.print()} className="btn btn-secondary btn-block" style={{marginBottom: '16px'}}>Print</button>
                                            <div style={{border: '2px solid #C8C9C7', borderRadius: '6px', padding: '16px'}}>
                                                <div className="grid-2" style={{marginBottom: '16px', paddingBottom: '16px', borderBottom: '1px solid #e5e7eb'}}>
                                                    <div><p style={{margin: '4px 0', fontSize: '14px'}}><strong>Supplier:</strong> {selectedSlip.supplier}</p><p style={{margin: '4px 0', fontSize: '14px'}}><strong>PO:</strong> {selectedSlip.poNumber}</p></div>
                                                    <div><p style={{margin: '4px 0', fontSize: '14px'}}><strong>Date:</strong> {selectedSlip.dateReceived}</p><p style={{margin: '4px 0', fontSize: '14px'}}><strong>By:</strong> {selectedSlip.receivedBy}</p></div>
                                                </div>
                                                <div className="preview-box">
                                                    <table>
                                                        <thead style={{position: 'sticky', top: 0}}><tr><th className="text-center" style={{fontSize: '12px'}}>Loc</th><th className="text-center" style={{fontSize: '12px'}}>Qty</th><th style={{fontSize: '12px'}}>Item</th><th className="text-center" style={{fontSize: '12px'}}>SKU</th><th style={{fontSize: '12px'}}>Vendor SKUs</th><th className="text-center" style={{fontSize: '12px'}}>Exp</th></tr></thead>
                                                        <tbody>{selectedSlip.items.map((it, i) => <tr key={i}><td className="text-center text-mono" style={{fontSize: '12px', fontWeight: 'bold'}}>{it.location}</td><td className="text-center" style={{fontSize: '12px'}}>{it.quantity}</td><td style={{fontSize: '12px'}}>{it.itemName}</td><td className="text-center text-mono" style={{fontSize: '11px'}}>{it.internalSKU}</td><td className="text-mono" style={{fontSize: '11px'}}>{it.vendorSKUs}</td><td className="text-center" style={{fontSize: '11px'}}>{it.expiration || '-'}</td></tr>)}</tbody>
                                                    </table>
                                                </div>
                                                {selectedSlip.notes?.trim() && <div style={{marginTop: '16px', padding: '12px', background: '#f9fafb', borderRadius: '4px'}}><p style={{fontSize: '12px', fontWeight: 'bold', margin: '0 0 8px 0'}}>Notes:</p><p style={{fontSize: '12px', margin: 0, whiteSpace: 'pre-wrap'}}>{selectedSlip.notes}</p></div>}
                                                {selectedSlip.notFoundSKUs?.length > 0 && <div style={{marginTop: '16px', padding: '12px', background: '#FFDECD', borderRadius: '4px', border: '2px solid #FF5B45'}}><p style={{fontSize: '12px', fontWeight: 'bold', margin: '0 0 8px 0', color: '#770538'}}>Not Found:</p><ul style={{margin: 0, paddingLeft: '20px', fontSize: '12px', color: '#770538'}}>{selectedSlip.notFoundSKUs.map((x, i) => <li key={i} className="text-mono">{typeof x === 'string' ? x : `${x.sku} (Qty: ${x.quantity})`}</li>)}</ul></div>}
                                            </div>
                                        </div>
                                    )}
                                    <div className="card">
                                        {!savedPackingSlips.length ? <p style={{textAlign: 'center', color: '#666', padding: '32px'}}>No slips saved.</p> : savedPackingSlips.filter(s => !historySearchQuery || s.poNumber.toLowerCase().includes(historySearchQuery.toLowerCase()) || s.supplier.toLowerCase().includes(historySearchQuery.toLowerCase()) || s.items.some(i => i.itemName.toLowerCase().includes(historySearchQuery.toLowerCase()))).map(s => (
                                            <div key={s.id} className="history-item">
                                                <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '8px'}}>
                                                    <div><h3 style={{margin: '0 0 8px 0', fontSize: '18px'}}>PO# {s.poNumber}</h3><p style={{margin: '2px 0', fontSize: '14px', color: '#666'}}>Supplier: {s.supplier}</p><p style={{margin: '2px 0', fontSize: '14px', color: '#666'}}>Date: {s.dateReceived} | By: {s.receivedBy}</p></div>
                                                    <div style={{display: 'flex', gap: '8px'}}><button onClick={() => setSelectedSlip(s)} className="btn btn-primary" style={{padding: '8px 16px'}}>View</button><button onClick={() => confirm('Delete?') && deletePackingSlip(s.id)} className="btn btn-red" style={{padding: '8px 16px'}}>Delete</button></div>
                                                </div>
                                                <div style={{marginTop: '8px', paddingTop: '8px', borderTop: '1px solid #e5e7eb'}}><p style={{fontSize: '14px'}}><strong>Items:</strong> {s.items.length}</p></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            {activeTab === 'cyclecount' && (
                                <div className="card">
                                    <h2>Cycle Count</h2>
                                    {!cycleCountSession ? (
                                        <div>
                                            <p style={{fontSize: '14px', color: '#666', marginBottom: '20px'}}>Select section and rack to begin</p>
                                            <div className="grid-2">
                                                <div className="form-group">
                                                    <label className="form-label">Section</label>
                                                    <select className="form-input" value={cycleCountSection} onChange={(e) => { setCycleCountSection(e.target.value); setCycleCountRack(''); }}>
                                                        <option value="">Select...</option>
                                                        {getUniqueSections().map(s => <option key={s} value={s}>Section {s}</option>)}
                                                    </select>
                                                </div>
                                                <div className="form-group">
                                                    <label className="form-label">Rack</label>
                                                    <select className="form-input" value={cycleCountRack} onChange={(e) => setCycleCountRack(e.target.value)} disabled={!cycleCountSection}>
                                                        <option value="">Select...</option>
                                                        {cycleCountSection && getUniqueRacks(cycleCountSection).map(r => <option key={r} value={r}>Rack {r}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                            <button onClick={startCycleCount} disabled={!cycleCountSection || !cycleCountRack} className="btn btn-primary btn-block">Start Session</button>
                                        </div>
                                    ) : (
                                        <div>
                                            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px'}}>
                                                <div>
                                                    <h3 style={{margin: 0}}>Section {cycleCountSession.section} - Rack {cycleCountSession.rack} - Shelf {cycleCountShelf}</h3>
                                                    <p style={{fontSize: '14px', color: '#666', marginTop: '4px'}}>Counted: {countedItems.length} items</p>
                                                </div>
                                                <div style={{display: 'flex', gap: '8px'}}>
                                                    <button onClick={printCycleCount} disabled={!countedItems.length} className="btn btn-secondary" style={{padding: '10px 20px'}}>Print PDF</button>
                                                    <button onClick={exportCycleCount} disabled={!countedItems.length} className="btn btn-primary" style={{padding: '10px 20px'}}>CSV</button>
                                                    <button onClick={endCycleCount} className="btn btn-red" style={{padding: '10px 20px'}}>End</button>
                                                </div>
                                            </div>
                                            
                                            {getMissingItems().length > 0 && (
                                                <div className="alert alert-error">
                                                    <div>
                                                        <strong>Missing Items on This Shelf:</strong> {getMissingItems().length}
                                                        <div style={{fontSize: '12px', marginTop: '8px'}}>
                                                            {getMissingItems().slice(0, 5).map((i, idx) => <div key={idx}>{i.internalSKU} - {i.itemName}</div>)}
                                                            {getMissingItems().length > 5 && <div>... and {getMissingItems().length - 5} more</div>}
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                            
                                            <button onClick={nextShelf} className="btn btn-primary btn-block" style={{marginBottom: '20px', fontSize: '16px', padding: '16px'}}>Next Shelf →</button>
                                            
                                            {misplacedItem ? (
                                                <div className="alert alert-error" style={{fontSize: '16px', padding: '24px'}}>
                                                    <div>
                                                        <strong>MISPLACED ITEM</strong>
                                                        <p style={{margin: '12px 0 4px 0', fontSize: '18px'}}><strong>{misplacedItem.item.itemName}</strong></p>
                                                        <p style={{margin: '4px 0', fontSize: '14px'}}>SKU: {misplacedItem.item.internalSKU}</p>
                                                        <p style={{margin: '8px 0 4px 0'}}>Expected: <strong>{misplacedItem.expectedLoc}</strong></p>
                                                        <p style={{margin: '4px 0'}}>Currently at: <strong>{cycleCountSession.section}-{cycleCountSession.rack}-{cycleCountShelf}</strong></p>
                                                        <div className="btn-group" style={{marginTop: '16px'}}>
                                                            <button onClick={countMisplacedItem} className="btn btn-secondary">Count Anyway</button>
                                                            <button onClick={cancelMisplaced} className="btn btn-gray">Skip</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ) : !currentItem ? (
                                                <div>
                                                    <div className="form-group">
                                                        <label className="form-label" style={{fontSize: '16px'}}>Scan Barcode</label>
                                                        <input type="text" className="form-input" value={scannedSKU} onChange={(e) => setScannedSKU(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleScan()} autoFocus style={{fontSize: '22px', padding: '20px', textAlign: 'center', border: '3px solid #003594'}} />
                                                    </div>
                                                    <button onClick={handleScan} className="btn btn-primary btn-block" style={{fontSize: '18px', padding: '18px'}}>Lookup</button>
                                                </div>
                                            ) : (
                                                <div>
                                                    <div style={{background: '#DBEEFF', border: '3px solid #003594', borderRadius: '8px', padding: '24px', marginBottom: '24px'}}>
                                                        <p style={{margin: '8px 0', fontSize: '20px', color: '#003594'}}><strong>SKU:</strong> {currentItem.internalSKU}</p>
                                                        <p style={{margin: '8px 0', fontSize: '18px'}}><strong>Item:</strong> {currentItem.itemName}</p>
                                                        <p style={{margin: '8px 0', fontSize: '18px'}}><strong>Location:</strong> {currentItem.location}</p>
                                                        <p style={{margin: '12px 0', fontSize: '24px', fontWeight: 'bold', color: '#003594'}}><strong>Unit:</strong> {currentItem.uom}</p>
                                                        <p style={{margin: '8px 0', fontSize: '18px'}}><strong>On-Hand:</strong> {currentItem.onHand || '0'}</p>
                                                    </div>
                                                    {!needsRecount ? (
                                                        <div>
                                                            <div className="form-group">
                                                                <label className="form-label" style={{fontSize: '18px'}}>Enter Count</label>
                                                                <input type="number" className="form-input" value={countQuantity} onChange={(e) => setCountQuantity(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && submitCount()} autoFocus style={{fontSize: '28px', padding: '20px', textAlign: 'center', border: '3px solid #00AD6E'}} />
                                                            </div>
                                                            <button onClick={submitCount} disabled={!countQuantity} className="btn btn-secondary btn-block" style={{fontSize: '18px', padding: '18px'}}>Submit</button>
                                                        </div>
                                                    ) : (
                                                        <div>
                                                            <div className="alert alert-error" style={{fontSize: '18px', padding: '20px'}}>
                                                                <strong>MISMATCH:</strong> Counted {countQuantity}, System shows {currentItem.onHand}. Please recount.
                                                            </div>
                                                            <div className="form-group">
                                                                <label className="form-label" style={{fontSize: '18px'}}>Recount</label>
                                                                <input type="number" className="form-input" value={recountQuantity} onChange={(e) => setRecountQuantity(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && submitCount()} autoFocus style={{fontSize: '28px', padding: '20px', textAlign: 'center', border: '3px solid #FF5B45'}} />
                                                            </div>
                                                            <button onClick={submitCount} disabled={!recountQuantity} className="btn btn-secondary btn-block" style={{fontSize: '18px', padding: '18px'}}>Submit Recount</button>
                                                        </div>
                                                    )}
                                                    <button onClick={() => { setCurrentItem(null); setScannedSKU(''); setCountQuantity(''); setRecountQuantity(''); setNeedsRecount(false); }} className="btn btn-gray btn-block" style={{marginTop: '12px'}}>Cancel</button>
                                                </div>
                                            )}
                                            {countedItems.length > 0 && (
                                                <div style={{marginTop: '32px', paddingTop: '32px', borderTop: '3px solid #e5e7eb'}}>
                                                    <h3>Count Log ({countedItems.length} items)</h3>
                                                    <div style={{overflowX: 'auto'}}>
                                                        <table>
                                                            <thead><tr><th className="text-center">Found At</th><th className="text-center">Expected</th><th className="text-center">SKU</th><th>Item</th><th className="text-center">UoM</th><th className="text-center">System</th><th className="text-center">Counted</th><th className="text-center">Variance</th></tr></thead>
                                                            <tbody>{countedItems.map((it, i) => <tr key={i} style={{background: it.variance !== 0 || it.misplaced ? '#FFDECD' : 'white'}}><td className="text-center text-mono" style={{fontWeight: 'bold', fontSize: '12px'}}>{it.countedAt}</td><td className="text-center text-mono" style={{fontSize: '12px', color: it.misplaced ? '#FF5B45' : '#666'}}>{it.expectedLocation}</td><td className="text-center text-mono" style={{fontSize: '12px'}}>{it.sku}</td><td style={{fontSize: '14px'}}>{it.itemName}</td><td className="text-center">{it.uom}</td><td className="text-center">{it.onHand}</td><td className="text-center" style={{fontWeight: 'bold', fontSize: '16px'}}>{it.counted}</td><td className="text-center" style={{fontWeight: 'bold', fontSize: '16px', color: it.variance === 0 ? '#00AD6E' : '#FF5B45'}}>{it.variance > 0 ? '+' : ''}{it.variance}</td></tr>)}</tbody>
                                                        </table>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}
                            {activeTab === 'hazmat' && (
                                <div className="card">
                                    <h2>Hazmat Bill of Lading</h2>
                                    <p>Hazmat form coming...</p>
                                </div>
                            )}
                        </div>
                        <div className="footer">
                            {fileLastModified ? `Database updated: ${fileLastModified.toLocaleDateString()} ${fileLastModified.toLocaleTimeString()}` : 'Inventory Status Report'}
                        </div>
                    </div>
                    {cycleCountSession && countedItems.length > 0 && activeTab === 'cyclecount' && (
                        <div className="print-only">
                            <div style={{padding: '20px'}}>
                                <div style={{textAlign: 'center', marginBottom: '20px', borderBottom: '3px solid black', paddingBottom: '12px'}}>
                                    <h1 style={{fontSize: '24px', margin: 0}}>Cycle Count Report</h1>
                                    <p style={{fontSize: '14px', margin: '8px 0'}}>Section {cycleCountSession.section} - Rack {cycleCountSession.rack}</p>
                                    <p style={{fontSize: '12px', margin: '4px 0'}}>Date: {new Date().toLocaleDateString()}</p>
                                </div>
                                <table>
                                    <thead><tr><th>Found At</th><th>Expected</th><th>SKU</th><th>Item</th><th>UoM</th><th>System</th><th>Counted</th><th>Variance</th></tr></thead>
                                    <tbody>{countedItems.map((it, i) => <tr key={i} style={{background: it.variance !== 0 || it.misplaced ? '#FFDECD' : 'white'}}><td className="text-mono" style={{fontSize: '10px'}}>{it.countedAt}</td><td className="text-mono" style={{fontSize: '10px', color: it.misplaced ? '#FF5B45' : '#000'}}>{it.expectedLocation}</td><td className="text-mono" style={{fontSize: '10px'}}>{it.sku}</td><td style={{fontSize: '10px'}}>{it.itemName}</td><td style={{fontSize: '10px'}}>{it.uom}</td><td style={{fontSize: '10px'}}>{it.onHand}</td><td style={{fontSize: '10px', fontWeight: 'bold'}}>{it.counted}</td><td style={{fontSize: '10px', fontWeight: 'bold', color: it.variance === 0 ? '#00AD6E' : '#FF5B45'}}>{it.variance > 0 ? '+' : ''}{it.variance}</td></tr>)}</tbody>
                                </table>
                                <div style={{marginTop: '24px', padding: '16px', border: '2px solid black'}}>
                                    <p style={{fontSize: '12px', margin: '0 0 8px 0'}}><strong>Summary:</strong></p>
                                    <p style={{fontSize: '11px', margin: '4px 0'}}>Total items counted: {countedItems.length}</p>
                                    <p style={{fontSize: '11px', margin: '4px 0'}}>Items with variance: {countedItems.filter(i => i.variance !== 0).length}</p>
                                    <p style={{fontSize: '11px', margin: '4px 0'}}>Misplaced items: {countedItems.filter(i => i.misplaced).length}</p>
                                </div>
                            </div>
                        </div>
                    )}
                    {packingSlip.items.length > 0 && activeTab === 'packing' && (
                        <div className="print-only">
                            <div style={{padding: '20px'}}>
                                <div style={{textAlign: 'center', marginBottom: '16px', borderBottom: '2px solid black', paddingBottom: '8px'}}><h1 style={{fontSize: '20px', margin: 0}}>Dietrich School Scientific Stockroom - Packing Slip</h1></div>
                                <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '20px', fontSize: '12px'}}>
                                    <div><p><strong>Supplier:</strong> {packingSlip.supplier}</p><p><strong>PO:</strong> {packingSlip.poNumber}</p></div>
                                    <div><p><strong>Date:</strong> {packingSlip.dateReceived}</p><p><strong>By:</strong> {packingSlip.receivedBy}</p></div>
                                </div>
                                <table>
                                    <thead><tr><th style={{width: '30px'}}>☐</th><th>Location</th><th>Qty</th><th>Item</th><th>SKU</th><th>Vendor SKUs</th><th>Exp</th></tr></thead>
                                    <tbody>{packingSlip.items.map((it, i) => <tr key={i}><td>☐</td><td className="text-mono" style={{fontWeight: 'bold'}}>{it.location}</td><td>{it.quantity}</td><td>{it.itemName}</td><td className="text-mono" style={{fontSize: '10px'}}>{it.internalSKU}</td><td className="text-mono" style={{fontSize: '10px'}}>{it.vendorSKUs}</td><td style={{fontSize: '10px'}}>{it.expiration || '-'}</td></tr>)}</tbody>
                                </table>
                                {packingSlip.notes?.trim() && <div style={{marginTop: '16px', padding: '12px', border: '2px solid black'}}><p style={{fontSize: '12px', margin: '0 0 4px 0'}}><strong>Notes:</strong></p><p style={{fontSize: '12px', margin: 0, whiteSpace: 'pre-wrap'}}>{packingSlip.notes}</p></div>}
                                {packingSlip.notFoundSKUs?.length > 0 && <div style={{marginTop: '16px', padding: '12px', border: '2px solid black', background: '#FFDECD'}}><p style={{fontSize: '12px', fontWeight: 'bold', margin: '0 0 8px 0', color: '#770538'}}>Not Found:</p><ul style={{margin: 0, paddingLeft: '20px', fontSize: '12px', color: '#770538'}}>{packingSlip.notFoundSKUs.map((x, i) => <li key={i} className="text-mono">{x.sku} (Qty: {x.quantity})</li>)}</ul></div>}
                            </div>
                        </div>
                    )}
                    {selectedSlip && activeTab === 'history' && (
                        <div className="print-only">
                            <div style={{padding: '20px'}}>
                                <div style={{textAlign: 'center', marginBottom: '16px', borderBottom: '2px solid black', paddingBottom: '8px'}}><h1 style={{fontSize: '20px', margin: 0}}>Dietrich School Scientific Stockroom - Packing Slip</h1></div>
                                <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '20px', fontSize: '12px'}}>
                                    <div><p><strong>Supplier:</strong> {selectedSlip.supplier}</p><p><strong>PO:</strong> {selectedSlip.poNumber}</p></div>
                                    <div><p><strong>Date:</strong> {selectedSlip.dateReceived}</p><p><strong>By:</strong> {selectedSlip.receivedBy}</p></div>
                                </div>
                                <table>
                                    <thead><tr><th style={{width: '30px'}}>☐</th><th>Location</th><th>Qty</th><th>Item</th><th>SKU</th><th>Vendor SKUs</th><th>Exp</th></tr></thead>
                                    <tbody>{selectedSlip.items.map((it, i) => <tr key={i}><td>☐</td><td className="text-mono" style={{fontWeight: 'bold'}}>{it.location}</td><td>{it.quantity}</td><td>{it.itemName}</td><td className="text-mono" style={{fontSize: '10px'}}>{it.internalSKU}</td><td className="text-mono" style={{fontSize: '10px'}}>{it.vendorSKUs}</td><td style={{fontSize: '10px'}}>{it.expiration || '-'}</td></tr>)}</tbody>
                                </table>
                                {selectedSlip.notes?.trim() && <div style={{marginTop: '16px', padding: '12px', border: '2px solid black'}}><p style={{fontSize: '12px', margin: '0 0 4px 0'}}><strong>Notes:</strong></p><p style={{fontSize: '12px', margin: 0, whiteSpace: 'pre-wrap'}}>{selectedSlip.notes}</p></div>}
                                {selectedSlip.notFoundSKUs?.length > 0 && <div style={{marginTop: '16px', padding: '12px', border: '2px solid black', background: '#FFDECD'}}><p style={{fontSize: '12px', fontWeight: 'bold', margin: '0 0 8px 0', color: '#770538'}}>Not Found:</p><ul style={{margin: 0, paddingLeft: '20px', fontSize: '12px', color: '#770538'}}>{selectedSlip.notFoundSKUs.map((x, i) => <li key={i} className="text-mono">{typeof x === 'string' ? x : `${x.sku} (Qty: ${x.quantity})`}</li>)}</ul></div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
